# Gluetun NordVPN multi-proxy fleet for nbadb extraction
# 6 containers × different US cities = 6 rotating exit IPs
#
# Prerequisites:
#   - OPENVPN_USER and OPENVPN_PASSWORD env vars
#     (derive from NORDVPN_TOKEN via NordVPN API at runtime)
#
# Usage:
#   docker compose -f docker-compose.proxy.yml up -d
#   curl -x http://localhost:18881 https://httpbin.org/ip
#
# Health check:
#   curl http://localhost:19001/v1/publicip/ip
#
# Stop:
#   docker compose -f docker-compose.proxy.yml down

x-vpn-base: &vpn-base
  image: qmcgaw/gluetun:v3
  restart: unless-stopped
  cap_add:
    - NET_ADMIN
  devices:
    - /dev/net/tun:/dev/net/tun
  environment: &vpn-env
    TZ: America/Chicago
    VPN_SERVICE_PROVIDER: nordvpn
    VPN_TYPE: openvpn
    OPENVPN_USER: ${OPENVPN_USER}
    OPENVPN_PASSWORD: ${OPENVPN_PASSWORD}
    SERVER_COUNTRIES: United States
    # Built-in HTTP proxy
    HTTPPROXY: "on"
    HTTPPROXY_LISTENING_ADDRESS: ":8888"
    HTTPPROXY_STEALTH: "on"
    # Health / auto-heal
    HEALTH_VPN_DURATION_INITIAL: 30s
    HEALTH_RESTART_VPN: "on"
    HTTP_CONTROL_SERVER_ADDRESS: ":8000"

services:
  vpn-us-east:
    <<: *vpn-base
    container_name: nbadb-vpn-us-east
    ports:
      - "18881:8888"
      - "19001:8000"
    environment:
      <<: *vpn-env
      SERVER_CITIES: New York

  vpn-us-south:
    <<: *vpn-base
    container_name: nbadb-vpn-us-south
    ports:
      - "18882:8888"
      - "19002:8000"
    environment:
      <<: *vpn-env
      SERVER_CITIES: Atlanta

  vpn-us-central:
    <<: *vpn-base
    container_name: nbadb-vpn-us-central
    ports:
      - "18883:8888"
      - "19003:8000"
    environment:
      <<: *vpn-env
      SERVER_CITIES: Chicago

  vpn-us-south2:
    <<: *vpn-base
    container_name: nbadb-vpn-us-south2
    ports:
      - "18884:8888"
      - "19004:8000"
    environment:
      <<: *vpn-env
      SERVER_CITIES: Dallas

  vpn-us-west:
    <<: *vpn-base
    container_name: nbadb-vpn-us-west
    ports:
      - "18885:8888"
      - "19005:8000"
    environment:
      <<: *vpn-env
      SERVER_CITIES: Los Angeles

  vpn-us-west2:
    <<: *vpn-base
    container_name: nbadb-vpn-us-west2
    ports:
      - "18886:8888"
      - "19006:8000"
    environment:
      <<: *vpn-env
      SERVER_CITIES: San Francisco
