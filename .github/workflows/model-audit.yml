name: Model Audit

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/baselines/model-audit-summary.json"
      - ".github/workflows/model-audit.yml"
      - "pyproject.toml"
      - "src/nbadb/**"
      - "tests/**"
      - "uv.lock"
  workflow_dispatch:
  schedule:
    - cron: "0 7 * * *"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  inventory-and-regressions:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57  # v8.0.0
        with:
          enable-cache: true
          cache-suffix: model-audit

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - run: uv sync --extra dev

      - name: Inventory consistency
        run: uv run nbadb audit-models --mode inventory --strictness consistency --output-dir artifacts/model-audit/inventory

      - name: Inventory no-regressions
        run: |
          uv run nbadb audit-models \
            --mode inventory \
            --strictness no-regressions \
            --baseline .github/baselines/model-audit-summary.json \
            --output-dir artifacts/model-audit/no-regressions

      - name: Live canary probe
        run: |
          export NBADB_MODEL_AUDIT_PROBE_PROFILE=canary
          uv run nbadb audit-models \
            --mode probe \
            --strictness consistency \
            --output-dir artifacts/model-audit/canary

          python - <<'PY'
          import json
          import sys
          from pathlib import Path

          payload = json.loads(
              Path("artifacts/model-audit/canary/live-probes.json").read_text(encoding="utf-8")
          )
          failures = [
              record
              for record in payload.get("records", [])
              if record.get("decision") == "validation_gap"
          ]
          if failures:
              print(f"Live canary probe failures: {len(failures)}")
              for record in failures[:20]:
                  print(f"- {record['key']}: {record['decision_reason']}")
              sys.exit(1)
          PY

      - name: Upload model audit artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: model-audit-pr
          path: artifacts/model-audit

  full-audit:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57  # v8.0.0
        with:
          enable-cache: true
          cache-suffix: model-audit-full

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - run: uv sync --extra dev

      - name: Full model audit
        run: uv run nbadb audit-models --mode full --strictness consistency --output-dir artifacts/model-audit/full

      - name: Upload model audit artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: model-audit-full
          path: artifacts/model-audit/full
