name: Daily Update

on:
  schedule:
    - cron: "0 10 * * *"  # 10 AM UTC daily
  workflow_dispatch:

jobs:
  daily:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: uv sync
      - name: Generate daily health inventory
        run: |
          output_path="${GITHUB_WORKSPACE}/artifacts/health/daily/dependency-inventory.json"
          uv run python -m nbadb.core.dependency_inventory --project-root "${GITHUB_WORKSPACE}" --output "$output_path"
      - name: Upload daily health inventory artifact
        uses: actions/upload-artifact@v7
        with:
          name: daily-health-inventory
          path: artifacts/health/daily/dependency-inventory.json
      - name: Run daily update
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
        run: |
          uv run nbadb download
          uv run nbadb daily
          uv run nbadb run-quality --report-path artifacts/health/daily/data-quality-report.json
          uv run nbadb export
          uv run nbadb upload
      - name: Upload daily data quality artifact
        uses: actions/upload-artifact@v7
        with:
          name: daily-data-quality-report
          path: artifacts/health/daily/data-quality-report.json
