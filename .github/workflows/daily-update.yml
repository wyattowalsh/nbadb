name: Daily Update

on:
  schedule:
    - cron: "0 10 2-31 * *"  # 10 AM UTC; monthly workflow owns the first day
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  daily:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    concurrency:
      group: nbadb-kaggle-publish
      queue: max
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          enable-cache: true
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97  # v7.0.0
        with:
          python-version: "3.12"
      - run: uv sync
      - name: Require default branch for Kaggle publication
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          if [ "$GITHUB_REF_NAME" != "$DEFAULT_BRANCH" ]; then
            echo "::error::Kaggle publication requires the default branch '$DEFAULT_BRANCH'; got '$GITHUB_REF_NAME'"
            exit 1
          fi
      - name: Restore Kaggle publication reconciliation state
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        with:
          path: logs/kaggle/kaggle-publication-state.json
          key: nbadb-kaggle-publication-state-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            nbadb-kaggle-publication-state-
      - name: Generate daily health inventory
        run: |
          output_path="${GITHUB_WORKSPACE}/artifacts/health/daily/dependency-inventory.json"
          uv run python -m nbadb.core.dependency_inventory --project-root "${GITHUB_WORKSPACE}" --output "$output_path"
      - name: Upload daily health inventory artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: daily-health-inventory
          path: artifacts/health/daily/dependency-inventory.json
      - name: Connect NordVPN tunnel
        id: vpn
        uses: ./.github/actions/nordvpn-connect
        with:
          openvpn-user: ${{ secrets.OPENVPN_USER }}
          openvpn-password: ${{ secrets.OPENVPN_PASSWORD }}
          nordvpn-token: ${{ secrets.NORDVPN_TOKEN }}
          lane-index: "0"
          server-limit: "3"
      - name: Set rate limit for daily runs
        run: echo 'NBADB_RATE_LIMIT=2' >> "$GITHUB_ENV"
      - name: Download latest from Kaggle
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
        run: uv run nbadb download
      - name: Run daily extraction
        id: daily
        continue-on-error: true
        run: uv run nbadb daily
      # Keep scan diagnostics visible, but require green extraction + scan before publishing.
      - name: Scan data quality
        id: scan
        if: always() && steps.daily.outcome == 'success'
        continue-on-error: true
        uses: ./.github/actions/scan-report
        with:
          report-name: daily-scan-report
          report-dir: artifacts/health/daily
          fail-on: error
      - name: Export data
        id: export
        if: always() && steps.daily.outcome == 'success' && steps.scan.outcome == 'success'
        timeout-minutes: 45
        run: uv run nbadb export --data-dir data/nbadb
      - name: Generate Kaggle publication metadata
        id: metadata
        if: always() && steps.daily.outcome == 'success' && steps.scan.outcome == 'success' && steps.export.outcome == 'success'
        timeout-minutes: 10
        run: >-
          uv run nbadb metadata --data-dir data/nbadb
          --output data/nbadb/dataset-metadata.json
      - name: Upload to Kaggle
        id: upload
        if: always() && steps.daily.outcome == 'success' && steps.scan.outcome == 'success' && steps.export.outcome == 'success' && steps.metadata.outcome == 'success'
        timeout-minutes: 75
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
        run: >-
          uv run nbadb upload --data-dir data/nbadb --verify-remote
          --remote-timeout 3600 --remote-poll-interval 15
      - name: Refresh checked-in metadata
        id: metadata_commit
        if: always() && steps.upload.outcome == 'success'
        timeout-minutes: 10
        uses: ./.github/actions/refresh-metadata
        with:
          data-dir: data/nbadb
          push-ref: ${{ github.event.repository.default_branch }}
      - name: Detect Kaggle publication reconciliation state
        id: kaggle_publication_state
        if: always()
        run: |
          if [ -f logs/kaggle/kaggle-publication-state.json ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Persist Kaggle publication reconciliation state
        if: ${{ always() && steps.kaggle_publication_state.outputs.exists == 'true' }}
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        with:
          path: logs/kaggle/kaggle-publication-state.json
          key: nbadb-kaggle-publication-state-${{ github.run_id }}-${{ github.run_attempt }}
      - name: Upload Kaggle publication receipt
        if: always() && steps.daily.outcome == 'success' && steps.scan.outcome == 'success' && steps.export.outcome == 'success' && steps.metadata.outcome == 'success' && steps.upload.outcome != 'skipped'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          overwrite: true
          name: daily-kaggle-publication-receipt
          path: |
            logs/kaggle/kaggle-upload-manifest.json
            logs/kaggle/kaggle-publication-state.json
          if-no-files-found: warn
          retention-days: 30
      - name: Assert extraction and scan passed
        if: always()
        env:
          DAILY_OUTCOME: ${{ steps.daily.outcome }}
          SCAN_OUTCOME: ${{ steps.scan.outcome }}
          EXPORT_OUTCOME: ${{ steps.export.outcome }}
          UPLOAD_OUTCOME: ${{ steps.upload.outcome }}
          METADATA_OUTCOME: ${{ steps.metadata.outcome }}
          METADATA_COMMIT_OUTCOME: ${{ steps.metadata_commit.outcome }}
        run: |
          if [ "$DAILY_OUTCOME" != "success" ]; then
            echo "::error::Daily extraction did not pass: ${DAILY_OUTCOME:-unknown}"
            exit 1
          fi
          if [ "$SCAN_OUTCOME" != "success" ]; then
            echo "::error::Daily scan did not pass: ${SCAN_OUTCOME:-skipped}"
            exit 1
          fi
          if [ "$EXPORT_OUTCOME" != "success" ]; then
            echo "::error::Daily export did not pass: ${EXPORT_OUTCOME:-skipped}"
            exit 1
          fi
          if [ "$METADATA_OUTCOME" != "success" ]; then
            echo "::error::Daily publication metadata did not pass: ${METADATA_OUTCOME:-skipped}"
            exit 1
          fi
          if [ "$UPLOAD_OUTCOME" != "success" ]; then
            echo "::error::Daily Kaggle publication did not pass: ${UPLOAD_OUTCOME:-skipped}"
            exit 1
          fi
          if [ "$METADATA_COMMIT_OUTCOME" != "success" ]; then
            echo "::error::Daily metadata commit did not pass: ${METADATA_COMMIT_OUTCOME:-skipped}"
            exit 1
          fi
      - name: Disconnect VPN
        if: always()
        uses: ./.github/actions/nordvpn-disconnect
        with:
          pid: ${{ steps.vpn.outputs.pid }}
          pid-file: ${{ steps.vpn.outputs.pid-file }}
          work-dir: ${{ steps.vpn.outputs.work-dir }}
      - name: Upload VPN diagnostics
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: daily-vpn-diagnostics
          path: ${{ runner.temp }}/nordvpn/
          if-no-files-found: ignore
          retention-days: 7
          compression-level: 6
