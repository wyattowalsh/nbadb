name: Daily Update

on:
  schedule:
    - cron: "0 10 * * *"  # 10 AM UTC daily
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  daily:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78  # v7.6.0
        with:
          enable-cache: true
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
      - run: uv sync
      - name: Generate daily health inventory
        run: |
          output_path="${GITHUB_WORKSPACE}/artifacts/health/daily/dependency-inventory.json"
          uv run python -m nbadb.core.dependency_inventory --project-root "${GITHUB_WORKSPACE}" --output "$output_path"
      - name: Upload daily health inventory artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: daily-health-inventory
          path: artifacts/health/daily/dependency-inventory.json
      - name: Derive NordVPN service credentials
        env:
          NORDVPN_TOKEN: ${{ secrets.NORDVPN_TOKEN }}
        run: |
          creds=$(curl -sf -u "token:$NORDVPN_TOKEN" \
            https://api.nordvpn.com/v1/users/services/credentials)
          user=$(echo "$creds" | jq -r .username)
          pass=$(echo "$creds" | jq -r .password)
          if [ -z "$user" ] || [ "$user" = "null" ]; then
            echo "::warning::Failed to derive NordVPN credentials — running without proxy"
          else
            echo "::add-mask::$user"
            echo "::add-mask::$pass"
            echo "OPENVPN_USER=$user" >> $GITHUB_ENV
            echo "OPENVPN_PASSWORD=$pass" >> $GITHUB_ENV
          fi
      - name: Start proxy fleet
        run: |
          if [ -z "$OPENVPN_USER" ]; then
            echo "::warning::No VPN credentials derived — skipping proxy fleet"
            exit 0
          fi
          docker compose -f docker-compose.proxy.yml up -d
          echo "Waiting for OpenVPN tunnels to establish..."
          for attempt in 1 2 3 4 5 6; do
            sleep 30
            ok=0
            for port in 19001 19002 19003 19004 19005 19006; do
              ip=$(curl -sf http://localhost:$port/v1/publicip/ip 2>/dev/null | jq -r .public_ip 2>/dev/null)
              if [ -n "$ip" ] && [ "$ip" != "null" ]; then
                echo "  ✓ :$port -> $ip"
                ok=$((ok + 1))
              else
                echo "  ✗ :$port not ready"
              fi
            done
            echo "Attempt $attempt: $ok/6 tunnels active"
            if [ "$ok" -ge 3 ]; then break; fi
          done
          if [ "$ok" -eq 0 ]; then
            echo "::warning::No VPN tunnels healthy — running without proxy"
          else
            echo "::notice::$ok/6 VPN tunnels active"
            echo 'NBADB_PROXY_ENABLED=true' >> $GITHUB_ENV
            echo 'NBADB_PROXY_BOOTSTRAP=false' >> $GITHUB_ENV
            echo 'NBADB_PROXY_URLS=["http://localhost:18881","http://localhost:18882","http://localhost:18883","http://localhost:18884","http://localhost:18885","http://localhost:18886"]' >> $GITHUB_ENV
            echo 'NBADB_PROXY_TIMEOUT=60' >> $GITHUB_ENV
          fi
      - name: Download latest from Kaggle
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
        run: uv run nbadb download
      - name: Run daily extraction
        id: daily
        continue-on-error: true
        run: uv run nbadb daily
      - name: Scan data quality
        id: scan
        if: always() && steps.daily.outcome != 'skipped'
        continue-on-error: true
        uses: ./.github/actions/scan-report
        with:
          report-name: daily-scan-report
          report-dir: artifacts/health/daily
          fail-on: error
      - name: Export data
        if: always() && steps.daily.outcome != 'skipped'
        run: uv run nbadb export
      - name: Upload to Kaggle
        if: always() && steps.daily.outcome != 'skipped'
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
        run: uv run nbadb upload
      - name: Stop proxy fleet
        if: always()
        run: docker compose -f docker-compose.proxy.yml down 2>/dev/null || true
