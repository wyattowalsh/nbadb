name: Deploy Docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "src/nbadb/docs_gen/**"
      - "src/nbadb/extract/**"
      - "src/nbadb/orchestrate/**"
      - "src/nbadb/schemas/**"
      - "src/nbadb/transform/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/docs-deploy.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57  # v8.0.0
        with:
          enable-cache: true
          cache-suffix: docs-deploy
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
      - uses: pnpm/action-setup@08c4be7e2e672a47d11bd04269e27e5f3e8529cb  # v6.0.0
        with:
          version: 9
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6.3.0
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: docs/pnpm-lock.yaml
      - name: Install Python dependencies
        run: uv sync --extra dev
      - name: Install dependencies
        working-directory: docs
        run: pnpm install --frozen-lockfile
      - name: Regenerate docs artifacts
        run: uv run nbadb docs-autogen --docs-root docs/content/docs
      - name: Verify generated docs are committed
        run: |
          status="$(
            git status --short --untracked-files=all -- \
              docs/content/docs \
              docs/lib/generated \
              docs/lib/site-metrics.generated.ts
          )"
          if [ -n "$status" ]; then
            echo "Generated docs artifacts are out of date:"
            echo "$status"
            exit 1
          fi
      - name: Lint docs
        working-directory: docs
        run: pnpm lint
      - name: Test docs
        working-directory: docs
        run: pnpm test
      - name: Typecheck docs
        working-directory: docs
        run: pnpm typecheck
      - name: Build
        working-directory: docs
        run: pnpm build
      - name: Deploy to Vercel
        uses: amondnet/vercel-action@4b810e26f7bb2a331c698af186f890cbf20d5f72  # v42.2.0
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: docs
          vercel-args: "--prod"
