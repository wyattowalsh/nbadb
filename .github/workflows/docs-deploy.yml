name: Deploy Docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "src/nbadb/docs_gen/**"
      - "src/nbadb/extract/**"
      - "src/nbadb/orchestrate/**"
      - "src/nbadb/schemas/**"
      - "src/nbadb/transform/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/docs-deploy.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86  # v5.4.2
        with:
          enable-cache: true
          cache-suffix: docs-deploy
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.12"
      - uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061  # v4.2.0
        with:
          version: 9
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: docs/pnpm-lock.yaml
      - name: Install Python dependencies
        run: uv sync --extra dev
      - name: Install dependencies
        working-directory: docs
        run: pnpm install --frozen-lockfile
      - name: Regenerate docs artifacts
        run: uv run nbadb docs-autogen --docs-root docs/content/docs
      - name: Verify generated docs are committed
        run: |
          status="$(
            git status --short --untracked-files=all -- \
              docs/content/docs \
              docs/lib/generated \
              docs/lib/site-metrics.generated.ts
          )"
          if [ -n "$status" ]; then
            echo "Generated docs artifacts are out of date:"
            echo "$status"
            exit 1
          fi
      - name: Lint docs
        working-directory: docs
        run: pnpm lint
      - name: Test docs
        working-directory: docs
        run: pnpm test
      - name: Typecheck docs
        working-directory: docs
        run: pnpm typecheck
      - name: Build
        working-directory: docs
        run: pnpm build
      - name: Deploy to Vercel
        uses: amondnet/vercel-action@16e87c0a08142b0d0d33b76aeaf20823c381b9b9  # v25.2.0
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: docs
          vercel-args: "--prod"
