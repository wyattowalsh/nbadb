name: Full Extraction
run-name: Full Extraction chain=${{ inputs.chain_id || github.run_id }} iteration=${{ inputs.iteration }}

on:
  workflow_dispatch:
    inputs:
      concurrency:
        description: "Max concurrent requests per category"
        type: choice
        default: "moderate"
        options:
          - conservative
          - moderate
          - aggressive
      vpn_parallelism:
        description: "Max simultaneous VPN-backed extract lanes"
        type: choice
        default: "3"
        options:
          - "1"
          - "2"
          - "3"
          - "4"
          - "5"
          - "6"
      matrix_batch_size:
        description: "Lane jobs admitted per iteration; max-parallel controls simultaneous runners"
        type: choice
        default: "256"
        options:
          - "64"
          - "128"
          - "192"
          - "256"
      direct_parallelism:
        description: "Max simultaneous direct/no-VPN extract lanes"
        type: choice
        default: "2"
        options:
          - "1"
          - "2"
          - "3"
          - "4"
          - "8"
          - "12"
          - "16"
          - "20"
          - "32"
          - "48"
          - "64"
          - "96"
          - "128"
          - "160"
          - "192"
          - "220"
          - "256"
      direct_request_profile:
        description: "Request-rate profile for direct/no-VPN extract lanes"
        type: choice
        default: "direct"
        options:
          - direct
          - conservative
          - moderate
          - aggressive
          - turbo
      direct_timeout_cap_minutes:
        description: "Max minutes before a direct/no-VPN high-volume lane yields timeout metadata"
        type: choice
        default: "30"
        options:
          - "15"
          - "30"
          - "45"
          - "60"
      network_mode:
        description: "Network path for extraction lanes"
        type: choice
        default: "vpn"
        options:
          - vpn
          - direct
          - auto
      chunk_profile:
        description: "Temporal lane chunk sizing profile"
        type: choice
        default: "standard"
        options:
          - standard
          - balanced-small
          - micro
      iteration:
        description: "Iteration number (auto-incremented on self-chain)"
        type: string
        default: "1"
      max_iterations:
        description: "Max self-chain iterations (auto = fixed capacity-derived safety budget)"
        type: string
        default: "auto"
      backfill_endpoints:
        description: "Comma-separated endpoints to backfill (empty = all)"
        type: string
        default: ""
      backfill_patterns:
        description: "Comma-separated patterns to constrain the planned extraction lanes"
        type: string
        default: ""
      force_reextract:
        description: "Force re-extraction of done entries"
        type: boolean
        default: false
      publish:
        description: "Publish terminal metadata and Kaggle artifacts after assurance passes"
        type: boolean
        default: true
      targeted_smoke:
        description: "Stop after one manually scoped lane passes terminal checkpoint attestation"
        type: boolean
        default: false
      chain_id:
        description: "Chain identifier (auto-set on fresh runs; required for artifact handoff)"
        type: string
        default: ""
      workflow_ref:
        description: "Source ref to use for redispatching chained runs"
        type: string
        default: ""
      workflow_sha:
        description: "Source commit SHA to check out for every chained iteration"
        type: string
        default: ""
      lane_manifest_json:
        description: "Small debug/manual lane manifest JSON override; large chains must use artifact handoff"
        type: string
        default: ""
      lane_manifest_run_id:
        description: "Run ID containing a lane manifest artifact for chained or manual resume runs"
        type: string
        default: ""
      lane_manifest_artifact_name:
        description: "Lane manifest artifact name to download from lane_manifest_run_id"
        type: string
        default: ""
      resume_source_run_id:
        description: "Completed or failed source run ID to resume from metadata and its original manifest"
        type: string
        default: ""
      retry_pipeline_failures:
        description: "Retry pipeline-failure lanes during resume-source planning"
        type: boolean
        default: true

env:
  NBADB_DATA_DIR: data/nbadb
  ACTIVE_CHAIN_ID: ${{ inputs.chain_id || github.run_id }}
  WORKFLOW_SOURCE_REF: ${{ inputs.workflow_ref || github.ref_name }}
  WORKFLOW_SOURCE_SHA: ${{ inputs.workflow_sha || github.sha }}
  FULL_EXTRACTION_CHUNK_PROFILE: ${{ inputs.chunk_profile }}
  FULL_EXTRACTION_NETWORK_MODE: ${{ inputs.network_mode }}

permissions:
  contents: read

concurrency:
  group: ${{ inputs.network_mode == 'direct' && format('full-extraction-direct-{0}-{1}', inputs.chain_id || github.run_id, inputs.iteration) || 'nbadb-vpn-full-extraction' }}
  queue: max
  cancel-in-progress: false

# ─────────────────────────────────────────────────────────────────
#  plan → lane extract(matrix) → lane control/checkpoint → dispatch next or merge
# ─────────────────────────────────────────────────────────────────
jobs:
  workflow_guard:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ env.WORKFLOW_SOURCE_SHA }}

      - name: Verify immutable workflow definition
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LANE_MANIFEST_ARTIFACT_NAME: ${{ inputs.lane_manifest_artifact_name }}
          LANE_MANIFEST_JSON: ${{ inputs.lane_manifest_json }}
          LANE_MANIFEST_RUN_ID: ${{ inputs.lane_manifest_run_id }}
          MAX_ITERATIONS: ${{ inputs.max_iterations }}
          NETWORK_MODE: ${{ inputs.network_mode }}
          PUBLISH: ${{ inputs.publish }}
          RETRY_PIPELINE_FAILURES: ${{ inputs.retry_pipeline_failures }}
          TARGETED_SMOKE: ${{ inputs.targeted_smoke }}
          WORKFLOW_DEFINITION_SHA: ${{ github.workflow_sha }}
          WORKFLOW_PATH: .github/workflows/full-extraction.yml
        run: |
          set -euo pipefail
          if ! [[ "$WORKFLOW_SOURCE_SHA" =~ ^[0-9a-fA-F]{40}$ ]]; then
            echo "::error::workflow_sha must resolve to a full 40-character commit SHA"
            exit 1
          fi
          if ! git check-ref-format --branch "$WORKFLOW_SOURCE_REF" >/dev/null 2>&1; then
            echo "::error::workflow_ref must name a valid branch, got '$WORKFLOW_SOURCE_REF'"
            exit 1
          fi

          source_commit="$(git rev-parse "${WORKFLOW_SOURCE_SHA}^{commit}")"
          checked_out_commit="$(git rev-parse HEAD)"
          if [ "${WORKFLOW_SOURCE_SHA,,}" != "$source_commit" ] || [ "$checked_out_commit" != "$source_commit" ]; then
            echo "::error::Pinned source checkout mismatch: expected $source_commit, got $checked_out_commit"
            exit 1
          fi

          trusted_branch_ref="refs/remotes/origin/trusted-workflow-source"
          git fetch --no-tags --no-recurse-submodules origin \
            "+refs/heads/${WORKFLOW_SOURCE_REF}:${trusted_branch_ref}"
          trusted_branch_commit="$(git rev-parse "${trusted_branch_ref}^{commit}")"
          if ! git merge-base --is-ancestor "$source_commit" "$trusted_branch_commit"; then
            echo "::error::workflow_sha $source_commit is not an ancestor of trusted workflow_ref branch '$WORKFLOW_SOURCE_REF' at $trusted_branch_commit"
            exit 1
          fi

          if [ "$PUBLISH" = "true" ]; then
            if [ -z "$DEFAULT_BRANCH" ] || ! git check-ref-format --branch "$DEFAULT_BRANCH" >/dev/null 2>&1; then
              echo "::error::Repository default branch is missing or invalid"
              exit 1
            fi
            default_branch_ref="refs/remotes/origin/trusted-default-branch"
            git fetch --no-tags --no-recurse-submodules origin \
              "+refs/heads/${DEFAULT_BRANCH}:${default_branch_ref}"
            default_branch_commit="$(git rev-parse "${default_branch_ref}^{commit}")"
            if ! git merge-base --is-ancestor "$source_commit" "$default_branch_commit"; then
              echo "::error::publish=true requires workflow_sha $source_commit to be an ancestor of default branch '$DEFAULT_BRANCH' at $default_branch_commit"
              exit 1
            fi
          fi

          if [ "$TARGETED_SMOKE" = "true" ]; then
            if [ "$PUBLISH" != "false" ]; then
              echo "::error::targeted_smoke=true requires publish=false"
              exit 1
            fi
            if [ "$NETWORK_MODE" != "vpn" ]; then
              echo "::error::targeted_smoke=true requires network_mode=vpn"
              exit 1
            fi
            if [ "$MAX_ITERATIONS" != "1" ]; then
              echo "::error::targeted_smoke=true requires max_iterations=1"
              exit 1
            fi
            if [ "$RETRY_PIPELINE_FAILURES" != "false" ]; then
              echo "::error::targeted_smoke=true requires retry_pipeline_failures=false"
              exit 1
            fi
            has_inline_manifest=false
            has_artifact_manifest=false
            [ -n "$LANE_MANIFEST_JSON" ] && has_inline_manifest=true
            if [ -n "$LANE_MANIFEST_RUN_ID" ] && [ -n "$LANE_MANIFEST_ARTIFACT_NAME" ]; then
              has_artifact_manifest=true
            fi
            if [ "$has_inline_manifest" != "true" ] && [ "$has_artifact_manifest" != "true" ]; then
              echo "::error::targeted_smoke=true requires an inline or artifact-backed manual lane manifest"
              exit 1
            fi
          fi

          source_blob="$(git rev-parse "${source_commit}:${WORKFLOW_PATH}")"
          definition_blob="$(gh api \
            --method GET \
            -H "Accept: application/vnd.github+json" \
            "/repos/${GITHUB_REPOSITORY}/contents/${WORKFLOW_PATH}" \
            -f "ref=${WORKFLOW_DEFINITION_SHA}" \
            --jq '.sha')"
          if [ -z "$definition_blob" ] || [ "$definition_blob" != "$source_blob" ]; then
            echo "::error::Workflow definition drift detected: ${WORKFLOW_PATH} at runtime workflow SHA ${WORKFLOW_DEFINITION_SHA} does not match workflow_source_sha ${source_commit}"
            exit 1
          fi

  plan:
    needs: workflow_guard
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
      actions: read
    outputs:
      extract-matrix: ${{ steps.manifest.outputs.extract-matrix }}
      lane-count: ${{ steps.manifest.outputs.lane-count }}
      active-lane-count: ${{ steps.manifest.outputs.active-lane-count }}
      matrix-lane-count: ${{ steps.manifest.outputs.matrix-lane-count }}
      deferred-lane-count: ${{ steps.manifest.outputs.deferred-lane-count }}
      vpn-quarantined-servers-json: ${{ steps.manifest.outputs.vpn-quarantined-servers-json }}
      chunk-profile: ${{ steps.manifest.outputs.chunk-profile }}
      coverage-fingerprint: ${{ steps.manifest.outputs.coverage-fingerprint }}
      planned-wave-count: ${{ steps.manifest.outputs.planned-wave-count }}
      iteration-budget: ${{ steps.manifest.outputs.iteration-budget }}
      max-matrix-lanes: ${{ steps.manifest.outputs.max-matrix-lanes }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ env.WORKFLOW_SOURCE_SHA }}

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          enable-cache: true

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - run: uv sync

      - name: Fetch nba_api upstream docs and tools
        if: ${{ inputs.lane_manifest_json == '' && inputs.lane_manifest_run_id == '' && inputs.resume_source_run_id == '' }}
        run: |
          NBA_API_VERSION="$(uv run python -c 'import importlib.metadata; print(importlib.metadata.version("nba-api"))')"
          NBA_API_REF="v${NBA_API_VERSION}"
          echo "Fetching nba_api docs/tools at ${NBA_API_REF}"
          git clone --depth=1 --filter=blob:none --branch "$NBA_API_REF" \
            https://github.com/swar/nba_api.git "$RUNNER_TEMP/nba_api-upstream"

          # The support bundle ingests the upstream docs/tools contract, not just endpoint docs.
          test -d "$RUNNER_TEMP/nba_api-upstream/docs/nba_api/stats/endpoints" || {
            echo "::error::nba_api clone is missing docs/nba_api/stats/endpoints"
            exit 1
          }
          test -d "$RUNNER_TEMP/nba_api-upstream/tools/stats" || {
            echo "::error::nba_api clone is missing tools/stats"
            exit 1
          }

      - name: Generate support bundle from nba_api docs/tools contract
        if: ${{ inputs.lane_manifest_json == '' && inputs.lane_manifest_run_id == '' && inputs.resume_source_run_id == '' }}
        run: |
          mkdir -p artifacts/endpoint-coverage
          # The historical option name points at the full upstream checkout used for
          # docs/nba_api/stats/endpoints and tools/stats contract ingestion.
          uv run nbadb extract-completeness \
            --require-full \
            --endpoint-analysis-docs-root "$RUNNER_TEMP/nba_api-upstream" \
            --output-dir artifacts/endpoint-coverage

          python - <<'PY'
          import json
          import sys
          from pathlib import Path

          summary = json.loads(
              Path("artifacts/endpoint-coverage/endpoint-support-summary.json").read_text(
                  encoding="utf-8"
              )
          )
          gap_breakdown = {
              str(key): int(value)
              for key, value in dict(summary.get("gap_breakdown", {})).items()
              if int(value) > 0
          }
          disallowed_gap_keys = sorted(
              key for key in gap_breakdown if key != "season_type_contract_blocked"
          )

          failures: list[str] = []
          if int(summary.get("partial_endpoint_count", 0)) > 0:
              failures.append(
                  "partial endpoint contracts remain in the support matrix"
              )
          if int(summary.get("season_type_contract_untracked_count", 0)) > 0:
              failures.append(
                  "historical endpoints still lack explicit season-type tracking"
              )
          if int(summary.get("season_type_value_gap_count", 0)) > 0:
              failures.append("season-type value coverage gaps remain")
          if disallowed_gap_keys:
              failures.append(
                  "unexpected support-matrix gaps remain: "
                  + ", ".join(disallowed_gap_keys)
              )

          if failures:
              for failure in failures:
                  print(f"full extraction plan gate failed: {failure}", file=sys.stderr)
              sys.exit(1)

          blocked_count = gap_breakdown.get("season_type_contract_blocked", 0)
          print(
              "full extraction plan gate passed: "
              f"allowing {blocked_count} blocked cross-product support gaps"
          )
          PY

      - name: Validate adequacy scorecard artifacts
        if: ${{ inputs.lane_manifest_json == '' && inputs.lane_manifest_run_id == '' && inputs.resume_source_run_id == '' }}
        run: |
          python - <<'PY'
          import json
          import sys
          from pathlib import Path

          summary = json.loads(
              Path("artifacts/endpoint-coverage/endpoint-adequacy-scorecard.json").read_text(
                  encoding="utf-8"
              )
          )["summary"]

          failures: list[str] = []
          if int(summary.get("coverage_gap_endpoint_count", 0)) > 0:
              failures.append("coverage gaps remain")
          if int(summary.get("contract_gap_endpoint_count", 0)) > 0:
              failures.append("contract gaps remain")
          if int(summary.get("downstream_unowned_endpoint_count", 0)) > 0:
              failures.append("unowned downstream endpoints remain")
          if int(summary.get("downstream_excluded_endpoint_count", 0)) > 0:
              failures.append("downstream exclusions remain")

          if failures:
              for failure in failures:
                  print(f"full extraction adequacy gate failed: {failure}", file=sys.stderr)
              sys.exit(1)

          print(
              "full extraction adequacy gate passed: "
              f"{summary.get('downstream_modeled_endpoint_count', 0)} modeled, "
              f"{summary.get('downstream_passthrough_only_endpoint_count', 0)} passthrough, "
              f"{summary.get('downstream_compatibility_reference_only_endpoint_count', 0)} compatibility-reference, and "
              f"{summary.get('downstream_not_applicable_endpoint_count', 0)} non-model "
              "endpoints are explicitly classified"
          )
          PY

      - name: Validate result-table contract artifacts
        if: ${{ inputs.lane_manifest_json == '' && inputs.lane_manifest_run_id == '' && inputs.resume_source_run_id == '' }}
        run: |
          uv run nbadb audit-models \
            --mode inventory \
            --strictness consistency \
            --require-result-table-contract \
            --output-dir artifacts/model-audit

      - name: Upload endpoint coverage diagnostics
        if: ${{ always() && inputs.lane_manifest_json == '' && inputs.lane_manifest_run_id == '' && inputs.resume_source_run_id == '' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          overwrite: true
          name: full-extraction-endpoint-coverage-${{ env.ACTIVE_CHAIN_ID }}
          path: artifacts/endpoint-coverage/
          if-no-files-found: ignore
          retention-days: 7
          compression-level: 6

      - name: Build lane manifest
        id: manifest
        env:
          INPUT_LANE_MANIFEST_JSON: ${{ inputs.lane_manifest_json }}
          LANE_MANIFEST_RUN_ID: ${{ inputs.lane_manifest_run_id }}
          LANE_MANIFEST_ARTIFACT_NAME: ${{ inputs.lane_manifest_artifact_name }}
          RESUME_SOURCE_RUN_ID: ${{ inputs.resume_source_run_id }}
          REQUESTED_CHAIN_ID: ${{ inputs.chain_id }}
          CHAIN_ID: ${{ env.ACTIVE_CHAIN_ID }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BACKFILL_ENDPOINTS: ${{ inputs.backfill_endpoints }}
          BACKFILL_PATTERNS: ${{ inputs.backfill_patterns }}
          CHUNK_PROFILE: ${{ env.FULL_EXTRACTION_CHUNK_PROFILE }}
          RETRY_PIPELINE_FAILURES: ${{ inputs.retry_pipeline_failures }}
          MATRIX_BATCH_SIZE: ${{ inputs.matrix_batch_size }}
          ITERATION: ${{ inputs.iteration }}
        run: |
          mkdir -p artifacts/full-extraction
          args=(
            plan
            --iteration "$ITERATION"
            --max-matrix-lanes "$MATRIX_BATCH_SIZE"
            --output-path artifacts/full-extraction/manifest.json
          )
          if [ -n "$INPUT_LANE_MANIFEST_JSON" ]; then
            manifest_chars="$(python - <<'PY'
          import os
          print(len(os.environ.get("INPUT_LANE_MANIFEST_JSON", "")))
          PY
          )"
            if [ "$manifest_chars" -gt 60000 ]; then
              echo "::error::lane_manifest_json is ${manifest_chars} chars; use lane_manifest_run_id/lane_manifest_artifact_name artifact handoff"
              exit 1
            fi
            args+=(--lane-manifest-json "$INPUT_LANE_MANIFEST_JSON")
          elif [ -n "$LANE_MANIFEST_RUN_ID" ] || [ -n "$LANE_MANIFEST_ARTIFACT_NAME" ]; then
            if [ -z "$LANE_MANIFEST_RUN_ID" ] || [ -z "$LANE_MANIFEST_ARTIFACT_NAME" ]; then
              echo "::error::lane_manifest_run_id and lane_manifest_artifact_name must be provided together"
              exit 1
            fi
            if [ -z "$REQUESTED_CHAIN_ID" ]; then
              echo "::error::lane_manifest_run_id requires chain_id so workflow concurrency and discovery artifacts retain the original chain identity"
              exit 1
            fi
            mkdir -p "$RUNNER_TEMP/lane-manifest-input"
            gh run download "$LANE_MANIFEST_RUN_ID" \
              --repo "${{ github.repository }}" \
              --name "$LANE_MANIFEST_ARTIFACT_NAME" \
              --dir "$RUNNER_TEMP/lane-manifest-input"
            manifest_path="$(find "$RUNNER_TEMP/lane-manifest-input" \( -name next-manifest.json -o -name manifest.json \) -type f -print -quit)"
            if [ -z "$manifest_path" ]; then
              echo "::error::Manifest artifact $LANE_MANIFEST_ARTIFACT_NAME from run $LANE_MANIFEST_RUN_ID did not contain next-manifest.json or manifest.json"
              find "$RUNNER_TEMP/lane-manifest-input" -maxdepth 4 -type f -print || true
              exit 1
            fi
            MANIFEST_PATH="$manifest_path" \
              ARTIFACT_NAME="$LANE_MANIFEST_ARTIFACT_NAME" \
              REQUESTED_CHAIN_ID="$REQUESTED_CHAIN_ID" \
              python - <<'PY'
          # MANUAL_HANDOFF_CHAIN_VERIFIER
          import json
          import os
          import re
          from pathlib import Path

          manifest = json.loads(
              Path(os.environ["MANIFEST_PATH"]).read_text(encoding="utf-8")
          )
          requested = os.environ["REQUESTED_CHAIN_ID"]
          expected_source_sha = os.environ["WORKFLOW_SOURCE_SHA"].lower()
          artifact_name = os.environ["ARTIFACT_NAME"]
          chain_state = manifest.get("chain_state", {})
          manifest_ids = {
              str(value).strip()
              for value in (
                  manifest.get("chain_id"),
                  chain_state.get("chain_id") if isinstance(chain_state, dict) else None,
              )
              if str(value or "").strip()
          }
          mismatched_ids = sorted(value for value in manifest_ids if value != requested)
          if mismatched_ids:
              print(
                  "::error::Manifest chain identity does not match requested chain_id "
                  f"{requested!r}: {mismatched_ids}"
              )
              raise SystemExit(1)

          manifest_source_sha = str(manifest.get("workflow_source_sha") or "").lower()
          if manifest_source_sha != expected_source_sha:
              print(
                  "::error::Manifest source SHA does not match the pinned workflow source "
                  f"{expected_source_sha!r}: {manifest_source_sha or '<missing>'!r}"
              )
              raise SystemExit(1)

          initial_name = f"full-extraction-manifest-{requested}"
          chained_name = re.fullmatch(
              rf"full-extraction-next-manifest-{re.escape(requested)}-iter-[1-9][0-9]*",
              artifact_name,
          )
          standard_name = artifact_name.startswith(
              ("full-extraction-manifest-", "full-extraction-next-manifest-")
          )
          if standard_name and artifact_name != initial_name and chained_name is None:
              print(
                  "::error::Manifest artifact name does not match requested chain_id "
                  f"{requested!r}: {artifact_name!r}"
              )
              raise SystemExit(1)
          if not manifest_ids and artifact_name != initial_name and chained_name is None:
              print(
                  "::error::Unable to verify original chain identity from the manifest "
                  f"or artifact name {artifact_name!r}"
              )
              raise SystemExit(1)
          print(f"Verified manual manifest handoff for chain {requested}")
          PY
            cp "$manifest_path" artifacts/full-extraction/input-manifest.json
            args+=(--lane-manifest-path artifacts/full-extraction/input-manifest.json)
          elif [ -n "$RESUME_SOURCE_RUN_ID" ]; then
            if [ -z "$REQUESTED_CHAIN_ID" ]; then
              echo "::error::resume_source_run_id requires chain_id so source artifacts can be resolved; use the original chain id, usually the source run id"
              exit 1
            fi
            mkdir -p "$RUNNER_TEMP/resume-source/manifest" "$RUNNER_TEMP/resume-source/metadata"
            gh run download "$RESUME_SOURCE_RUN_ID" \
              --repo "${{ github.repository }}" \
              --name "full-extraction-manifest-${CHAIN_ID}" \
              --dir "$RUNNER_TEMP/resume-source/manifest"
            metadata_inventory="$RUNNER_TEMP/resume-source/metadata-artifacts.txt"
            if ! gh api \
              "repos/${{ github.repository }}/actions/runs/${RESUME_SOURCE_RUN_ID}/artifacts?per_page=100" \
              --paginate \
              --jq '.artifacts[] | select(.expired == false) | .name' \
              > "$metadata_inventory"; then
              echo "::error::Unable to enumerate resume-source artifacts for run $RESUME_SOURCE_RUN_ID"
              exit 1
            fi
            matching_metadata="$RUNNER_TEMP/resume-source/matching-metadata-artifacts.txt"
            METADATA_INVENTORY="$metadata_inventory" \
              MATCHING_METADATA="$matching_metadata" \
              CHAIN_ID="$CHAIN_ID" \
              python - <<'PY'
          import os
          from pathlib import Path

          inventory = Path(os.environ["METADATA_INVENTORY"])
          output = Path(os.environ["MATCHING_METADATA"])
          prefix = f"extraction-lane-metadata-{os.environ['CHAIN_ID']}-"
          names = sorted(
              {
                  line.strip()
                  for line in inventory.read_text(encoding="utf-8").splitlines()
                  if line.strip().startswith(prefix)
              }
          )
          output.write_text("".join(f"{name}\n" for name in names), encoding="utf-8")
          PY
            if [ -s "$matching_metadata" ]; then
              while IFS= read -r metadata_name; do
                metadata_dir="$RUNNER_TEMP/resume-source/metadata/$metadata_name"
                mkdir -p "$metadata_dir"
                gh run download "$RESUME_SOURCE_RUN_ID" \
                  --repo "${{ github.repository }}" \
                  --name "$metadata_name" \
                  --dir "$metadata_dir"
              done < "$matching_metadata"
            else
              echo "::notice::Resume source run $RESUME_SOURCE_RUN_ID has no lane metadata artifacts; recovery will re-plan from the manifest"
            fi
            source_manifest="$(find "$RUNNER_TEMP/resume-source/manifest" -name manifest.json -type f -print -quit)"
            if [ -z "$source_manifest" ]; then
              echo "::error::Resume source run $RESUME_SOURCE_RUN_ID did not provide full-extraction-manifest-${CHAIN_ID}/manifest.json"
              find "$RUNNER_TEMP/resume-source/manifest" -maxdepth 4 -type f -print || true
              exit 1
            fi
            MANIFEST_PATH="$source_manifest" \
              REQUESTED_CHAIN_ID="$REQUESTED_CHAIN_ID" \
              python - <<'PY'
          # RESUME_SOURCE_MANIFEST_VERIFIER
          import json
          import os
          from pathlib import Path

          manifest = json.loads(
              Path(os.environ["MANIFEST_PATH"]).read_text(encoding="utf-8")
          )
          requested_chain_id = os.environ["REQUESTED_CHAIN_ID"]
          expected_source_sha = os.environ["WORKFLOW_SOURCE_SHA"].lower()
          manifest_chain_id = str(manifest.get("chain_id") or "").strip()
          manifest_source_sha = str(manifest.get("workflow_source_sha") or "").lower()

          if manifest_chain_id != requested_chain_id:
              print(
                  "::error::Resume source manifest chain identity does not match "
                  f"requested chain_id {requested_chain_id!r}: "
                  f"{manifest_chain_id or '<missing>'!r}"
              )
              raise SystemExit(1)
          if manifest_source_sha != expected_source_sha:
              print(
                  "::error::Resume source manifest SHA does not match the pinned "
                  f"workflow source {expected_source_sha!r}: "
                  f"{manifest_source_sha or '<missing>'!r}"
              )
              raise SystemExit(1)
          print(
              f"Verified resume source manifest for chain {requested_chain_id} "
              f"at {expected_source_sha}"
          )
          PY
            resume_args=(
              resume
              --lane-manifest-path "$source_manifest"
              --metadata-dir "$RUNNER_TEMP/resume-source/metadata"
              --completed-artifact-run-id "$RESUME_SOURCE_RUN_ID"
              --chunk-profile "$CHUNK_PROFILE"
              --iteration "$ITERATION"
              --max-matrix-lanes "$MATRIX_BATCH_SIZE"
              --allow-missing-attempted-metadata
              --output-path artifacts/full-extraction/resume-source-manifest.json
            )
            if [ "$RETRY_PIPELINE_FAILURES" = "true" ]; then
              resume_args+=(--allow-pipeline-failures)
            fi
            uv run python -m nbadb.orchestrate.full_extraction_control "${resume_args[@]}" \
              > artifacts/full-extraction/resume-source-manifest.stdout.json
            uv run python -m nbadb.orchestrate.full_extraction_control audit \
              --metadata-dir "$RUNNER_TEMP/resume-source/metadata" \
              --output-path artifacts/full-extraction/resume-source-audit.json \
              > artifacts/full-extraction/resume-source-audit.stdout.json
            cp "$source_manifest" artifacts/full-extraction/resume-source-input-manifest.json
            args+=(--lane-manifest-path artifacts/full-extraction/resume-source-manifest.json)
          else
            args+=(--support-matrix-path artifacts/endpoint-coverage/endpoint-support-matrix.json)
            args+=(--chunk-profile "$CHUNK_PROFILE")
          fi
          [ -n "$BACKFILL_PATTERNS" ]  && args+=(--backfill-patterns "$BACKFILL_PATTERNS")
          [ -n "$BACKFILL_ENDPOINTS" ] && args+=(--backfill-endpoints "$BACKFILL_ENDPOINTS")

          uv run python -m nbadb.orchestrate.full_extraction_control "${args[@]}" > artifacts/full-extraction/manifest.stdout.json

          if [ -n "$RESUME_SOURCE_RUN_ID" ]; then
            SOURCE_MANIFEST_PATH=artifacts/full-extraction/resume-source-input-manifest.json \
              RESUME_MANIFEST_PATH=artifacts/full-extraction/resume-source-manifest.json \
              RESUME_AUDIT_PATH=artifacts/full-extraction/resume-source-audit.json \
              FINAL_MANIFEST_PATH=artifacts/full-extraction/manifest.json \
              uv run python - <<'PY'
          # RESUME_SOURCE_PENDING_CONTRACT_BLOCKED_EVIDENCE
          import json
          import os
          from pathlib import Path

          from nbadb.orchestrate.full_extraction_control import (
              _canonical_contract_blocked_audit_row,
              _hash_payload,
          )

          def canonical_rows(
              raw_rows: object,
              *,
              label: str,
          ) -> list[dict[str, object]]:
              if not isinstance(raw_rows, list):
                  raise SystemExit(f"{label} blocked evidence must be a list")
              rows: list[dict[str, object]] = []
              seen: set[str] = set()
              for raw_row in raw_rows:
                  if not isinstance(raw_row, dict):
                      raise SystemExit(f"{label} blocked evidence rows must be objects")
                  lane_id = str(raw_row.get("lane_id") or "").strip()
                  if not lane_id or lane_id in seen:
                      raise SystemExit(f"{label} blocked lane IDs must be unique")
                  canonical_input = dict(raw_row)
                  canonical_input["lane_kind"] = raw_row.get("kind")
                  try:
                      row = _canonical_contract_blocked_audit_row(
                          lane_id,
                          canonical_input,
                      )
                  except ValueError as exc:
                      raise SystemExit(
                          f"{label} blocked evidence is invalid for {lane_id}: {exc}"
                      ) from exc
                  if _hash_payload(row) != _hash_payload(raw_row):
                      raise SystemExit(
                          f"{label} blocked evidence is not canonical for {lane_id}"
                      )
                  seen.add(lane_id)
                  rows.append(row)
              return sorted(rows, key=lambda row: str(row["lane_id"]))

          def bundle(rows: list[dict[str, object]]) -> dict[str, object]:
              return {"schema_version": 1, "contract_blocked_lanes": rows}

          source_manifest = json.loads(
              Path(os.environ["SOURCE_MANIFEST_PATH"]).read_text(encoding="utf-8")
          )
          resume_manifest = json.loads(
              Path(os.environ["RESUME_MANIFEST_PATH"]).read_text(encoding="utf-8")
          )
          audit = json.loads(
              Path(os.environ["RESUME_AUDIT_PATH"]).read_text(encoding="utf-8")
          )
          final_path = Path(os.environ["FINAL_MANIFEST_PATH"])
          final_manifest = json.loads(final_path.read_text(encoding="utf-8"))
          if not all(
              isinstance(value, dict)
              for value in (source_manifest, resume_manifest, audit, final_manifest)
          ):
              raise SystemExit("resume source pending-evidence inputs must be objects")

          raw_source_lanes = source_manifest.get("lanes")
          if not isinstance(raw_source_lanes, list):
              raise SystemExit("resume source manifest lanes must be a list")
          source_lanes: dict[str, dict[str, object]] = {}
          for lane in raw_source_lanes:
              if not isinstance(lane, dict):
                  raise SystemExit("resume source manifest lanes must be objects")
              lane_id = str(lane.get("lane_id") or "").strip()
              if not lane_id or lane_id in source_lanes:
                  raise SystemExit("resume source manifest lane IDs must be unique")
              source_lanes[lane_id] = lane

          scope_fields = (
              ("kind", "lane_kind"),
              ("endpoints", "endpoints"),
              ("patterns", "patterns"),
              ("season_start", "season_start"),
              ("season_end", "season_end"),
              ("season_types", "season_types"),
              ("context_measures", "context_measures"),
              ("coverage_units_hash", "coverage_units_hash"),
          )

          def require_source_scope(row: dict[str, object], *, label: str) -> None:
              lane_id = str(row["lane_id"])
              lane = source_lanes.get(lane_id)
              if lane is None:
                  raise SystemExit(f"{label} blocked evidence is outside source manifest: {lane_id}")
              for row_field, lane_field in scope_fields:
                  if row.get(row_field) != lane.get(lane_field):
                      raise SystemExit(
                          f"{label} blocked evidence scope does not match source manifest "
                          f"for {lane_id}: {row_field}"
                      )

          audit_rows = canonical_rows(
              audit.get("contract_blocked_lanes", []),
              label="resume source audit",
          )
          pending_by_id: dict[str, dict[str, object]] = {}
          for lane_id, lane in source_lanes.items():
              canonical_input = dict(lane)
              canonical_input["lane_kind"] = lane.get("lane_kind")
              try:
                  row = _canonical_contract_blocked_audit_row(
                      lane_id,
                      canonical_input,
                  )
              except ValueError:
                  continue
              require_source_scope(row, label="derived resume source")
              pending_by_id[lane_id] = row
          for row in audit_rows:
              require_source_scope(row, label="resume source audit")
              lane_id = str(row["lane_id"])
              prior = pending_by_id.get(lane_id)
              if prior is not None and _hash_payload(prior) != _hash_payload(row):
                  raise SystemExit(f"resume source blocked evidence changed for {lane_id}")
              pending_by_id[lane_id] = row

          resume_summary = resume_manifest.get("resume_summary")
          if not isinstance(resume_summary, dict):
              raise SystemExit("resume source manifest lacks resume_summary")
          expected_count = int(resume_summary.get("contract_blocked_lane_count", -1))
          if expected_count != len(pending_by_id):
              raise SystemExit(
                  "resume source contract-blocked count does not match validated evidence"
              )

          chain_state = final_manifest.get("chain_state")
          if not isinstance(chain_state, dict):
              raise SystemExit("final resume source manifest chain_state must be an object")
          committed_rows = canonical_rows(
              chain_state.get("contract_blocked_evidence", []),
              label="resume source committed chain-state",
          )
          committed_digest = str(
              chain_state.get("contract_blocked_evidence_sha256") or ""
          )
          if committed_rows or committed_digest:
              if _hash_payload(bundle(committed_rows)) != committed_digest:
                  raise SystemExit(
                      "resume source committed blocked evidence digest does not match"
                  )
          committed_by_id = {str(row["lane_id"]): row for row in committed_rows}
          existing_pending_rows = canonical_rows(
              chain_state.get("pending_contract_blocked_evidence", []),
              label="resume source existing pending chain-state",
          )
          existing_pending_digest = str(
              chain_state.get("pending_contract_blocked_evidence_sha256") or ""
          )
          if existing_pending_rows:
              if _hash_payload(bundle(existing_pending_rows)) != existing_pending_digest:
                  raise SystemExit(
                      "resume source existing pending blocked evidence digest does not match"
                  )
          elif existing_pending_digest:
              raise SystemExit(
                  "resume source existing pending blocked evidence digest has no rows"
              )
          combined_pending_by_id = {
              str(row["lane_id"]): row for row in existing_pending_rows
          }
          for lane_id, row in pending_by_id.items():
              existing = combined_pending_by_id.get(lane_id)
              if existing is not None and _hash_payload(existing) != _hash_payload(row):
                  raise SystemExit(
                      f"resume source pending blocked evidence changed for {lane_id}"
                  )
              combined_pending_by_id[lane_id] = row
          pending_rows: list[dict[str, object]] = []
          for lane_id in sorted(combined_pending_by_id):
              row = combined_pending_by_id[lane_id]
              committed = committed_by_id.get(lane_id)
              if committed is not None:
                  if _hash_payload(committed) != _hash_payload(row):
                      raise SystemExit(
                          f"resume source blocked evidence conflicts with ancestry for {lane_id}"
                      )
                  continue
              pending_rows.append(row)

          pending_bundle = bundle(pending_rows)
          chain_state["pending_contract_blocked_evidence"] = pending_rows
          chain_state["pending_contract_blocked_evidence_sha256"] = (
              _hash_payload(pending_bundle) if pending_rows else ""
          )
          final_path.write_text(
              json.dumps(final_manifest, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          PY
          fi

          python - <<'PY'
          import json
          import os
          from pathlib import Path

          manifest = json.loads(Path("artifacts/full-extraction/manifest.json").read_text(encoding="utf-8"))
          manifest["chain_id"] = os.environ["CHAIN_ID"]
          manifest["workflow_source_sha"] = os.environ["WORKFLOW_SOURCE_SHA"].lower()
          Path("artifacts/full-extraction/manifest.json").write_text(
              json.dumps(manifest, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          compact_matrix = json.dumps(manifest["github_matrix"], separators=(",", ":"))
          compact_quarantined_servers = json.dumps(
              manifest.get("chain_state", {}).get("vpn_quarantined_servers", []),
              separators=(",", ":"),
          )

          with Path(os.environ["GITHUB_OUTPUT"]).open("a", encoding="utf-8") as handle:
              handle.write(f"extract-matrix={compact_matrix}\n")
              handle.write(f"lane-count={manifest['lane_count']}\n")
              handle.write(f"active-lane-count={manifest.get('active_lane_count', 0)}\n")
              handle.write(f"matrix-lane-count={manifest.get('matrix_lane_count', 0)}\n")
              handle.write(f"deferred-lane-count={manifest.get('deferred_lane_count', 0)}\n")
              handle.write(f"vpn-quarantined-servers-json={compact_quarantined_servers}\n")
              handle.write(f"chunk-profile={manifest.get('chunk_profile', '')}\n")
              handle.write(f"coverage-fingerprint={manifest.get('coverage_fingerprint', '')}\n")
              handle.write(f"planned-wave-count={manifest.get('planned_wave_count', 0)}\n")
              handle.write(f"iteration-budget={manifest.get('iteration_budget', 0)}\n")
              handle.write(
                  f"max-matrix-lanes={manifest.get('scheduler_diagnostics', {}).get('max_matrix_lanes', 0)}\n"
              )
          PY

      - name: Validate targeted smoke plan
        if: ${{ inputs.targeted_smoke }}
        env:
          LANE_COUNT: ${{ steps.manifest.outputs.lane-count }}
          ACTIVE_LANE_COUNT: ${{ steps.manifest.outputs.active-lane-count }}
          MATRIX_LANE_COUNT: ${{ steps.manifest.outputs.matrix-lane-count }}
          DEFERRED_LANE_COUNT: ${{ steps.manifest.outputs.deferred-lane-count }}
        run: |
          set -euo pipefail
          if [ "$LANE_COUNT" != "1" ] || \
             [ "$ACTIVE_LANE_COUNT" != "1" ] || \
             [ "$MATRIX_LANE_COUNT" != "1" ] || \
             [ "$DEFERRED_LANE_COUNT" != "0" ]; then
            echo "::error::Targeted smoke plan must contain exactly one active matrix lane and no deferred lanes"
            exit 1
          fi

      - name: Plan summary
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          manifest = json.loads(Path("artifacts/full-extraction/manifest.json").read_text(encoding="utf-8"))
          lanes = manifest.get("lanes", [])
          with Path(os.environ["GITHUB_STEP_SUMMARY"]).open("a", encoding="utf-8") as handle:
              handle.write("## Lane Plan\n")
              handle.write(f"**Lane count:** {manifest.get('lane_count', 0)}\n")
              handle.write(f"**Active lanes:** {manifest.get('active_lane_count', 0)}\n")
              handle.write(f"**This wave:** {manifest.get('matrix_lane_count', 0)}\n")
              handle.write(f"**Deferred lanes:** {manifest.get('deferred_lane_count', 0)}\n")
              handle.write(f"**Chunk profile:** {manifest.get('chunk_profile', '')}\n")
              handle.write(f"**Coverage fingerprint:** `{manifest.get('coverage_fingerprint', '')}`\n")
              handle.write(f"**Planned waves:** {manifest.get('planned_wave_count', 0)}\n")
              handle.write(f"**Iteration budget:** {manifest.get('iteration_budget', 0)}\n")
              for lane in lanes:
                  season_range = "n/a"
                  if lane.get("season_start") is not None and lane.get("season_end") is not None:
                      season_range = f"{lane['season_start']}:{lane['season_end']}"
                  handle.write(
                      f"- `{lane['lane_id']}` ({lane['lane_kind']}) "
                      f"patterns={','.join(lane.get('patterns', [])) or 'none'} "
                      f"seasons={season_range} "
                      f"resume_only={lane.get('resume_only', False)}\n"
                  )
          PY

      - name: Upload lane manifest
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          overwrite: true
          name: full-extraction-manifest-${{ env.ACTIVE_CHAIN_ID }}
          path: |
            artifacts/full-extraction/manifest.json
            artifacts/full-extraction/manifest.stdout.json
            artifacts/full-extraction/input-manifest.json
            artifacts/full-extraction/resume-source-manifest.json
            artifacts/full-extraction/resume-source-manifest.stdout.json
            artifacts/endpoint-coverage/
          if-no-files-found: ignore
          retention-days: 30
          compression-level: 6

  publication_preflight:
    needs: workflow_guard
    if: ${{ inputs.publish }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ env.WORKFLOW_SOURCE_SHA }}

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          enable-cache: true

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - run: uv sync

      - name: Fail fast on Kaggle publication readiness
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          EVENT_REF_NAME: ${{ github.ref_name }}
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
          WORKFLOW_SOURCE_REF: ${{ env.WORKFLOW_SOURCE_REF }}
        run: |
          set -euo pipefail
          if [ "$EVENT_REF_NAME" != "$DEFAULT_BRANCH" ] || [ "$WORKFLOW_SOURCE_REF" != "$DEFAULT_BRANCH" ]; then
            echo "::error::publish=true requires the default branch '$DEFAULT_BRANCH'; event_ref='$EVENT_REF_NAME' workflow_source_ref='$WORKFLOW_SOURCE_REF'"
            exit 1
          fi
          if [ -z "${KAGGLE_USERNAME:-}" ] || [ -z "${KAGGLE_KEY:-}" ]; then
            echo "::error::KAGGLE_USERNAME and KAGGLE_KEY are required when publish=true"
            exit 1
          fi
          uv run python - <<'PY'
          from nbadb.kaggle.client import KaggleClient

          try:
              result = KaggleClient().publication_preflight()
          except Exception as exc:
              print(
                  "::error::Kaggle publication preflight failed "
                  f"({type(exc).__name__})"
              )
              raise SystemExit(1) from None
          if result.get("acceptable") is not True:
              raise SystemExit("Kaggle publication preflight was not acceptable")
          version = result.get("version")
          if isinstance(version, bool) or not isinstance(version, int) or version <= 0:
              raise SystemExit("Kaggle publication preflight did not resolve an exact version")
          print(f"Kaggle publication preflight passed at exact remote version {version}")
          PY

  preflight:
    needs: [plan, publication_preflight]
    if: ${{ always() && needs.plan.result == 'success' && needs.plan.outputs.matrix-lane-count != '0' && (!inputs.publish || needs.publication_preflight.result == 'success') }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    outputs:
      effective-network-mode: ${{ steps.network_mode.outputs.effective-network-mode }}
      vpn-auth-source: ${{ steps.vpn.outputs.auth-source }}
      vpn-server: ${{ steps.vpn.outputs.server }}
      vpn-quarantined-servers-json: ${{ steps.vpn_quarantine.outputs.vpn-quarantined-servers-json }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ env.WORKFLOW_SOURCE_SHA }}

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          enable-cache: true

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - run: uv sync

      - name: Validate VPN credentials are present
        if: ${{ inputs.network_mode != 'direct' }}
        env:
          OPENVPN_USER: ${{ secrets.OPENVPN_USER }}
          OPENVPN_PASSWORD: ${{ secrets.OPENVPN_PASSWORD }}
          NORDVPN_TOKEN: ${{ secrets.NORDVPN_TOKEN }}
        run: |
          if [ -n "$OPENVPN_USER" ] || [ -n "$OPENVPN_PASSWORD" ]; then
            if [ -z "$OPENVPN_USER" ] || [ -z "$OPENVPN_PASSWORD" ]; then
              echo "::error::OPENVPN_USER and OPENVPN_PASSWORD must both be set when using direct OpenVPN credentials"
              exit 1
            fi
            exit 0
          fi
          if [ -z "$NORDVPN_TOKEN" ]; then
            echo "::error::Provide OPENVPN_USER/OPENVPN_PASSWORD or NORDVPN_TOKEN before running full extraction"
            exit 1
          fi

      - name: Download lane manifest
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: full-extraction-manifest-${{ env.ACTIVE_CHAIN_ID }}
          path: plan-artifact/

      - name: Validate planned lanes
        run: |
          mkdir -p artifacts/full-extraction
          manifest_path="$(find plan-artifact -name manifest.json -type f -print -quit)"
          if [ -z "$manifest_path" ]; then
            echo "::error::Plan artifact did not contain manifest.json"
            find plan-artifact -maxdepth 4 -type f -print || true
            exit 1
          fi
          cp "$manifest_path" artifacts/full-extraction/preflight-manifest.json
          uv run python - <<'PY'
          import json
          from pathlib import Path

          from nbadb.orchestrate.full_extraction_control import normalize_manifest, validate_manifest

          raw_manifest = json.loads(
              Path("artifacts/full-extraction/preflight-manifest.json").read_text(encoding="utf-8")
          )
          manifest = normalize_manifest(raw_manifest)
          validate_manifest(list(manifest.lanes))
          PY

      - name: Preflight VPN validation
        id: vpn
        if: ${{ inputs.network_mode != 'direct' }}
        timeout-minutes: 7
        continue-on-error: true
        env:
          OPENVPN_USER: ${{ secrets.OPENVPN_USER }}
          OPENVPN_PASSWORD: ${{ secrets.OPENVPN_PASSWORD }}
          NORDVPN_TOKEN: ${{ secrets.NORDVPN_TOKEN }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
          SERVER_LIMIT: "4"
          SERVER_POOL_SIZE: "96"
          FALLBACK_TECHNOLOGY: "openvpn_tcp"
          CONNECT_TIMEOUT_SECONDS: "60"
          OVERALL_TIMEOUT_SECONDS: "300"
          QUARANTINED_SERVERS_JSON: ${{ needs.plan.outputs.vpn-quarantined-servers-json }}
        run: |
          export LANE_INDEX=$((RUN_ATTEMPT - 1))
          set +e
          bash .github/scripts/run_with_deadline.sh \
            350 \
            10 \
            python3 .github/actions/nordvpn-connect/supervise.py
          rc=$?
          exit "$rc"

      - name: Resolve effective network mode
        id: network_mode
        if: always()
        env:
          REQUESTED_NETWORK_MODE: ${{ inputs.network_mode }}
          VPN_STATUS: ${{ steps.vpn.outputs.status }}
          VPN_AUTH_SOURCE: ${{ steps.vpn.outputs.auth-source }}
          VPN_SERVER: ${{ steps.vpn.outputs.server }}
          VPN_EXIT_IP: ${{ steps.vpn.outputs.exit-ip }}
        run: |
          requested="${REQUESTED_NETWORK_MODE:-vpn}"
          status="${VPN_STATUS:-unknown}"
          auth_source="${VPN_AUTH_SOURCE:-}"
          effective="$requested"

          if [ "$status" = "connected" ]; then
            case "$auth_source" in
              configured|token) ;;
              *)
                echo "::error::VPN connected without a valid credential-source attestation"
                exit 1
                ;;
            esac
          fi

          if [ "$requested" = "direct" ]; then
            effective="direct"
            echo "::notice::Skipping VPN preflight; direct no-VPN extraction requested"
          elif [ "$requested" = "auto" ]; then
            if [ "$status" = "connected" ]; then
              effective="vpn"
              echo "::notice::Preflight VPN validation connected via ${VPN_SERVER:-unknown} (${VPN_EXIT_IP:-unknown}); using VPN extraction"
            else
              effective="direct"
              echo "::warning::Preflight VPN validation returned ${status}; falling back to direct no-VPN extraction"
            fi
          elif [ "$requested" = "vpn" ]; then
            effective="vpn"
            if [ "$status" = "connected" ]; then
              echo "::notice::Preflight VPN validation connected via ${VPN_SERVER:-unknown} (${VPN_EXIT_IP:-unknown})"
            else
              echo "::error::Preflight VPN validation returned ${status}; refusing requested VPN extraction"
              exit 1
            fi
          else
            echo "::error::Unsupported network_mode: $requested"
            exit 1
          fi

          {
            echo "effective-network-mode=$effective"
          } >> "$GITHUB_OUTPUT"

      - name: Carry preflight VPN failures into the chain quarantine
        id: vpn_quarantine
        if: always()
        env:
          CHAIN_QUARANTINE_JSON: ${{ needs.plan.outputs.vpn-quarantined-servers-json }}
          PREFLIGHT_FAILED_JSON: ${{ steps.vpn.outputs.failed-servers-json }}
        run: |
          python3 - <<'PY'
          # PREFLIGHT_VPN_QUARANTINE
          import json
          import os
          from pathlib import Path

          combined: list[str] = []
          for name in ("CHAIN_QUARANTINE_JSON", "PREFLIGHT_FAILED_JSON"):
              raw = os.environ.get(name, "") or "[]"
              try:
                  values = json.loads(raw)
              except json.JSONDecodeError as exc:
                  raise SystemExit(f"{name} is not valid JSON: {exc}") from exc
              if not isinstance(values, list):
                  raise SystemExit(f"{name} must be a JSON array")
              for value in values:
                  server = str(value).strip()
                  if server and server not in combined:
                      combined.append(server)

          output_path = Path(os.environ["GITHUB_OUTPUT"])
          with output_path.open("a", encoding="utf-8") as handle:
              handle.write(
                  "vpn-quarantined-servers-json="
                  + json.dumps(combined, separators=(",", ":"))
                  + "\n"
              )
          PY

      - name: Summarize preflight network mode
        if: always()
        env:
          EFFECTIVE_NETWORK_MODE: ${{ steps.network_mode.outputs.effective-network-mode }}
          REQUESTED_NETWORK_MODE: ${{ inputs.network_mode }}
          VPN_AUTH_SOURCE: ${{ steps.vpn.outputs.auth-source }}
        run: |
          {
            echo "## Network Preflight"
            echo "**Requested network mode:** ${REQUESTED_NETWORK_MODE:-vpn}"
            echo "**Effective network mode:** ${EFFECTIVE_NETWORK_MODE:-vpn}"
            if [ "${EFFECTIVE_NETWORK_MODE:-vpn}" = "vpn" ]; then
              echo "**Validated VPN credential source:** ${VPN_AUTH_SOURCE:-unknown}"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Disconnect preflight VPN
        if: ${{ always() && inputs.network_mode != 'direct' }}
        uses: ./.github/actions/nordvpn-disconnect
        with:
          pid: ${{ steps.vpn.outputs.pid }}
          pid-file: ${{ steps.vpn.outputs.pid-file }}
          work-dir: ${{ steps.vpn.outputs.work-dir }}

  discovery_seed:
    needs: [plan, preflight]
    if: ${{ always() && needs.plan.outputs.matrix-lane-count != '0' && needs.preflight.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      actions: read
      contents: read
    outputs:
      vpn-server: ${{ steps.vpn.outputs.server }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ env.WORKFLOW_SOURCE_SHA }}

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          enable-cache: true

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - run: uv sync

      - name: Download lane manifest
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: full-extraction-manifest-${{ env.ACTIVE_CHAIN_ID }}
          path: plan-artifact/

      - name: Restore prior discovery artifacts
        if: ${{ inputs.lane_manifest_run_id != '' || inputs.resume_source_run_id != '' || github.run_attempt > 1 }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CURRENT_RUN_ID: ${{ github.run_id }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
          MANIFEST_SOURCE_RUN_ID: ${{ inputs.lane_manifest_run_id || inputs.resume_source_run_id }}
          DISCOVERY_ARTIFACT_NAME: full-extraction-discovery-artifacts-${{ env.ACTIVE_CHAIN_ID }}
          DISCOVERY_RECOVERY_PREFIX: full-extraction-discovery-recovery-${{ env.ACTIVE_CHAIN_ID }}
        run: |
          mkdir -p data/nbadb
          discovery_source=""
          discovery_source_kind=""

          restore_discovery_from_run() {
            local source_run_id="$1"
            local source_label="$2"
            local canonical_dir="prior-discovery-${source_label}-canonical"
            local recovery_dir="prior-discovery-${source_label}-recovery"
            local recovery_pattern="${DISCOVERY_RECOVERY_PREFIX}-run-${source_run_id}-attempt-*"

            rm -rf "$canonical_dir" "$recovery_dir"
            if gh run download "$source_run_id" \
              --repo "${{ github.repository }}" \
              --name "$DISCOVERY_ARTIFACT_NAME" \
              --dir "$canonical_dir"; then
              discovery_source="$canonical_dir"
              discovery_source_kind="canonical"
              echo "::notice::Restored canonical discovery bundle from $source_label run $source_run_id"
              return 0
            fi

            mkdir -p "$recovery_dir"
            if ! gh run download "$source_run_id" \
              --repo "${{ github.repository }}" \
              --pattern "$recovery_pattern" \
              --dir "$recovery_dir"; then
              return 1
            fi
            discovery_source="$(
              find "$recovery_dir" \
                -mindepth 1 \
                -maxdepth 1 \
                -type d \
                -name "$recovery_pattern" \
                -print \
                | sort -V \
                | tail -1
            )"
            if [ -z "$discovery_source" ]; then
              if find "$recovery_dir" -mindepth 1 -type f -print -quit | grep -q .; then
                discovery_source="$recovery_dir"
              else
                return 1
              fi
            fi
            discovery_source_kind="recovery"
            echo "::notice::Restored latest incomplete discovery recovery bundle: $(basename "$discovery_source")"
          }

          if [ "$RUN_ATTEMPT" -gt 1 ]; then
            restore_discovery_from_run "$CURRENT_RUN_ID" "current-run" || true
          fi
          if [ -z "$discovery_source" ] \
            && [ -n "$MANIFEST_SOURCE_RUN_ID" ] \
            && [ "$MANIFEST_SOURCE_RUN_ID" != "$CURRENT_RUN_ID" ]; then
            restore_discovery_from_run "$MANIFEST_SOURCE_RUN_ID" "manifest-source" || true
          fi
          if [ -z "$discovery_source" ]; then
            echo "::warning::Prior discovery artifacts are unavailable; seeding this wave from scratch"
            exit 0
          fi

          artifact_dir="$(find "$discovery_source" -type d -name nba.discovery-artifacts -print -quit)"
          if [ -n "$artifact_dir" ]; then
            rm -rf data/nbadb/nba.discovery-artifacts
            cp -R "$artifact_dir" data/nbadb/nba.discovery-artifacts
          fi

          workload_manifest="$(find "$discovery_source" -type f -name nba.player-team-season-workload.player-team-season-workload.json -print -quit)"
          mapfile -t workload_parquets < <(
            find "$discovery_source" \
              -type f \
              -name 'nba.player-team-season-workload*.parquet' \
              -print
          )
          if [ -n "$workload_manifest" ] && [ "${#workload_parquets[@]}" -gt 0 ]; then
            for workload_parquet in "${workload_parquets[@]}"; do
              cp "$workload_parquet" "data/nbadb/$(basename "$workload_parquet")"
            done
            cp "$workload_manifest" data/nbadb/nba.player-team-season-workload.player-team-season-workload.json
          elif [ "${#workload_parquets[@]}" -gt 0 ] || [ -n "$workload_manifest" ]; then
            if [ "$discovery_source_kind" = "canonical" ]; then
              echo "::error::Canonical discovery workload bundle is incomplete"
              exit 1
            fi
            echo "::warning::Prior player/team workload artifact is incomplete; ignoring it"
            find data/nbadb \
              -maxdepth 1 \
              -type f \
              -name 'nba.player-team-season-workload*.parquet' \
              -delete
            rm -f data/nbadb/nba.player-team-season-workload.player-team-season-workload.json
          elif [ "$discovery_source_kind" = "canonical" ]; then
            echo "::error::Canonical discovery workload bundle is missing"
            exit 1
          fi

          if [ -f data/nbadb/nba.player-team-season-workload.player-team-season-workload.json ]; then
            if ! uv run python - <<'PY'
          from pathlib import Path

          from nbadb.orchestrate.workload_contract import PlayerTeamSeasonWorkloadStore

          store = PlayerTeamSeasonWorkloadStore.from_duckdb_path(Path("data/nbadb/nba.duckdb"))
          if store.integrity_attestation() is None:
              raise SystemExit("restored workload pointer or generation failed integrity validation")
          PY
            then
              if [ "$discovery_source_kind" = "canonical" ]; then
                echo "::error::Canonical discovery workload failed integrity validation"
                exit 1
              fi
              echo "::warning::Discarding invalid recovery workload state before reseeding"
              find data/nbadb \
                -maxdepth 1 \
                -type f \
                -name 'nba.player-team-season-workload*.parquet' \
                -delete
              rm -f data/nbadb/nba.player-team-season-workload.player-team-season-workload.json
            fi
          fi

      - name: Configure discovery seed concurrency
        env:
          EFFECTIVE_NETWORK_MODE: ${{ needs.preflight.outputs.effective-network-mode }}
          SEED_REQUEST_PROFILE: ${{ inputs.concurrency }}
        run: |
          if [ "$EFFECTIVE_NETWORK_MODE" = "direct" ]; then
            seed_concurrency=2
            seed_rate_limit=2
          else
            case "$SEED_REQUEST_PROFILE" in
              conservative)
                seed_concurrency=2
                seed_rate_limit=1
                ;;
              moderate)
                seed_concurrency=3
                seed_rate_limit=2
                ;;
              aggressive)
                seed_concurrency=4
                seed_rate_limit=3
                ;;
              *)
                echo "::error::Unsupported discovery seed concurrency profile: $SEED_REQUEST_PROFILE"
                exit 1
                ;;
            esac
          fi
          {
            echo "NBADB_RATE_LIMIT=$seed_rate_limit"
            echo "NBADB_DISCOVERY_CONCURRENCY=$seed_concurrency"
            echo "NBADB_DISCOVERY_SEED_CONCURRENCY=$seed_concurrency"
          } >> "$GITHUB_ENV"
          echo "::notice::Discovery seed profile: concurrency=$seed_concurrency rate=${seed_rate_limit}/s ($EFFECTIVE_NETWORK_MODE)"

      - name: Connect NordVPN tunnel for discovery seeding
        id: vpn
        if: ${{ needs.preflight.outputs.effective-network-mode == 'vpn' }}
        timeout-minutes: 7
        env:
          OPENVPN_USER: ${{ secrets.OPENVPN_USER }}
          OPENVPN_PASSWORD: ${{ secrets.OPENVPN_PASSWORD }}
          NORDVPN_TOKEN: ${{ secrets.NORDVPN_TOKEN }}
          REQUIRE_TOKEN_AUTH: ${{ needs.preflight.outputs.vpn-auth-source == 'token' && 'true' || 'false' }}
          CONFIGURED_AUTH_PREVALIDATED: ${{ needs.preflight.outputs.vpn-auth-source == 'configured' && 'true' || 'false' }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
          SERVER_LIMIT: "6"
          SERVER_POOL_SIZE: "96"
          FALLBACK_TECHNOLOGY: "openvpn_tcp"
          CONNECT_TIMEOUT_SECONDS: "60"
          OVERALL_TIMEOUT_SECONDS: "300"
          QUARANTINED_SERVERS_JSON: ${{ needs.preflight.outputs.vpn-quarantined-servers-json }}
          PREFERRED_SERVERS_JSON: ${{ format('["{0}"]', needs.preflight.outputs.vpn-server) }}
          PREFERRED_SERVER_SLOT_COUNT: "1"
        run: |
          export LANE_INDEX=$((RUN_ATTEMPT - 1))
          set +e
          bash .github/scripts/run_with_deadline.sh \
            350 \
            10 \
            python3 .github/actions/nordvpn-connect/supervise.py
          rc=$?
          exit "$rc"

      - name: Seed discovery artifacts
        env:
          NBADB_DISCOVERY_SEED_DEADLINE_SECONDS: "5400"
        run: |
          mkdir -p artifacts/discovery data/nbadb
          manifest_path="$(find plan-artifact -name manifest.json -type f -print -quit)"
          if [ -z "$manifest_path" ]; then
            echo "::error::Plan artifact did not contain manifest.json"
            find plan-artifact -maxdepth 4 -type f -print || true
            exit 1
          fi
          cp "$manifest_path" artifacts/discovery/discovery-manifest.json
          bash .github/scripts/run_with_deadline.sh \
            5700 \
            15 \
            uv run python .github/scripts/seed_discovery_artifacts.py \
            --manifest-path artifacts/discovery/discovery-manifest.json \
            --duckdb-path data/nbadb/nba.duckdb \
            --summary-path artifacts/discovery/discovery-seed-summary.json

      - name: Verify complete discovery bundle
        run: |
          uv run python .github/scripts/verify_discovery_bundle.py \
            --summary-path artifacts/discovery/discovery-seed-summary.json \
            --manifest-path artifacts/discovery/discovery-manifest.json \
            --duckdb-path data/nbadb/nba.duckdb

      - name: Upload discovery artifacts
        if: ${{ success() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          overwrite: true
          name: full-extraction-discovery-artifacts-${{ env.ACTIVE_CHAIN_ID }}
          path: |
            data/nbadb/nba.discovery-artifacts/
            data/nbadb/nba.player-team-season-workload.*.parquet
            data/nbadb/nba.player-team-season-workload.player-team-season-workload.json
            artifacts/discovery/discovery-manifest.json
            artifacts/discovery/discovery-seed-summary.json
          if-no-files-found: error
          retention-days: 30
          compression-level: 6

      - name: Upload incomplete discovery recovery artifact
        if: ${{ always() && !success() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          overwrite: true
          name: full-extraction-discovery-recovery-${{ env.ACTIVE_CHAIN_ID }}-run-${{ github.run_id }}-attempt-${{ github.run_attempt }}
          path: |
            data/nbadb/nba.discovery-artifacts/
            data/nbadb/nba.player-team-season-workload.parquet
            data/nbadb/nba.player-team-season-workload.*.parquet
            data/nbadb/nba.player-team-season-workload.player-team-season-workload.json
            artifacts/discovery/discovery-manifest.json
            artifacts/discovery/discovery-seed-summary.json
          if-no-files-found: warn
          retention-days: 30
          compression-level: 6

      - name: Upload discovery seed VPN diagnostics
        if: ${{ always() && needs.preflight.outputs.effective-network-mode == 'vpn' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          overwrite: true
          name: discovery-seed-vpn-diagnostics-${{ env.ACTIVE_CHAIN_ID }}
          path: |
            ${{ runner.temp }}/nordvpn/openvpn.log
            ${{ runner.temp }}/nordvpn/openvpn.pid
            ${{ runner.temp }}/nordvpn/vpn-exit-ip.json
            ${{ runner.temp }}/nordvpn/baseline-ip.json
            ${{ runner.temp }}/nordvpn/*.ovpn
          if-no-files-found: ignore
          retention-days: 7
          compression-level: 6

      - name: Disconnect discovery seed VPN
        if: ${{ always() && needs.preflight.outputs.effective-network-mode == 'vpn' }}
        uses: ./.github/actions/nordvpn-disconnect
        with:
          pid: ${{ steps.vpn.outputs.pid }}
          pid-file: ${{ steps.vpn.outputs.pid-file }}
          work-dir: ${{ steps.vpn.outputs.work-dir }}

  extract:
    needs: [plan, preflight, discovery_seed]
    if: ${{ always() && needs.plan.result == 'success' && needs.preflight.result == 'success' && needs.discovery_seed.result == 'success' && needs.plan.outputs.matrix-lane-count != '0' }}
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      actions: read
      contents: read
    strategy:
      fail-fast: false
      max-parallel: ${{ fromJSON(needs.preflight.outputs.effective-network-mode == 'direct' && inputs.direct_parallelism || (needs.preflight.outputs.vpn-auth-source == 'token' && '1' || inputs.vpn_parallelism)) }}
      matrix: ${{ fromJSON(needs.plan.outputs.extract-matrix) }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ env.WORKFLOW_SOURCE_SHA }}

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          enable-cache: true

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - run: uv sync

      - name: Download discovery artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: full-extraction-discovery-artifacts-${{ env.ACTIVE_CHAIN_ID }}
          path: discovery-artifact/

      # ── Restore attested state from a previous iteration ──
      - name: Restore durable lane state artifact
        id: state_artifact_restore
        if: ${{ matrix.state_artifact_run_id != '' || matrix.state_artifact_name != '' || matrix.state_artifact_digest != '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          STATE_ARTIFACT_RUN_ID: ${{ matrix.state_artifact_run_id }}
          STATE_ARTIFACT_NAME: ${{ matrix.state_artifact_name }}
          STATE_ARTIFACT_DIGEST: ${{ matrix.state_artifact_digest }}
          COVERAGE_UNITS_HASH: ${{ matrix.coverage_units_hash }}
          PATTERNS: ${{ matrix.patterns }}
          SEASON_START: ${{ matrix.season_start }}
          SEASON_END: ${{ matrix.season_end }}
          SEASON_TYPES: ${{ matrix.season_types }}
        run: |
          if [ -z "$STATE_ARTIFACT_RUN_ID" ] || [ -z "$STATE_ARTIFACT_NAME" ] || [ -z "$STATE_ARTIFACT_DIGEST" ]; then
            echo "::error::Run ID, name, and digest are all required for resumable lane ${{ matrix.lane_id }}"
            exit 1
          fi

          mkdir -p "$RUNNER_TEMP/lane-state-artifact" data/nbadb artifacts/extraction
          rm -rf "$RUNNER_TEMP/lane-state-artifact"/*
          if ! gh run download "$STATE_ARTIFACT_RUN_ID" \
            --repo "${{ github.repository }}" \
            --name "$STATE_ARTIFACT_NAME" \
            --dir "$RUNNER_TEMP/lane-state-artifact"; then
            echo "::error::Required state artifact $STATE_ARTIFACT_NAME is unavailable"
            exit 1
          fi
          mapfile -t state_databases < <(find "$RUNNER_TEMP/lane-state-artifact" -name nba.duckdb -type f -print)
          if [ "${#state_databases[@]}" -ne 1 ]; then
            echo "::error::State artifact $STATE_ARTIFACT_NAME must contain exactly one nba.duckdb"
            exit 1
          fi
          mapfile -t state_attestations < <(find "$RUNNER_TEMP/lane-state-artifact" -name lane-state-attestation.json -type f -print)
          if [ "${#state_attestations[@]}" -ne 1 ]; then
            echo "::error::State artifact $STATE_ARTIFACT_NAME must contain exactly one lane-state-attestation.json"
            exit 1
          fi
          state_db="${state_databases[0]}"
          workload_args=()
          if [[ ",$PATTERNS," == *",player_team_season,"* ]]; then
            workload_manifest="$(find discovery-artifact -type f -name nba.player-team-season-workload.player-team-season-workload.json -print -quit)"
            if [ -z "$workload_manifest" ]; then
              echo "::error::Workload-bound lane state requires the active discovery workload manifest"
              exit 1
            fi
            workload_args+=(
              --workload-duckdb-path "$(dirname "$workload_manifest")/nba.duckdb"
              --workload-season-start "$SEASON_START"
              --workload-season-end "$SEASON_END"
              --workload-season-types "$SEASON_TYPES"
            )
          fi
          uv run python .github/scripts/validate_lane_state.py \
            "$state_db" \
            --expected-sha256 "$STATE_ARTIFACT_DIGEST" \
            --require-journal \
            --allow-attested-empty \
            --attestation-path "${state_attestations[0]}" \
            --expected-source-sha "$WORKFLOW_SOURCE_SHA" \
            --expected-chain-id "$ACTIVE_CHAIN_ID" \
            --expected-lane-id "${{ matrix.lane_id }}" \
            --expected-coverage-units-hash "$COVERAGE_UNITS_HASH" \
            --expected-run-id "$STATE_ARTIFACT_RUN_ID" \
            --expected-artifact-name "$STATE_ARTIFACT_NAME" \
            "${workload_args[@]}"
          cp "$state_db" data/nbadb/nba.duckdb
          cp "${state_attestations[0]}" artifacts/extraction/lane-state-attestation.json
          echo "restored=true" >> "$GITHUB_OUTPUT"

      - name: Assess restored state
        id: restore_state
        env:
          STATE_ARTIFACT_RESTORED: ${{ steps.state_artifact_restore.outputs.restored }}
          STATE_ARTIFACT_REQUIRED: ${{ matrix.state_artifact_run_id != '' || matrix.state_artifact_name != '' || matrix.state_artifact_digest != '' }}
          STATE_ARTIFACT_DIGEST: ${{ matrix.state_artifact_digest }}
          STATE_ARTIFACT_RUN_ID: ${{ matrix.state_artifact_run_id }}
          STATE_ARTIFACT_NAME: ${{ matrix.state_artifact_name }}
          COVERAGE_UNITS_HASH: ${{ matrix.coverage_units_hash }}
          PATTERNS: ${{ matrix.patterns }}
          SEASON_START: ${{ matrix.season_start }}
          SEASON_END: ${{ matrix.season_end }}
          SEASON_TYPES: ${{ matrix.season_types }}
        run: |
          mkdir -p data/nbadb
          mark_untrusted() {
            mkdir -p artifacts/extraction
            printf '%s\n' "$1" > artifacts/extraction/lane-state-untrusted
          }
          restore_source="none"
          restore_usable="false"
          if [ "$STATE_ARTIFACT_REQUIRED" = "true" ]; then
            if [ "$STATE_ARTIFACT_RESTORED" != "true" ] || [ ! -f data/nbadb/nba.duckdb ]; then
              mark_untrusted "required durable lane state was not restored"
              echo "::error::Required durable lane state was not restored"
              exit 1
            fi
            restore_source="artifact"
            workload_args=()
            if [[ ",$PATTERNS," == *",player_team_season,"* ]]; then
              workload_manifest="$(find discovery-artifact -type f -name nba.player-team-season-workload.player-team-season-workload.json -print -quit)"
              if [ -z "$workload_manifest" ]; then
                mark_untrusted "active discovery workload manifest is missing"
                echo "::error::Workload-bound lane state requires the active discovery workload manifest"
                exit 1
              fi
              workload_args+=(
                --workload-duckdb-path "$(dirname "$workload_manifest")/nba.duckdb"
                --workload-season-start "$SEASON_START"
                --workload-season-end "$SEASON_END"
                --workload-season-types "$SEASON_TYPES"
              )
            fi
            if ! uv run python .github/scripts/validate_lane_state.py \
              data/nbadb/nba.duckdb \
              --expected-sha256 "$STATE_ARTIFACT_DIGEST" \
              --require-journal \
              --allow-attested-empty \
              --attestation-path artifacts/extraction/lane-state-attestation.json \
              --expected-source-sha "$WORKFLOW_SOURCE_SHA" \
              --expected-chain-id "$ACTIVE_CHAIN_ID" \
              --expected-lane-id "${{ matrix.lane_id }}" \
              --expected-coverage-units-hash "$COVERAGE_UNITS_HASH" \
              --expected-run-id "$STATE_ARTIFACT_RUN_ID" \
              --expected-artifact-name "$STATE_ARTIFACT_NAME" \
              "${workload_args[@]}"; then
              mark_untrusted "durable lane state failed exact validation"
              exit 1
            fi
            restore_usable="true"
          elif [ -e data/nbadb/nba.duckdb ] || [ -e data/nbadb/nba.duckdb.wal ]; then
            mark_untrusted "fresh lane contains unexpected DuckDB state"
            echo "::error::Fresh lane contains unexpected unattested DuckDB state"
            exit 1
          fi

          restart_mode="clean-restart"
          if [ "$restore_usable" = "true" ]; then
            restart_mode="resume"
          fi

          {
            echo "restore-source=$restore_source"
            echo "restore-usable=$restore_usable"
            echo "restart-mode=$restart_mode"
          } >> "$GITHUB_OUTPUT"

      - name: Install discovery artifacts after state restore
        run: |
          mkdir -p data/nbadb
          artifact_dir="$(find discovery-artifact -type d -name nba.discovery-artifacts -print -quit)"
          if [ -n "$artifact_dir" ]; then
            rm -rf data/nbadb/nba.discovery-artifacts
            cp -R "$artifact_dir" data/nbadb/nba.discovery-artifacts
          else
            echo "::notice::No seeded discovery artifact directory found"
          fi

          find data/nbadb \
            -maxdepth 1 \
            -type f \
            -name 'nba.player-team-season-workload*.parquet' \
            -delete
          rm -f data/nbadb/nba.player-team-season-workload.player-team-season-workload.json

          mapfile -t workload_parquets < <(
            find discovery-artifact \
              -type f \
              -name 'nba.player-team-season-workload.*.parquet' \
              -print
          )
          workload_manifest="$(find discovery-artifact -type f -name nba.player-team-season-workload.player-team-season-workload.json -print -quit)"
          if [ "${#workload_parquets[@]}" -gt 0 ] || [ -n "$workload_manifest" ]; then
            if [ "${#workload_parquets[@]}" -eq 0 ] || [ -z "$workload_manifest" ]; then
              echo "::error::Seeded player/team workload artifact is incomplete"
              exit 1
            fi
            for workload_parquet in "${workload_parquets[@]}"; do
              cp "$workload_parquet" "data/nbadb/$(basename "$workload_parquet")"
            done
            cp "$workload_manifest" data/nbadb/nba.player-team-season-workload.player-team-season-workload.json
          else
            echo "::notice::No seeded player/team workload artifact found"
          fi

      - name: Verify installed discovery bundle
        run: |
          summary_path="$(find discovery-artifact -type f -name discovery-seed-summary.json -print -quit)"
          manifest_path="$(find discovery-artifact -type f -name discovery-manifest.json -print -quit)"
          if [ -z "$summary_path" ]; then
            echo "::error::Downloaded discovery bundle is missing discovery-seed-summary.json"
            exit 1
          fi
          if [ -z "$manifest_path" ]; then
            echo "::error::Downloaded discovery bundle is missing discovery-manifest.json"
            exit 1
          fi
          uv run python .github/scripts/verify_discovery_bundle.py \
            --summary-path "$summary_path" \
            --manifest-path "$manifest_path" \
            --duckdb-path data/nbadb/nba.duckdb

      - name: Show lane info
        env:
          LANE_ID: ${{ matrix.lane_id }}
          LANE_INDEX: ${{ matrix.lane_index }}
          NAME: ${{ matrix.lane_name }}
          KIND: ${{ matrix.lane_kind }}
          SEASON_START: ${{ matrix.season_start }}
          SEASON_END: ${{ matrix.season_end }}
          PATTERNS: ${{ matrix.patterns }}
          SEASON_TYPES: ${{ matrix.season_types }}
          CONTEXT_MEASURES: ${{ matrix.context_measures }}
          RESUME_ONLY: ${{ matrix.resume_only }}
          PARENT_LANE_ID: ${{ matrix.parent_lane_id }}
          SPLIT_GENERATION: ${{ matrix.split_generation }}
          ITERATION: ${{ inputs.iteration }}
          CHAIN_ID: ${{ env.ACTIVE_CHAIN_ID }}
          WORKFLOW_REF: ${{ env.WORKFLOW_SOURCE_REF }}
          WORKFLOW_SHA: ${{ env.WORKFLOW_SOURCE_SHA }}
          RESTORE_SOURCE: ${{ steps.restore_state.outputs.restore-source }}
          RESTORE_USABLE: ${{ steps.restore_state.outputs.restore-usable }}
          RESTART_MODE: ${{ steps.restore_state.outputs.restart-mode }}
          RESTORE_ERROR: ${{ steps.state_artifact_restore.outputs.restore-error }}
        run: |
          echo "::notice::Lane $LANE_ID (#$LANE_INDEX, $KIND) — $NAME — iteration $ITERATION"
          echo "::notice::Chain $CHAIN_ID — source ref $WORKFLOW_REF @ $WORKFLOW_SHA"
          echo "::notice::Restore source: ${RESTORE_SOURCE:-none}"
          echo "::notice::Restore usable: ${RESTORE_USABLE:-false}"
          echo "::notice::Restart mode: ${RESTART_MODE:-clean-restart}"
          [ -n "$PARENT_LANE_ID" ] && echo "::notice::Parent lane: $PARENT_LANE_ID (split generation ${SPLIT_GENERATION:-0})"
          [ -n "$PATTERNS" ] && echo "::notice::Patterns: $PATTERNS" || echo "::notice::Patterns: all"
          [ -n "$SEASON_TYPES" ] && echo "::notice::Season types: $SEASON_TYPES" || echo "::notice::Season types: none"
          [ -n "$CONTEXT_MEASURES" ] && echo "::notice::Video contexts: $CONTEXT_MEASURES" || echo "::notice::Video contexts: none"
          echo "::notice::Resume only: $RESUME_ONLY"
          if [ "$RESTORE_USABLE" = "true" ] && [ -f data/nbadb/nba.duckdb ]; then
            echo "::notice::Resuming from attested durable state"
            ls -lh data/nbadb/ 2>/dev/null || true
          else
            echo "::notice::Fresh start"
          fi

      # ── Connect NordVPN tunnel for active extraction lanes ──
      - name: Connect NordVPN tunnel
        id: vpn
        if: ${{ !matrix.resume_only && needs.preflight.outputs.effective-network-mode == 'vpn' }}
        timeout-minutes: 7
        env:
          OPENVPN_USER: ${{ secrets.OPENVPN_USER }}
          OPENVPN_PASSWORD: ${{ secrets.OPENVPN_PASSWORD }}
          NORDVPN_TOKEN: ${{ secrets.NORDVPN_TOKEN }}
          REQUIRE_TOKEN_AUTH: ${{ needs.preflight.outputs.vpn-auth-source == 'token' && 'true' || 'false' }}
          CONFIGURED_AUTH_PREVALIDATED: ${{ needs.preflight.outputs.vpn-auth-source == 'configured' && 'true' || 'false' }}
          LANE_INDEX: ${{ matrix.lane_index }}
          # Give active extract lanes a broader recommendation pool so the chain
          # does not burn an iteration on a few bad NordVPN hosts.
          SERVER_LIMIT: "6"
          SERVER_POOL_SIZE: "96"
          FALLBACK_TECHNOLOGY: "openvpn_tcp"
          CONNECT_TIMEOUT_SECONDS: "60"
          OVERALL_TIMEOUT_SECONDS: "300"
          QUARANTINED_SERVERS_JSON: ${{ needs.preflight.outputs.vpn-quarantined-servers-json }}
          PREFERRED_SERVERS_JSON: ${{ format('["{0}","{1}"]', needs.discovery_seed.outputs.vpn-server, needs.preflight.outputs.vpn-server) }}
          PREFERRED_SERVER_SLOT_COUNT: ${{ needs.preflight.outputs.vpn-auth-source == 'token' && '1' || inputs.vpn_parallelism }}
        run: |
          set +e
          bash .github/scripts/run_with_deadline.sh \
            350 \
            10 \
            python3 .github/actions/nordvpn-connect/supervise.py
          rc=$?
          exit "$rc"

      # ── Configure environment ──
      - name: Configure extraction environment
        env:
          CONCURRENCY: ${{ inputs.concurrency }}
          EFFECTIVE_NETWORK_MODE: ${{ needs.preflight.outputs.effective-network-mode }}
          DIRECT_REQUEST_PROFILE: ${{ inputs.direct_request_profile }}
          DIRECT_TIMEOUT_CAP_MINUTES: ${{ inputs.direct_timeout_cap_minutes }}
          PATTERNS: ${{ matrix.patterns }}
          ENDPOINTS: ${{ matrix.endpoints }}
        run: |
          lane_concurrency="$CONCURRENCY"
          effective_network_mode="${EFFECTIVE_NETWORK_MODE:-vpn}"
          write_env() {
            printf '%s\n' "$1" >> "$GITHUB_ENV"
          }

          if [ "$effective_network_mode" = "direct" ]; then
            direct_timeout_cap_minutes="${DIRECT_TIMEOUT_CAP_MINUTES:-30}"
            if ! [[ "$direct_timeout_cap_minutes" =~ ^[0-9]+$ ]] || [ "$direct_timeout_cap_minutes" -le 0 ]; then
              echo "::error::Unsupported direct_timeout_cap_minutes: $direct_timeout_cap_minutes"
              exit 1
            fi
            write_env "NBADB_DIRECT_LANE_TIMEOUT_CAP_SECONDS=$((direct_timeout_cap_minutes * 60))"

            direct_profile="${DIRECT_REQUEST_PROFILE:-direct}"
            case "$direct_profile" in
              direct|conservative|moderate|aggressive|turbo)
                lane_concurrency="$direct_profile"
                ;;
              *)
                echo "::error::Unsupported direct_request_profile: $direct_profile"
                exit 1
                ;;
            esac
            echo "::notice::Using direct no-VPN extraction profile: $lane_concurrency"
            case "$direct_profile" in
              turbo|aggressive)
                write_env 'NBADB_REQUEST_TIMEOUT_CAP=10'
                ;;
              moderate)
                write_env 'NBADB_REQUEST_TIMEOUT_CAP=15'
                ;;
              *)
                write_env 'NBADB_REQUEST_TIMEOUT_CAP=20'
                ;;
            esac
            write_env 'NBADB_EXTRACT_MAX_RETRIES=0'
            write_env 'NBADB_EXTRACT_RETRY_BASE_DELAY=0.5'
            # Direct-mode player-history lanes can contain hundreds of
            # player-season calls. Keep the slow family to one player at a
            # time so a direct egress stall records a concrete failure instead
            # of leaving an entire chunk in the running state.
            write_env 'NBADB_ADAPTIVE_CHUNK_MIN_SIZE=1'
            write_env 'NBADB_ADAPTIVE_CHUNK_MAX_SIZE=100'
            write_env 'NBADB_FAMILY_CHUNK_MULTIPLIERS={"default":1.0,"box_score":1.0,"play_by_play":0.5,"player_history":0.001,"team_history":0.5}'
          fi
          # Hosted runners have repeatedly dropped long-running singleton player lanes
          # after clean VPN setup, so force those lanes onto the lowest-stress profile.
          if [ "$effective_network_mode" != "direct" ] && [ "$PATTERNS" = "player" ] && [ -n "$ENDPOINTS" ] && [ "${ENDPOINTS#*,}" = "$ENDPOINTS" ]; then
            lane_concurrency="conservative"
            echo "::notice::Forcing conservative extraction profile for singleton player lane: $ENDPOINTS"
          fi

          case "$lane_concurrency" in
            direct)
              write_env 'NBADB_RATE_LIMIT=2'
              write_env 'NBADB_DISCOVERY_CONCURRENCY=2'
              write_env 'NBADB_THREAD_POOL_SIZE=24'
              write_env 'NBADB_CIRCUIT_BREAKER_MAX_WAIT=240'
              write_env 'NBADB_DEFAULT_CHUNK_SIZE=400'
              write_env 'NBADB_PBP_CHUNK_SIZE=800'
              ;;
            conservative)
              write_env 'NBADB_RATE_LIMIT=6'
              write_env 'NBADB_DISCOVERY_CONCURRENCY=4'
              write_env 'NBADB_THREAD_POOL_SIZE=48'
              write_env 'NBADB_CIRCUIT_BREAKER_MAX_WAIT=180'
              write_env 'NBADB_DEFAULT_CHUNK_SIZE=750'
              write_env 'NBADB_PBP_CHUNK_SIZE=1500'
              ;;
            moderate)
              write_env 'NBADB_RATE_LIMIT=10'
              write_env 'NBADB_DISCOVERY_CONCURRENCY=6'
              write_env 'NBADB_THREAD_POOL_SIZE=64'
              write_env 'NBADB_CIRCUIT_BREAKER_MAX_WAIT=120'
              write_env 'NBADB_DEFAULT_CHUNK_SIZE=1000'
              write_env 'NBADB_PBP_CHUNK_SIZE=2000'
              ;;
            aggressive)
              write_env 'NBADB_RATE_LIMIT=14'
              write_env 'NBADB_DISCOVERY_CONCURRENCY=8'
              write_env 'NBADB_THREAD_POOL_SIZE=96'
              write_env 'NBADB_CIRCUIT_BREAKER_MAX_WAIT=90'
              write_env 'NBADB_DEFAULT_CHUNK_SIZE=1250'
              write_env 'NBADB_PBP_CHUNK_SIZE=2500'
              ;;
            turbo)
              write_env 'NBADB_RATE_LIMIT=24'
              write_env 'NBADB_DISCOVERY_CONCURRENCY=12'
              write_env 'NBADB_THREAD_POOL_SIZE=128'
              write_env 'NBADB_CIRCUIT_BREAKER_MAX_WAIT=60'
              write_env 'NBADB_DEFAULT_CHUNK_SIZE=2000'
              write_env 'NBADB_PBP_CHUNK_SIZE=4000'
              ;;
            *)
              echo "::error::Unsupported concurrency setting: $lane_concurrency"
              exit 1
              ;;
          esac
          if [ "$effective_network_mode" = "direct" ]; then
            # Keep direct egress retries observable. The generic concurrency
            # profile writes a larger breaker wait above, so apply this after
            # the profile block.
            write_env 'NBADB_CIRCUIT_BREAKER_MAX_WAIT=15'
          fi

      - name: Rehydrate completed lane
        if: ${{ matrix.resume_only }}
        env:
          RESTORE_USABLE: ${{ steps.restore_state.outputs.restore-usable }}
        run: |
          if [ "$RESTORE_USABLE" != "true" ] || [ ! -f data/nbadb/nba.duckdb ]; then
            echo "::error::Lane marked resume_only but no usable durable DuckDB state was restored"
            exit 1
          fi
          echo "::notice::Lane already complete; reusing attested durable state and skipping extraction"

      # ── Run extraction ──
      - name: Run extraction
        id: extract
        if: ${{ !matrix.resume_only }}
        env:
          SEASON_START: ${{ matrix.season_start }}
          SEASON_END: ${{ matrix.season_end }}
          PATTERNS: ${{ matrix.patterns }}
          SEASON_TYPES: ${{ matrix.season_types }}
          CONTEXT_MEASURES: ${{ matrix.context_measures }}
          BACKFILL_ENDPOINTS: ${{ matrix.endpoints }}
          FORCE_REEXTRACT: ${{ inputs.force_reextract }}
          LANE_TIMEOUT_SECONDS: ${{ matrix.timeout_seconds }}
          EXTRACT_SUMMARY_PATH: artifacts/extraction/extract-summary.json
          NBADB_NETWORK_MODE: ${{ needs.preflight.outputs.effective-network-mode }}
        run: |
          mkdir -p artifacts/extraction
          python .github/scripts/run_extract_lane.py

      - name: Finalize lane status
        id: lane_status
        if: always()
        env:
          JOB_STATUS: ${{ job.status }}
          RESUME_ONLY: ${{ matrix.resume_only }}
          RESTORE_USABLE: ${{ steps.restore_state.outputs.restore-usable }}
          EXTRACT_STATUS: ${{ steps.extract.outputs.status }}
          VPN_STATUS: ${{ steps.vpn.outputs.status }}
          EFFECTIVE_NETWORK_MODE: ${{ needs.preflight.outputs.effective-network-mode }}
        run: |
          if [ "$JOB_STATUS" = "cancelled" ]; then
            status="cancelled"
          elif [ "$RESUME_ONLY" = "true" ] && [ "$RESTORE_USABLE" = "true" ] && [ -f data/nbadb/nba.duckdb ]; then
            status="complete"
          elif [ -n "$EXTRACT_STATUS" ]; then
            status="$EXTRACT_STATUS"
          elif [ -n "$VPN_STATUS" ] && [ "$VPN_STATUS" != "connected" ]; then
            status="$VPN_STATUS"
          elif [ "$EFFECTIVE_NETWORK_MODE" = "direct" ]; then
            status="failed-before-extract"
          else
            status="failed-before-extract"
          fi
          echo "status=$status" >> "$GITHUB_OUTPUT"

      # ── Progress summary ──
      - name: Lane progress
        if: always()
        env:
          LANE_ID: ${{ matrix.lane_id }}
          NAME: ${{ matrix.lane_name }}
          KIND: ${{ matrix.lane_kind }}
          ITERATION: ${{ inputs.iteration }}
          STATUS: ${{ steps.lane_status.outputs.status }}
          EXTRACT_STATUS: ${{ steps.extract.outputs.status }}
          TIMEOUT_SECONDS: ${{ matrix.timeout_seconds }}
          EFFECTIVE_TIMEOUT_SECONDS: ${{ steps.extract.outputs.effective-timeout-seconds || matrix.timeout_seconds }}
          VPN_SERVER: ${{ steps.vpn.outputs.server }}
          VPN_INTERFACE: ${{ steps.vpn.outputs.interface }}
          VPN_BASELINE_IP: ${{ steps.vpn.outputs.baseline-ip }}
          VPN_EXIT_IP: ${{ steps.vpn.outputs.exit-ip }}
          VPN_STATUS: ${{ steps.vpn.outputs.status }}
          REQUESTED_NETWORK_MODE: ${{ inputs.network_mode }}
          EFFECTIVE_NETWORK_MODE: ${{ needs.preflight.outputs.effective-network-mode }}
          RESTORE_SOURCE: ${{ steps.restore_state.outputs.restore-source }}
          RESTORE_USABLE: ${{ steps.restore_state.outputs.restore-usable }}
          CHAIN_ID: ${{ env.ACTIVE_CHAIN_ID }}
          RESUME_ONLY: ${{ matrix.resume_only }}
        run: |
          effective_vpn_status="${VPN_STATUS:-}"
          if [ "$RESUME_ONLY" = "true" ] && [ -z "$effective_vpn_status" ]; then
            effective_vpn_status="resume-only"
          elif [ "$EFFECTIVE_NETWORK_MODE" = "direct" ] && [ -z "$effective_vpn_status" ]; then
            effective_vpn_status="direct-no-vpn"
          elif [ -z "$effective_vpn_status" ]; then
            effective_vpn_status="unknown"
          fi
          {
            echo "## Lane $LANE_ID ($NAME) — Iteration $ITERATION"
            echo "**Status:** $STATUS"
            echo "**Extract status:** ${EXTRACT_STATUS:-not-run}"
            echo "**Kind:** $KIND"
            echo "**Chain ID:** $CHAIN_ID"
            echo "**Restore source:** ${RESTORE_SOURCE:-none}"
            echo "**Restore usable:** ${RESTORE_USABLE:-false}"
            echo "**Resume only:** $RESUME_ONLY"
            echo "**Requested network mode:** ${REQUESTED_NETWORK_MODE:-vpn}"
            echo "**Effective network mode:** ${EFFECTIVE_NETWORK_MODE:-vpn}"
            echo "**Lane timeout seconds:** $TIMEOUT_SECONDS"
            echo "**Effective lane timeout seconds:** $EFFECTIVE_TIMEOUT_SECONDS"
            echo "**VPN status:** $effective_vpn_status"
            echo "**VPN server:** ${VPN_SERVER:-n/a}"
            echo "**VPN interface:** ${VPN_INTERFACE:-n/a}"
            echo "**VPN IP:** ${VPN_BASELINE_IP:-unknown} → ${VPN_EXIT_IP:-unknown}"
            echo '```'
            ls -lh data/nbadb/ 2>/dev/null || echo "No data directory"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Write lane metadata
        id: lane_metadata
        if: always()
        env:
          LANE_ID: ${{ matrix.lane_id }}
          LANE_INDEX: ${{ matrix.lane_index }}
          NAME: ${{ matrix.lane_name }}
          KIND: ${{ matrix.lane_kind }}
          ITERATION: ${{ inputs.iteration }}
          CHAIN_ID: ${{ env.ACTIVE_CHAIN_ID }}
          SOURCE_REF: ${{ env.WORKFLOW_SOURCE_REF }}
          SOURCE_SHA: ${{ env.WORKFLOW_SOURCE_SHA }}
          STATUS: ${{ steps.lane_status.outputs.status }}
          CACHE_HIT: "false"
          RESTORE_SOURCE: ${{ steps.restore_state.outputs.restore-source || 'none' }}
          RESTORE_USABLE: ${{ steps.restore_state.outputs.restore-usable || 'false' }}
          RESTART_MODE: ${{ steps.restore_state.outputs.restart-mode || 'clean-restart' }}
          RESTORE_ERROR: ${{ steps.state_artifact_restore.outputs.restore-error || '' }}
          RESUME_ONLY: ${{ matrix.resume_only }}
          TIMEOUT_SECONDS: ${{ matrix.timeout_seconds }}
          EFFECTIVE_TIMEOUT_SECONDS: ${{ steps.extract.outputs.effective-timeout-seconds || matrix.timeout_seconds }}
          PATTERNS: ${{ matrix.patterns }}
          SEASON_TYPES: ${{ matrix.season_types }}
          CONTEXT_MEASURES: ${{ matrix.context_measures }}
          ENDPOINTS: ${{ matrix.endpoints }}
          COVERAGE_UNITS_HASH: ${{ matrix.coverage_units_hash }}
          SEASON_START: ${{ matrix.season_start }}
          SEASON_END: ${{ matrix.season_end }}
          PARENT_LANE_ID: ${{ matrix.parent_lane_id }}
          SPLIT_GENERATION: ${{ matrix.split_generation }}
          STARTED_AT: ${{ steps.extract.outputs.started-at }}
          FINISHED_AT: ${{ steps.extract.outputs.finished-at }}
          EXTRACT_STATUS: ${{ steps.extract.outputs.status || 'not-run' }}
          EXTRACT_EXIT_CODE: ${{ steps.extract.outputs.exit-code || '' }}
          NETWORK_MODE: ${{ inputs.network_mode }}
          EFFECTIVE_NETWORK_MODE: ${{ needs.preflight.outputs.effective-network-mode }}
          DIRECT_EGRESS_REASON: ${{ needs.preflight.outputs.effective-network-mode == 'direct' && 'vpn-unavailable-or-bypassed' || '' }}
          VPN_STATUS: ${{ steps.vpn.outputs.status || (needs.preflight.outputs.effective-network-mode == 'direct' && 'direct-no-vpn' || '') }}
          VPN_SERVER: ${{ steps.vpn.outputs.server }}
          VPN_INTERFACE: ${{ steps.vpn.outputs.interface }}
          VPN_EXIT_IP: ${{ steps.vpn.outputs.exit-ip }}
          VPN_ATTEMPTED_SERVERS_JSON: ${{ steps.vpn.outputs.attempted-servers-json || '[]' }}
          VPN_FAILED_SERVERS_JSON: ${{ steps.vpn.outputs.failed-servers-json || '[]' }}
          EXTRACT_SUMMARY_PATH: artifacts/extraction/extract-summary.json
          RECOVERY_ARTIFACT_NAME: extraction-lane-recovery-${{ env.ACTIVE_CHAIN_ID }}-${{ matrix.lane_id }}-run-${{ github.run_id }}-attempt-${{ github.run_attempt }}
        run: |
          mkdir -p artifacts/extraction
          if [[ ",${PATTERNS}," == *",player_team_season,"* ]]; then
            workload_manifest="$(find discovery-artifact -type f -name nba.player-team-season-workload.player-team-season-workload.json -print -quit)"
            if [ -n "$workload_manifest" ]; then
              workload_duckdb_path="$(dirname "$workload_manifest")/nba.duckdb"
              export WORKLOAD_DUCKDB_PATH="$workload_duckdb_path"
            fi
          fi
          uv run python .github/scripts/write_lane_metadata.py

      # ── Upload lane artifact ──
      - name: Upload complete lane artifact
        id: complete_lane_artifact
        if: ${{ always() && steps.lane_metadata.outcome == 'success' && steps.lane_metadata.outputs.snapshot-attested == 'true' && steps.lane_metadata.outputs.final-outcome == 'complete' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          overwrite: true
          name: extraction-lane-${{ env.ACTIVE_CHAIN_ID }}-${{ matrix.lane_id }}
          path: |
            data/nbadb/nba.duckdb
            artifacts/extraction/lane-state-attestation.json
          if-no-files-found: error
          retention-days: 7
          compression-level: 0

      - name: Upload incomplete lane state artifact
        id: recovery_lane_artifact
        if: ${{ always() && steps.lane_metadata.outcome == 'success' && steps.lane_metadata.outputs.snapshot-attested == 'true' && steps.lane_metadata.outputs.final-outcome != 'complete' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          overwrite: true
          name: extraction-lane-recovery-${{ env.ACTIVE_CHAIN_ID }}-${{ matrix.lane_id }}-run-${{ github.run_id }}-attempt-${{ github.run_attempt }}
          path: |
            data/nbadb/nba.duckdb
            artifacts/extraction/lane-state-attestation.json
          if-no-files-found: error
          retention-days: 30
          compression-level: 0

      - name: Finalize durable lane artifact receipt
        id: finalize_lane_metadata
        if: ${{ always() && steps.lane_metadata.outcome == 'success' }}
        env:
          COMPLETE_ARTIFACT_DIGEST: ${{ steps.complete_lane_artifact.outputs.artifact-digest }}
          COMPLETE_ARTIFACT_ID: ${{ steps.complete_lane_artifact.outputs.artifact-id }}
          COMPLETE_ARTIFACT_OUTCOME: ${{ steps.complete_lane_artifact.outcome }}
          FINAL_OUTCOME: ${{ steps.lane_metadata.outputs.final-outcome }}
          RECOVERY_ARTIFACT_DIGEST: ${{ steps.recovery_lane_artifact.outputs.artifact-digest }}
          RECOVERY_ARTIFACT_ID: ${{ steps.recovery_lane_artifact.outputs.artifact-id }}
          RECOVERY_ARTIFACT_OUTCOME: ${{ steps.recovery_lane_artifact.outcome }}
          SNAPSHOT_ATTESTED: ${{ steps.lane_metadata.outputs.snapshot-attested }}
        run: |
          python - <<'PY'
          # FINALIZE_LANE_ARTIFACT_RECEIPT
          import json
          import os
          import re
          from pathlib import Path

          path = Path("artifacts/extraction/lane-metadata.json")
          payload = json.loads(path.read_text(encoding="utf-8"))
          state_artifact = payload.get("state_artifact")
          if not isinstance(payload, dict) or not isinstance(state_artifact, dict):
              raise SystemExit("lane metadata is missing state_artifact")

          snapshot_attested = os.environ.get("SNAPSHOT_ATTESTED") == "true"
          final_outcome = os.environ.get("FINAL_OUTCOME", "")
          complete = final_outcome == "complete"
          prefix = "COMPLETE" if complete else "RECOVERY"
          upload_outcome = os.environ.get(f"{prefix}_ARTIFACT_OUTCOME", "")
          artifact_id = os.environ.get(f"{prefix}_ARTIFACT_ID", "")
          raw_artifact_digest = os.environ.get(f"{prefix}_ARTIFACT_DIGEST", "").lower()
          artifact_digest_hex = raw_artifact_digest.removeprefix("sha256:")
          artifact_digest = (
              f"sha256:{artifact_digest_hex}"
              if re.fullmatch(r"[0-9a-f]{64}", artifact_digest_hex) is not None
              else ""
          )

          durable = (
              snapshot_attested
              and upload_outcome == "success"
              and re.fullmatch(r"[1-9][0-9]*", artifact_id) is not None
              and bool(artifact_digest)
          )
          state_artifact["uploaded"] = durable
          if durable:
              state_artifact["artifact_id"] = artifact_id
              state_artifact["artifact_digest"] = artifact_digest
          else:
              state_artifact["attested"] = False
              state_artifact.pop("artifact_id", None)
              state_artifact.pop("artifact_digest", None)
              if snapshot_attested:
                  payload["status"] = "pipeline_failure"
                  payload["raw_status"] = "state-artifact-upload-failed"
                  payload["failure_class"] = "runner_infrastructure"
                  payload["root_error_type"] = "StateArtifactUploadFailure"
                  failure_counts = payload.get("failure_class_counts")
                  if not isinstance(failure_counts, dict):
                      failure_counts = {}
                      payload["failure_class_counts"] = failure_counts
                  failure_counts["runner_infrastructure"] = (
                      int(failure_counts.get("runner_infrastructure") or 0) + 1
                  )
                  root_counts = payload.get("root_error_type_counts")
                  if not isinstance(root_counts, dict):
                      root_counts = {}
                      payload["root_error_type_counts"] = root_counts
                  root_counts["StateArtifactUploadFailure"] = (
                      int(root_counts.get("StateArtifactUploadFailure") or 0) + 1
                  )

          temporary_path = path.with_suffix(".json.tmp")
          temporary_path.write_text(
              json.dumps(payload, indent=2) + "\n",
              encoding="utf-8",
          )
          temporary_path.replace(path)

          output_path = os.environ.get("GITHUB_OUTPUT")
          if output_path:
              with Path(output_path).open("a", encoding="utf-8") as handle:
                  handle.write(f"artifact-durable={str(durable).lower()}\n")
                  handle.write(f"final-outcome={payload.get('status', '')}\n")
          PY

      - name: Upload lane metadata
        id: lane_metadata_artifact
        if: ${{ always() && steps.lane_metadata.outcome == 'success' && steps.finalize_lane_metadata.outcome == 'success' }}
        continue-on-error: true
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          overwrite: true
          name: extraction-lane-metadata-${{ env.ACTIVE_CHAIN_ID }}-${{ matrix.lane_id }}
          path: |
            artifacts/extraction/lane-metadata.json
            artifacts/extraction/extract-summary.json
          if-no-files-found: error
          retention-days: 30
          compression-level: 6

      - name: Retry lane metadata upload
        id: lane_metadata_artifact_retry
        if: ${{ always() && steps.lane_metadata_artifact.outcome == 'failure' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          overwrite: true
          name: extraction-lane-metadata-${{ env.ACTIVE_CHAIN_ID }}-${{ matrix.lane_id }}
          path: |
            artifacts/extraction/lane-metadata.json
            artifacts/extraction/extract-summary.json
          if-no-files-found: error
          retention-days: 30
          compression-level: 6

      - name: Upload diagnostics-only lane snapshot
        if: ${{ always() && (steps.lane_metadata.outcome != 'success' || steps.finalize_lane_metadata.outcome != 'success' || steps.finalize_lane_metadata.outputs.artifact-durable != 'true' || (steps.lane_metadata_artifact.outcome == 'failure' && steps.lane_metadata_artifact_retry.outcome != 'success')) }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          overwrite: true
          name: extraction-lane-diagnostics-only-${{ env.ACTIVE_CHAIN_ID }}-${{ matrix.lane_id }}-run-${{ github.run_id }}-attempt-${{ github.run_attempt }}
          path: |
            data/nbadb/nba.duckdb
            data/nbadb/nba.duckdb.wal
            artifacts/extraction/lane-metadata.json
            artifacts/extraction/lane-state-attestation.json
            artifacts/extraction/lane-state-untrusted
            artifacts/extraction/extract-summary.json
          if-no-files-found: warn
          retention-days: 30
          compression-level: 0

      - name: Upload VPN diagnostics
        if: ${{ always() && needs.preflight.outputs.effective-network-mode == 'vpn' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          overwrite: true
          name: extraction-vpn-diagnostics-${{ env.ACTIVE_CHAIN_ID }}-${{ matrix.lane_id }}
          path: |
            ${{ runner.temp }}/nordvpn/openvpn.log
            ${{ runner.temp }}/nordvpn/openvpn.pid
            ${{ runner.temp }}/nordvpn/vpn-exit-ip.json
            ${{ runner.temp }}/nordvpn/baseline-ip.json
            ${{ runner.temp }}/nordvpn/*.ovpn
          if-no-files-found: ignore
          retention-days: 7
          compression-level: 6

      # ── Cleanup ──
      - name: Disconnect VPN
        if: ${{ always() && !matrix.resume_only && needs.preflight.outputs.effective-network-mode == 'vpn' }}
        uses: ./.github/actions/nordvpn-disconnect
        with:
          pid: ${{ steps.vpn.outputs.pid }}
          pid-file: ${{ steps.vpn.outputs.pid-file }}
          work-dir: ${{ steps.vpn.outputs.work-dir }}

  # ─────────────────────────────────────────────────────────────
  #  Replay a prior terminal checkpoint without rebuilding it
  # ─────────────────────────────────────────────────────────────
  terminal_replay:
    needs: [plan, publication_preflight]
    if: ${{ always() && inputs.resume_source_run_id != '' && needs.plan.result == 'success' && (!inputs.publish || needs.publication_preflight.result == 'success') && needs.plan.outputs.lane-count != '0' && needs.plan.outputs.active-lane-count == '0' && needs.plan.outputs.matrix-lane-count == '0' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      actions: read
      contents: read
    outputs:
      artifact-name: ${{ steps.replay.outputs.artifact_name }}
      checkpoint-generation: ${{ steps.replay.outputs.checkpoint_generation }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ env.WORKFLOW_SOURCE_SHA }}

      - name: Download zero-active manifest
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: full-extraction-manifest-${{ env.ACTIVE_CHAIN_ID }}
          path: plan-artifact/

      - name: Resolve exact source checkpoint artifact
        id: source_checkpoint
        env:
          CHAIN_ID: ${{ env.ACTIVE_CHAIN_ID }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SOURCE_RUN_ID: ${{ inputs.resume_source_run_id }}
        run: |
          set -euo pipefail
          if ! [[ "$SOURCE_RUN_ID" =~ ^[0-9]+$ ]]; then
            echo "::error::resume_source_run_id must be a numeric GitHub Actions run ID"
            exit 1
          fi

          artifacts_path="$RUNNER_TEMP/source-run-artifacts.json"
          gh api \
            --method GET \
            --paginate \
            --slurp \
            -H "Accept: application/vnd.github+json" \
            "/repos/${GITHUB_REPOSITORY}/actions/runs/${SOURCE_RUN_ID}/artifacts?per_page=100" \
            > "$artifacts_path"

          ARTIFACTS_PATH="$artifacts_path" python - <<'PY'
          # TERMINAL_REPLAY_ARTIFACT_RESOLVER
          import json
          import os
          import re
          from pathlib import Path

          pages = json.loads(Path(os.environ["ARTIFACTS_PATH"]).read_text(encoding="utf-8"))
          chain_id = os.environ["CHAIN_ID"]
          pattern = re.compile(
              rf"^full-extraction-checkpoint-{re.escape(chain_id)}-iter-([1-9][0-9]*)$"
          )
          matches = []
          for page in pages:
              for artifact in page.get("artifacts", []):
                  name = str(artifact.get("name") or "")
                  match = pattern.fullmatch(name)
                  if match is not None and artifact.get("expired") is not True:
                      matches.append((name, int(match.group(1))))

          if len(matches) > 1:
              names = ", ".join(name for name, _generation in matches) or "none"
              print(
                  "::error::Terminal replay requires at most one unexpired source "
                  f"checkpoint artifact; found {len(matches)}: {names}"
              )
              raise SystemExit(1)
          if not matches:
              print(
                  "::notice::No source checkpoint exists; rebuilding from attested "
                  "complete-lane artifacts"
              )
              raise SystemExit(0)

          artifact_name, generation = matches[0]
          with Path(os.environ["GITHUB_OUTPUT"]).open("a", encoding="utf-8") as handle:
              handle.write(f"artifact_name={artifact_name}\n")
              handle.write(f"checkpoint_generation={generation}\n")
          PY

      - name: Download exact source checkpoint
        if: ${{ steps.source_checkpoint.outputs.artifact_name != '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SOURCE_RUN_ID: ${{ inputs.resume_source_run_id }}
          SOURCE_CHECKPOINT_ARTIFACT: ${{ steps.source_checkpoint.outputs.artifact_name }}
        run: |
          set -euo pipefail
          mkdir -p source-checkpoint
          gh run download "$SOURCE_RUN_ID" \
            --repo "${{ github.repository }}" \
            --name "$SOURCE_CHECKPOINT_ARTIFACT" \
            --dir source-checkpoint

      - name: Attest terminal replay inputs
        id: replay
        if: ${{ steps.source_checkpoint.outputs.artifact_name != '' }}
        env:
          CHAIN_ID: ${{ env.ACTIVE_CHAIN_ID }}
          EXPECTED_CHECKPOINT_GENERATION: ${{ steps.source_checkpoint.outputs.checkpoint_generation }}
          SOURCE_CHECKPOINT_ARTIFACT: ${{ steps.source_checkpoint.outputs.artifact_name }}
          SOURCE_RUN_ID: ${{ inputs.resume_source_run_id }}
        run: |
          set -euo pipefail
          mkdir -p terminal-replay-inputs/checkpoint artifacts/full-extraction
          mapfile -t plan_manifests < <(find plan-artifact -name manifest.json -type f -print)
          mapfile -t checkpoint_manifests < <(find source-checkpoint -name checkpoint-manifest.json -type f -print)
          mapfile -t checkpoint_reports < <(find source-checkpoint -name checkpoint-report.json -type f -print)
          mapfile -t checkpoint_databases < <(find source-checkpoint -name nba.duckdb -type f -print)
          if [ "${#plan_manifests[@]}" -ne 1 ] || \
             [ "${#checkpoint_manifests[@]}" -ne 1 ] || \
             [ "${#checkpoint_reports[@]}" -ne 1 ] || \
             [ "${#checkpoint_databases[@]}" -ne 1 ]; then
            echo "::error::Terminal replay inputs are incomplete"
            find plan-artifact source-checkpoint -maxdepth 6 -type f -print || true
            exit 1
          fi
          plan_manifest_path="${plan_manifests[0]}"
          checkpoint_manifest="${checkpoint_manifests[0]}"
          checkpoint_report="${checkpoint_reports[0]}"
          checkpoint_database="${checkpoint_databases[0]}"

          PLAN_MANIFEST_PATH="$plan_manifest_path" \
            CHECKPOINT_MANIFEST_PATH="$checkpoint_manifest" \
            CHECKPOINT_REPORT_PATH="$checkpoint_report" \
            CHECKPOINT_DATABASE_PATH="$checkpoint_database" \
            python - <<'PY'
          # TERMINAL_REPLAY_ATTESTATION
          import hashlib
          import json
          import os
          from pathlib import Path

          plan_manifest_path = Path(os.environ["PLAN_MANIFEST_PATH"])
          checkpoint_manifest_path = Path(os.environ["CHECKPOINT_MANIFEST_PATH"])
          report_path = Path(os.environ["CHECKPOINT_REPORT_PATH"])
          database_path = Path(os.environ["CHECKPOINT_DATABASE_PATH"])
          plan_manifest = json.loads(plan_manifest_path.read_text(encoding="utf-8"))
          checkpoint_manifest = json.loads(
              checkpoint_manifest_path.read_text(encoding="utf-8")
          )
          report = json.loads(report_path.read_text(encoding="utf-8"))
          expected_generation = int(os.environ["EXPECTED_CHECKPOINT_GENERATION"])
          expected_coverage = str(
              checkpoint_manifest.get("coverage_fingerprint") or ""
              if isinstance(checkpoint_manifest, dict)
              else ""
          )

          failures: list[str] = []
          if not isinstance(plan_manifest, dict):
              failures.append("zero-active replay plan manifest is invalid")
              plan_manifest = {}
          if not isinstance(checkpoint_manifest, dict):
              failures.append("source checkpoint manifest is invalid")
              checkpoint_manifest = {}
          checkpoint_state = checkpoint_manifest.get("chain_state")
          if not isinstance(checkpoint_state, dict):
              failures.append("source checkpoint manifest chain_state is invalid")
              checkpoint_state = {}
          if int(plan_manifest.get("lane_count", 0)) <= 0:
              failures.append("zero-active replay manifest has no lanes")
          if int(plan_manifest.get("active_lane_count", -1)) != 0:
              failures.append("zero-active replay manifest has active lanes")
          if int(plan_manifest.get("matrix_lane_count", -1)) != 0:
              failures.append("zero-active replay manifest has matrix lanes")
          if int(checkpoint_manifest.get("lane_count", 0)) <= 0:
              failures.append("source checkpoint manifest has no lanes")
          if report.get("terminal_ready") is not True:
              failures.append("source checkpoint is not terminal-ready")
          if int(report.get("active_lane_count", -1)) != 0:
              failures.append("source checkpoint still has active lanes")
          if str(report.get("chain_id") or "") != os.environ["CHAIN_ID"]:
              failures.append("source checkpoint chain identity does not match")
          if str(checkpoint_manifest.get("chain_id") or "") != os.environ["CHAIN_ID"]:
              failures.append("source checkpoint manifest chain identity does not match")
          if str(report.get("run_id") or "") != os.environ["SOURCE_RUN_ID"]:
              failures.append("source checkpoint run identity does not match")
          if (
              str(report.get("artifact_name") or "")
              != os.environ["SOURCE_CHECKPOINT_ARTIFACT"]
          ):
              failures.append("source checkpoint artifact identity does not match")
          if (
              str(report.get("source_sha") or "").lower()
              != os.environ["WORKFLOW_SOURCE_SHA"].lower()
          ):
              failures.append("source checkpoint source SHA does not match")
          if (
              str(checkpoint_manifest.get("workflow_source_sha") or "").lower()
              != os.environ["WORKFLOW_SOURCE_SHA"].lower()
          ):
              failures.append("source checkpoint manifest source SHA does not match")
          if int(report.get("checkpoint_generation", 0)) != expected_generation:
              failures.append("source checkpoint generation does not match its artifact name")
          if not expected_coverage or str(report.get("coverage_fingerprint") or "") != expected_coverage:
              failures.append("source checkpoint coverage fingerprint does not match")
          if str(plan_manifest.get("coverage_fingerprint") or "") != expected_coverage:
              failures.append("zero-active replay coverage does not match source checkpoint")
          if int(report.get("complete_lane_count", 0)) <= 0:
              failures.append("source checkpoint contains no completed lanes")
          if (
              str(checkpoint_state.get("latest_checkpoint_run_id") or "")
              != os.environ["SOURCE_RUN_ID"]
          ):
              failures.append("source checkpoint manifest latest run identity does not match")
          if (
              str(checkpoint_state.get("latest_checkpoint_artifact_name") or "")
              != os.environ["SOURCE_CHECKPOINT_ARTIFACT"]
          ):
              failures.append(
                  "source checkpoint manifest latest artifact identity does not match"
              )
          if int(checkpoint_state.get("latest_checkpoint_generation", 0)) != expected_generation:
              failures.append("source checkpoint manifest latest generation does not match")
          if (
              str(checkpoint_state.get("latest_checkpoint_coverage_hash") or "")
              != expected_coverage
          ):
              failures.append("source checkpoint manifest latest coverage does not match")

          manifest_lane_hashes = {
              str(lane.get("lane_id") or ""): str(lane.get("coverage_units_hash") or "")
              for lane in checkpoint_manifest.get("lanes", [])
              if isinstance(lane, dict)
          }
          report_lane_hashes = {
              str(lane_id): str(coverage_hash)
              for lane_id, coverage_hash in dict(
                  report.get("included_lane_coverage_hashes", {})
              ).items()
          }
          mismatched_lane_hashes = sorted(
              set(manifest_lane_hashes) ^ set(report_lane_hashes)
          ) + sorted(
              lane_id for lane_id, coverage_hash in manifest_lane_hashes.items()
              if not lane_id or not coverage_hash or report_lane_hashes.get(lane_id) != coverage_hash
          )
          if mismatched_lane_hashes:
              failures.append(
                  "source checkpoint lane coverage hashes do not match: "
                  + ", ".join(mismatched_lane_hashes)
              )
          if report.get("current_lane_attestation_failures"):
              failures.append("source checkpoint records lane attestation failures")

          expected_digest = str(report.get("database_sha256") or "")
          digest = hashlib.sha256()
          with database_path.open("rb") as handle:
              for chunk in iter(lambda: handle.read(1024 * 1024), b""):
                  digest.update(chunk)
          if expected_digest != digest.hexdigest():
              failures.append("source checkpoint database SHA-256 does not match")

          if failures:
              for failure in failures:
                  print(f"::error::{failure}")
              raise SystemExit(1)
          PY

          cp "$checkpoint_manifest" terminal-replay-inputs/terminal-manifest.json
          cp "$checkpoint_report" terminal-replay-inputs/checkpoint/checkpoint-report.json
          cp "$checkpoint_database" terminal-replay-inputs/checkpoint/nba.duckdb
          artifact_name="full-extraction-terminal-replay-${ACTIVE_CHAIN_ID}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          {
            echo "artifact_name=$artifact_name"
            echo "checkpoint_generation=${EXPECTED_CHECKPOINT_GENERATION}"
          } >> "$GITHUB_OUTPUT"

      - name: Upload attested terminal replay inputs
        if: ${{ steps.source_checkpoint.outputs.artifact_name != '' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          overwrite: true
          name: ${{ steps.replay.outputs.artifact_name }}
          path: terminal-replay-inputs/
          if-no-files-found: error
          retention-days: 30
          compression-level: 0

  # ─────────────────────────────────────────────────────────────
  #  Targeted smoke: stop green after one terminal checkpoint
  # ─────────────────────────────────────────────────────────────
  targeted_smoke_assurance:
    needs: [plan, preflight, discovery_seed, extract, lane_control, checkpoint]
    if: ${{ always() && inputs.targeted_smoke }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Verify terminal targeted smoke
        env:
          PLAN_RESULT: ${{ needs.plan.result }}
          PREFLIGHT_RESULT: ${{ needs.preflight.result }}
          DISCOVERY_RESULT: ${{ needs.discovery_seed.result }}
          EXTRACT_RESULT: ${{ needs.extract.result }}
          CONTROL_RESULT: ${{ needs.lane_control.result }}
          CHECKPOINT_RESULT: ${{ needs.checkpoint.result }}
          LANE_COUNT: ${{ needs.plan.outputs.lane-count }}
          MATRIX_LANE_COUNT: ${{ needs.plan.outputs.matrix-lane-count }}
          ACTIVE_LANE_COUNT: ${{ needs.lane_control.outputs.active-lane-count }}
          RESUME_ONLY_LANE_COUNT: ${{ needs.lane_control.outputs.resume-only-lane-count }}
          CONTRACT_BLOCKED_LANE_COUNT: ${{ needs.lane_control.outputs.contract-blocked-lane-count }}
          CHECKPOINT_TERMINAL_READY: ${{ needs.checkpoint.outputs.terminal-ready }}
          CHECKPOINT_ACTIVE_LANE_COUNT: ${{ needs.checkpoint.outputs.active-lane-count }}
        run: |
          set -euo pipefail
          for result in \
            "$PLAN_RESULT" \
            "$PREFLIGHT_RESULT" \
            "$DISCOVERY_RESULT" \
            "$EXTRACT_RESULT" \
            "$CONTROL_RESULT" \
            "$CHECKPOINT_RESULT"; do
            if [ "$result" != "success" ]; then
              echo "::error::Targeted smoke dependency did not succeed: $result"
              exit 1
            fi
          done
          if [ "$LANE_COUNT" != "1" ] || [ "$MATRIX_LANE_COUNT" != "1" ]; then
            echo "::error::Targeted smoke must contain exactly one planned and dispatched lane"
            exit 1
          fi
          if [ "$ACTIVE_LANE_COUNT" != "0" ] || [ "$CHECKPOINT_ACTIVE_LANE_COUNT" != "0" ]; then
            echo "::error::Targeted smoke left active lanes"
            exit 1
          fi
          if [ "$RESUME_ONLY_LANE_COUNT" != "1" ] || [ "$CONTRACT_BLOCKED_LANE_COUNT" != "0" ]; then
            echo "::error::Targeted smoke lane did not finish as one complete resume-only lane"
            exit 1
          fi
          if [ "$CHECKPOINT_TERMINAL_READY" != "true" ]; then
            echo "::error::Targeted smoke checkpoint is not terminal-ready"
            exit 1
          fi
          echo "::notice::Targeted smoke passed terminal lane and checkpoint attestation"

  # ─────────────────────────────────────────────────────────────
  #  Merge the cumulative checkpoint once all lanes are complete
  # ─────────────────────────────────────────────────────────────
  merge:
    needs: [plan, preflight, extract, terminal_replay, lane_control, checkpoint]
    if: ${{ always() && !cancelled() && !inputs.targeted_smoke && needs.plan.result == 'success' && needs.plan.outputs.lane-count != '0' && (((needs.preflight.result == 'success' || (inputs.resume_source_run_id != '' && needs.plan.outputs.active-lane-count == '0' && needs.plan.outputs.matrix-lane-count == '0' && needs.terminal_replay.result == 'success' && needs.terminal_replay.outputs.artifact-name == '')) && needs.lane_control.result == 'success' && needs.checkpoint.result == 'success' && needs.lane_control.outputs.active-lane-count == '0' && needs.checkpoint.outputs.terminal-ready == 'true' && needs.checkpoint.outputs.active-lane-count == '0') || (needs.terminal_replay.result == 'success' && needs.terminal_replay.outputs.artifact-name != '')) }}
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      actions: read
      contents: read
    outputs:
      final-data-artifact-name: nbadb-full-extraction-assured-${{ env.ACTIVE_CHAIN_ID }}-${{ github.run_id }}-${{ github.run_attempt }}
      final-data-artifact-id: ${{ steps.assured_data.outputs.artifact-id }}
      final-data-artifact-digest: ${{ steps.assured_data.outputs.artifact-digest }}
      coverage-fingerprint: ${{ steps.terminal_identity.outputs.coverage_fingerprint }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ env.WORKFLOW_SOURCE_SHA }}

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          enable-cache: true

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - run: uv sync

      - name: Download terminal manifest from completed lanes
        if: ${{ needs.terminal_replay.outputs.artifact-name == '' }}
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: ${{ needs.lane_control.outputs.artifact-name }}
          path: next-manifest-artifact/

      - name: Download terminal checkpoint from completed lanes
        if: ${{ needs.terminal_replay.outputs.artifact-name == '' }}
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: ${{ needs.checkpoint.outputs.artifact-name }}
          path: checkpoint-artifact/

      - name: Download replayed terminal checkpoint
        if: ${{ needs.terminal_replay.outputs.artifact-name != '' }}
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: ${{ needs.terminal_replay.outputs.artifact-name }}
          path: replay-terminal-artifact/

      - name: Prepare checkpoint-first merge
        env:
          TERMINAL_REPLAYED: ${{ needs.terminal_replay.outputs.artifact-name != '' }}
        run: |
          mkdir -p lanes artifacts/full-extraction checkpoint-artifact
          if [ "$TERMINAL_REPLAYED" = "true" ]; then
            manifest_path="$(find replay-terminal-artifact -name terminal-manifest.json -type f -print -quit)"
            replay_report="$(find replay-terminal-artifact -name checkpoint-report.json -type f -print -quit)"
            replay_database="$(find replay-terminal-artifact -name nba.duckdb -type f -print -quit)"
            if [ -z "$replay_report" ] || [ -z "$replay_database" ]; then
              echo "::error::Replayed terminal artifact did not contain its attested checkpoint"
              find replay-terminal-artifact -maxdepth 6 -type f -print || true
              exit 1
            fi
            cp "$replay_report" checkpoint-artifact/checkpoint-report.json
            cp "$replay_database" checkpoint-artifact/nba.duckdb
          else
            manifest_path="$(find next-manifest-artifact \( -name next-manifest.json -o -name manifest.json \) -type f -print -quit)"
            mapfile -t checkpoint_reports < <(
              find checkpoint-artifact -name checkpoint-report.json -type f -print
            )
            mapfile -t checkpoint_databases < <(
              find checkpoint-artifact -name nba.duckdb -type f -print
            )
            if [ "${#checkpoint_reports[@]}" -ne 1 ] || \
               [ "${#checkpoint_databases[@]}" -ne 1 ]; then
              echo "::error::Terminal checkpoint artifact must contain exactly one report and database"
              find checkpoint-artifact -maxdepth 8 -type f -print || true
              exit 1
            fi
            checkpoint_report="${checkpoint_reports[0]}"
            checkpoint_database="${checkpoint_databases[0]}"
            if [ "$checkpoint_report" != "checkpoint-artifact/checkpoint-report.json" ]; then
              cp "$checkpoint_report" checkpoint-artifact/checkpoint-report.json
            fi
            if [ "$checkpoint_database" != "checkpoint-artifact/nba.duckdb" ]; then
              cp "$checkpoint_database" checkpoint-artifact/nba.duckdb
            fi
          fi
          if [ -z "$manifest_path" ]; then
            echo "::error::Terminal manifest artifact did not contain a usable manifest"
            find next-manifest-artifact replay-terminal-artifact -maxdepth 6 -type f -print 2>/dev/null || true
            exit 1
          fi
          cp "$manifest_path" artifacts/full-extraction/merge-manifest.json
          echo "Terminal merge will use the verified cumulative checkpoint only."

      - name: Validate terminal checkpoint identity
        id: terminal_identity
        env:
          CHAIN_ID: ${{ env.ACTIVE_CHAIN_ID }}
        run: |
          set -euo pipefail
          uv run python -m nbadb.orchestrate.full_extraction_control verify-checkpoint \
            --lane-manifest-path artifacts/full-extraction/merge-manifest.json \
            --checkpoint-dir checkpoint-artifact \
            --checkpoint-report-path checkpoint-artifact/checkpoint-report.json \
            --chain-id "$CHAIN_ID" \
            --source-sha "$WORKFLOW_SOURCE_SHA" \
            --pointer-prefix latest \
            > artifacts/full-extraction/verified-terminal-checkpoint.json

          VERIFIED_CHECKPOINT_PATH=artifacts/full-extraction/verified-terminal-checkpoint.json \
            CHECKPOINT_REPORT_PATH=checkpoint-artifact/checkpoint-report.json \
            TERMINAL_IDENTITY_PATH=artifacts/full-extraction/terminal-assurance-report.json \
            python - <<'PY'
          # TERMINAL_CHECKPOINT_IDENTITY_BINDER
          import hashlib
          import json
          import os
          import re
          from pathlib import Path

          verified = json.loads(
              Path(os.environ["VERIFIED_CHECKPOINT_PATH"]).read_text(encoding="utf-8")
          )
          report_path = Path(os.environ["CHECKPOINT_REPORT_PATH"])
          report = json.loads(report_path.read_text(encoding="utf-8"))
          coverage_fingerprint = str(verified.get("coverage_fingerprint") or "").lower()
          evidence = report.get("contract_blocked_evidence")
          evidence_sha256 = str(report.get("contract_blocked_evidence_sha256") or "")
          failures: list[str] = []
          if re.fullmatch(r"[0-9a-f]{64}", coverage_fingerprint) is None:
              failures.append("verified terminal checkpoint coverage fingerprint is invalid")
          if str(report.get("coverage_fingerprint") or "").lower() != coverage_fingerprint:
              failures.append("terminal checkpoint coverage fingerprint is unbound")
          if report.get("terminal_ready") is not True or int(report.get("active_lane_count", -1)) != 0:
              failures.append("terminal checkpoint is not terminal-ready")
          if (
              not isinstance(evidence, dict)
              or evidence.get("schema_version") != 1
              or not isinstance(evidence.get("contract_blocked_lanes"), list)
          ):
              failures.append("terminal contract-blocked evidence is invalid")
          else:
              actual_evidence_sha256 = hashlib.sha256(
                  json.dumps(evidence, sort_keys=True, separators=(",", ":")).encode(
                      "utf-8"
                  )
              ).hexdigest()
              if evidence_sha256 != actual_evidence_sha256:
                  failures.append("terminal contract-blocked evidence digest does not match")
              if int(report.get("contract_blocked_lane_count", -1)) != len(
                  evidence["contract_blocked_lanes"]
              ):
                  failures.append("terminal contract-blocked evidence count does not match")
          if failures:
              for failure in failures:
                  print(f"::error::{failure}")
              raise SystemExit(1)

          checkpoint_report_bytes = json.dumps(
              report,
              sort_keys=True,
              separators=(",", ":"),
          ).encode("utf-8")
          identity = {
              "schema_version": 2,
              "chain_id": os.environ["CHAIN_ID"],
              "source_sha": os.environ["WORKFLOW_SOURCE_SHA"].lower(),
              "coverage_fingerprint": coverage_fingerprint,
              "checkpoint_artifact_name": verified.get("artifact_name"),
              "checkpoint_generation": verified.get("checkpoint_generation"),
              "checkpoint_database_sha256": verified.get("database_sha256"),
              "checkpoint_report_sha256": hashlib.sha256(
                  checkpoint_report_bytes
              ).hexdigest(),
              "checkpoint_report": report,
              "contract_blocked_lane_count": report.get("contract_blocked_lane_count", 0),
              "contract_blocked_evidence": evidence,
              "contract_blocked_evidence_sha256": evidence_sha256,
          }
          Path(os.environ["TERMINAL_IDENTITY_PATH"]).write_text(
              json.dumps(identity, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          with Path(os.environ["GITHUB_OUTPUT"]).open("a", encoding="utf-8") as handle:
              handle.write(f"coverage_fingerprint={coverage_fingerprint}\n")
          PY

      - name: Merge lane databases
        run: |
          mkdir -p data/nbadb
          uv run python -m nbadb.orchestrate.full_extraction_control merge \
            --artifacts-dir lanes \
            --output-dir data/nbadb \
            --manifest-path artifacts/full-extraction/merge-manifest.json \
            --checkpoint-dir checkpoint-artifact \
            --checkpoint-report-path checkpoint-artifact/checkpoint-report.json

      # Transform from merged staging once every planned lane is complete.
      - name: Transform and load
        run: uv run nbadb backfill run --transform-only --verbose

      - name: Append live snapshot
        run: uv run nbadb live-snapshot --verbose

      - name: Merge summary
        if: always()
        run: |
          {
            echo "## Merge — Iteration ${{ inputs.iteration }}"
            echo "**Chain ID:** ${{ env.ACTIVE_CHAIN_ID }}"
            echo "**Source ref:** ${{ env.WORKFLOW_SOURCE_REF }}"
            echo "**Source SHA:** ${{ env.WORKFLOW_SOURCE_SHA }}"
            echo "**Planned lanes:** ${{ needs.plan.outputs.lane-count }}"
            echo '```'
            ls -lh data/nbadb/ 2>/dev/null || echo "No data directory"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      # Export may update the database, so the terminal hard scan runs afterward.
      - name: Export all formats
        run: uv run nbadb export

      - name: Scan data quality
        id: scan
        uses: ./.github/actions/scan-report
        with:
          report-name: full-extraction-scan-report
          report-dir: artifacts/health/full
          fail-on: error
          full-publication: true
          checkpoint-report: checkpoint-artifact/checkpoint-report.json
          checkpoint-manifest: artifacts/full-extraction/merge-manifest.json
          checkpoint-dir: checkpoint-artifact
          checkpoint-chain-id: ${{ env.ACTIVE_CHAIN_ID }}
          checkpoint-source-sha: ${{ env.WORKFLOW_SOURCE_SHA }}

      - name: Build assured data manifest
        env:
          COVERAGE_FINGERPRINT: ${{ steps.terminal_identity.outputs.coverage_fingerprint }}
        run: |
          source_sha="${WORKFLOW_SOURCE_SHA,,}"
          cp artifacts/full-extraction/terminal-assurance-report.json \
            data/nbadb/terminal-assurance-report.json
          uv run python -m nbadb.core.artifact_identity build \
            --root data/nbadb \
            --chain-id "$ACTIVE_CHAIN_ID" \
            --source-sha "$source_sha" \
            --coverage-fingerprint "$COVERAGE_FINGERPRINT"

      - name: Upload assured final data artifact
        id: assured_data
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          overwrite: true
          name: nbadb-full-extraction-assured-${{ env.ACTIVE_CHAIN_ID }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            data/nbadb/*.duckdb
            data/nbadb/*.sqlite
            data/nbadb/parquet/
            data/nbadb/csv/
            data/nbadb/terminal-assurance-report.json
            data/nbadb/assured-artifact-manifest.json
          if-no-files-found: error
          retention-days: 30
          compression-level: 0

      - name: Record non-publishing canary outcome
        if: ${{ inputs.publish == false }}
        run: |
          {
            echo "## Publication"
            echo ""
            echo "**Publish requested:** false"
            echo ""
            echo "Terminal merge, transform, export, and scan assurance completed."
            echo "Metadata commit/push: skipped."
            echo "Kaggle upload: skipped."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload final database
        if: ${{ always() && inputs.publish == false }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          overwrite: true
          name: nbadb-full-extraction-${{ env.ACTIVE_CHAIN_ID }}
          path: |
            data/nbadb/*.duckdb
            data/nbadb/*.sqlite
            data/nbadb/parquet/
            data/nbadb/csv/
            data/nbadb/terminal-assurance-report.json
            data/nbadb/assured-artifact-manifest.json
          if-no-files-found: ignore
          retention-days: 30
          compression-level: 0

  # ─────────────────────────────────────────────────────────────
  #  Publish only after terminal assurance has produced exact data
  # ─────────────────────────────────────────────────────────────
  publish:
    needs: [plan, publication_preflight, merge]
    if: ${{ inputs.publish && needs.publication_preflight.result == 'success' && needs.merge.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 180
    concurrency:
      group: nbadb-kaggle-publish
      queue: max
      cancel-in-progress: false
    permissions:
      actions: read
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ env.WORKFLOW_SOURCE_SHA }}

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          enable-cache: true

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - run: uv sync

      - name: Download exact assured data artifact
        env:
          ARTIFACT_DIGEST: ${{ needs.merge.outputs.final-data-artifact-digest }}
          ARTIFACT_ID: ${{ needs.merge.outputs.final-data-artifact-id }}
          ARTIFACT_NAME: ${{ needs.merge.outputs.final-data-artifact-name }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SOURCE_RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          if ! [[ "$ARTIFACT_ID" =~ ^[1-9][0-9]*$ ]]; then
            echo "::error::Assured artifact ID must be a positive integer"
            exit 1
          fi

          archive_path="$RUNNER_TEMP/assured-data-artifact.zip"
          metadata_path="$RUNNER_TEMP/assured-data-artifact.json"
          gh api \
            --method GET \
            -H "Accept: application/vnd.github+json" \
            "/repos/${GITHUB_REPOSITORY}/actions/artifacts/${ARTIFACT_ID}" \
            > "$metadata_path"
          gh api \
            --method GET \
            -H "Accept: application/vnd.github+json" \
            "/repos/${GITHUB_REPOSITORY}/actions/artifacts/${ARTIFACT_ID}/zip" \
            > "$archive_path"

          ARTIFACT_ARCHIVE_PATH="$archive_path" \
            ARTIFACT_METADATA_PATH="$metadata_path" \
            python - <<'PY'
          # ASSURED_ARTIFACT_ARCHIVE_VERIFIER
          import hashlib
          import json
          import os
          import re
          import zipfile
          from pathlib import Path, PurePosixPath

          artifact_id = os.environ["ARTIFACT_ID"]
          artifact_name = os.environ["ARTIFACT_NAME"]
          source_run_id = os.environ["SOURCE_RUN_ID"]
          raw_expected_digest = os.environ["ARTIFACT_DIGEST"].strip().lower()
          expected_digest_hex = raw_expected_digest.removeprefix("sha256:")
          if re.fullmatch(r"[0-9a-f]{64}", expected_digest_hex) is None:
              print("::error::Assured artifact digest is not a SHA-256")
              raise SystemExit(1)
          expected_digest = f"sha256:{expected_digest_hex}"

          metadata = json.loads(
              Path(os.environ["ARTIFACT_METADATA_PATH"]).read_text(encoding="utf-8")
          )
          workflow_run = metadata.get("workflow_run", {})
          failures: list[str] = []
          if str(metadata.get("id") or "") != artifact_id:
              failures.append("artifact metadata ID does not match")
          if str(metadata.get("name") or "") != artifact_name:
              failures.append("artifact metadata name does not match")
          if metadata.get("expired") is True:
              failures.append("artifact is expired")
          if not isinstance(workflow_run, dict) or str(workflow_run.get("id") or "") != source_run_id:
              failures.append("artifact workflow run identity does not match")

          archive_path = Path(os.environ["ARTIFACT_ARCHIVE_PATH"])
          digest = hashlib.sha256()
          with archive_path.open("rb") as handle:
              for chunk in iter(lambda: handle.read(1024 * 1024), b""):
                  digest.update(chunk)
          actual_digest = "sha256:" + digest.hexdigest()
          if actual_digest != expected_digest:
              failures.append(
                  "artifact archive SHA-256 does not match upload digest: "
                  f"expected={expected_digest}, actual={actual_digest}"
              )

          try:
              with zipfile.ZipFile(archive_path) as archive:
                  unsafe_names = []
                  for member in archive.infolist():
                      member_path = PurePosixPath(member.filename)
                      if member_path.is_absolute() or ".." in member_path.parts:
                          unsafe_names.append(member.filename)
                  if unsafe_names:
                      failures.append("artifact archive contains unsafe paths")
          except zipfile.BadZipFile:
              failures.append("artifact archive is not a valid ZIP file")

          if failures:
              for failure in failures:
                  print(f"::error::{failure}")
              raise SystemExit(1)
          PY

          mkdir -p data/nbadb
          unzip -q "$archive_path" -d data/nbadb

      - name: Validate assured data artifact identity
        env:
          ARTIFACT_NAME: ${{ needs.merge.outputs.final-data-artifact-name }}
          COVERAGE_FINGERPRINT: ${{ needs.merge.outputs.coverage-fingerprint }}
          EXPECTED_ARTIFACT_PREFIX: nbadb-full-extraction-assured-${{ env.ACTIVE_CHAIN_ID }}-${{ github.run_id }}-
        run: |
          set -euo pipefail
          source_sha="${WORKFLOW_SOURCE_SHA,,}"
          artifact_attempt="${ARTIFACT_NAME#"$EXPECTED_ARTIFACT_PREFIX"}"
          if [ "$artifact_attempt" = "$ARTIFACT_NAME" ] || ! [[ "$artifact_attempt" =~ ^[0-9]+$ ]]; then
            echo "::error::Assured artifact identity mismatch: expected '${EXPECTED_ARTIFACT_PREFIX}<attempt>', got '$ARTIFACT_NAME'"
            exit 1
          fi
          test -f data/nbadb/nba.duckdb
          test -f data/nbadb/nba.sqlite
          test -d data/nbadb/parquet
          test -d data/nbadb/csv
          test -f data/nbadb/terminal-assurance-report.json
          test -f data/nbadb/assured-artifact-manifest.json
          uv run python -m nbadb.core.artifact_identity verify \
            --root data/nbadb \
            --chain-id "$ACTIVE_CHAIN_ID" \
            --source-sha "$source_sha" \
            --coverage-fingerprint "$COVERAGE_FINGERPRINT"

      - name: Restore Kaggle publication reconciliation state
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: logs/kaggle/kaggle-publication-state.json
          key: nbadb-kaggle-publication-state-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            nbadb-kaggle-publication-state-

      - name: Validate Kaggle publication readiness
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          EVENT_REF_NAME: ${{ github.ref_name }}
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
          WORKFLOW_SOURCE_REF: ${{ env.WORKFLOW_SOURCE_REF }}
        run: |
          set -euo pipefail
          if [ "$EVENT_REF_NAME" != "$DEFAULT_BRANCH" ] || [ "$WORKFLOW_SOURCE_REF" != "$DEFAULT_BRANCH" ]; then
            echo "::error::publish=true requires the default branch '$DEFAULT_BRANCH'; event_ref='$EVENT_REF_NAME' workflow_source_ref='$WORKFLOW_SOURCE_REF'"
            exit 1
          fi
          if [ -z "${KAGGLE_USERNAME:-}" ] || [ -z "${KAGGLE_KEY:-}" ]; then
            echo "::error::KAGGLE_USERNAME and KAGGLE_KEY are required when publish=true"
            exit 1
          fi

          uv run python - <<'PY'
          import os
          import re
          from pathlib import Path

          from nbadb.kaggle.client import KaggleClient

          try:
              client = KaggleClient()
              result = client.publication_preflight()
          except Exception as exc:
              print(
                  "::error::Kaggle publication preflight failed "
                  f"({type(exc).__name__})"
              )
              raise SystemExit(1) from None

          if not isinstance(result, dict):
              print("::error::Kaggle publication preflight returned an invalid result")
              raise SystemExit(1)

          acceptable = result.get("acceptable")
          version = result.get("version")
          state = str(result.get("state") or "").strip()
          if acceptable is not True:
              print("::error::Kaggle publication preflight was not acceptable")
              raise SystemExit(1)
          if isinstance(version, bool) or not isinstance(version, int) or version <= 0:
              print("::error::Kaggle publication preflight did not resolve a positive exact version")
              raise SystemExit(1)
          if re.fullmatch(r"[a-z][a-z0-9_]{0,63}", state) is None:
              print("::error::Kaggle publication preflight returned an invalid state")
              raise SystemExit(1)

          with Path(os.environ["GITHUB_STEP_SUMMARY"]).open("a", encoding="utf-8") as handle:
              handle.write("## Kaggle Publication Preflight\n")
              handle.write("**Acceptable:** `true`\n")
              handle.write(f"**State:** `{state}`\n")
              handle.write(f"**Exact remote version:** `{version}`\n")
          PY

      - name: Revalidate frozen publication source
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -euo pipefail
          source_commit="$(git rev-parse "${WORKFLOW_SOURCE_SHA}^{commit}")"
          target_ref="refs/remotes/origin/frozen-publication-target"
          git fetch --no-tags --no-recurse-submodules origin \
            "+refs/heads/${DEFAULT_BRANCH}:${target_ref}"
          target_commit="$(git rev-parse "${target_ref}^{commit}")"
          if [ "$target_commit" != "$source_commit" ]; then
            read -r commit parent extra < <(git rev-list --parents -n 1 "$target_commit")
            changed_paths="$(git diff-tree --no-commit-id --name-only -r "$target_commit")"
            commit_subject="$(git log -1 --format=%s "$target_commit")"
            expected_metadata="$RUNNER_TEMP/expected-dataset-metadata.json"
            observed_metadata="$RUNNER_TEMP/observed-dataset-metadata.json"
            uv run nbadb metadata \
              --data-dir data/nbadb \
              --output "$expected_metadata"
            git show "${target_commit}:dataset-metadata.json" > "$observed_metadata" 2>/dev/null || true
            if [ "$commit" != "$target_commit" ] || \
               [ "$parent" != "$source_commit" ] || \
               [ -n "${extra:-}" ] || \
               [ "$changed_paths" != "dataset-metadata.json" ] || \
               [ "$commit_subject" != "chore: regenerate dataset-metadata.json" ] || \
               ! cmp --silent "$expected_metadata" "$observed_metadata"; then
              echo "::error::Default branch moved during extraction: expected $source_commit or its exact metadata-only publication child, found $target_commit"
              exit 1
            fi
            echo "::notice::Accepting exact metadata-only publication child $target_commit for rerun reconciliation"
          fi

      - name: Upload to Kaggle
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
        run: |
          uv run nbadb upload \
            --data-dir data/nbadb \
            --verify-remote \
            --full-publication \
            --remote-timeout 3600 \
            --remote-poll-interval 15 \
            -m "Full extraction chain=${ACTIVE_CHAIN_ID} source=${WORKFLOW_SOURCE_SHA} coverage=${{ needs.merge.outputs.coverage-fingerprint }}"

      - name: Detect Kaggle publication reconciliation state
        id: kaggle_publication_state
        if: always()
        run: |
          if [ -f logs/kaggle/kaggle-publication-state.json ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Kaggle publication state was not created"
          fi

      - name: Persist Kaggle publication reconciliation state
        if: ${{ always() && steps.kaggle_publication_state.outputs.exists == 'true' }}
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: logs/kaggle/kaggle-publication-state.json
          key: nbadb-kaggle-publication-state-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Upload Kaggle publication receipt
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          overwrite: true
          name: full-extraction-kaggle-publication-receipt-${{ env.ACTIVE_CHAIN_ID }}
          path: |
            logs/kaggle/kaggle-upload-manifest.json
            logs/kaggle/kaggle-publication-state.json
          if-no-files-found: ignore
          retention-days: 30
          compression-level: 6

      - name: Upload final database
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          overwrite: true
          name: nbadb-full-extraction-${{ env.ACTIVE_CHAIN_ID }}
          path: |
            data/nbadb/*.duckdb
            data/nbadb/*.sqlite
            data/nbadb/parquet/
            data/nbadb/csv/
            data/nbadb/terminal-assurance-report.json
            data/nbadb/assured-artifact-manifest.json
            data/nbadb/dataset-metadata.json
            logs/kaggle/kaggle-upload-manifest.json
            logs/kaggle/kaggle-publication-state.json
          if-no-files-found: ignore
          retention-days: 30
          compression-level: 0

      - name: Refresh checked-in metadata
        uses: ./.github/actions/refresh-metadata
        with:
          data-dir: data/nbadb
          push-ref: ${{ github.event.repository.default_branch }}

  # ─────────────────────────────────────────────────────────────
  #  Lane control: carry a manifest forward and classify unresolved lanes
  # ─────────────────────────────────────────────────────────────
  lane_control:
    needs: [plan, preflight, discovery_seed, extract, terminal_replay]
    if: ${{ always() && !cancelled() && needs.plan.result == 'success' && ((needs.plan.outputs.active-lane-count != '0' && needs.preflight.result == 'success' && needs.discovery_seed.result == 'success' && needs.extract.result != 'skipped') || (inputs.resume_source_run_id != '' && needs.plan.outputs.active-lane-count == '0' && needs.plan.outputs.matrix-lane-count == '0' && needs.terminal_replay.result == 'success' && needs.terminal_replay.outputs.artifact-name == '')) }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      actions: read
      contents: read
    outputs:
      active-lane-count: ${{ steps.next_manifest.outputs.active_lane_count }}
      resume-only-lane-count: ${{ steps.next_manifest.outputs.resume_only_lane_count }}
      contract-blocked-lane-count: ${{ steps.next_manifest.outputs.contract_blocked_lane_count }}
      split-lane-count: ${{ steps.next_manifest.outputs.split_lane_count }}
      artifact-name: ${{ steps.next_manifest.outputs.artifact_name }}
      checkpoint-artifact-name: ${{ steps.next_manifest.outputs.checkpoint_artifact_name }}
      checkpoint-generation: ${{ steps.next_manifest.outputs.checkpoint_generation }}
      iteration-budget: ${{ steps.next_manifest.outputs.iteration_budget }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ env.WORKFLOW_SOURCE_SHA }}

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          enable-cache: true

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - run: uv sync

      - name: Download lane metadata
        if: ${{ needs.plan.outputs.active-lane-count != '0' }}
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          pattern: extraction-lane-metadata-${{ env.ACTIVE_CHAIN_ID }}-*
          path: lane-metadata/

      - name: Download lane manifest
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: full-extraction-manifest-${{ env.ACTIVE_CHAIN_ID }}
          path: plan-artifact/

      - name: Build next manifest
        id: next_manifest
        env:
          ITERATION: ${{ inputs.iteration }}
          MAX_ITERATIONS: ${{ inputs.max_iterations }}
          CHAIN_ID: ${{ env.ACTIVE_CHAIN_ID }}
          RETRY_PIPELINE_FAILURES: ${{ inputs.retry_pipeline_failures }}
          MATRIX_BATCH_SIZE: ${{ inputs.matrix_batch_size }}
          PREFLIGHT_QUARANTINE_JSON: ${{ needs.preflight.outputs.vpn-quarantined-servers-json }}
        run: |
          mkdir -p artifacts/full-extraction
          manifest_path="$(find plan-artifact -name manifest.json -type f -print -quit)"
          if [ -z "$manifest_path" ]; then
            echo "::error::Plan artifact did not contain manifest.json"
            find plan-artifact -maxdepth 4 -type f -print || true
            exit 1
          fi
          cp "$manifest_path" artifacts/full-extraction/current-manifest.json
          uv run python - <<'PY'
          # PREFLIGHT_QUARANTINE_PERSISTENCE
          import json
          import os
          from pathlib import Path

          manifest_path = Path("artifacts/full-extraction/current-manifest.json")
          payload = json.loads(manifest_path.read_text(encoding="utf-8"))
          chain_state = payload.setdefault("chain_state", {})
          if not isinstance(chain_state, dict):
              raise SystemExit("current manifest chain_state must be an object")
          existing = chain_state.get("vpn_quarantined_servers", [])
          incoming = json.loads(os.environ.get("PREFLIGHT_QUARANTINE_JSON", "") or "[]")
          if not isinstance(existing, list) or not isinstance(incoming, list):
              raise SystemExit("VPN quarantine state must be represented as JSON arrays")
          combined = sorted(
              {
                  str(server).strip()
                  for server in [*existing, *incoming]
                  if str(server).strip()
              }
          )
          chain_state["vpn_quarantined_servers"] = combined
          manifest_path.write_text(
              json.dumps(payload, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          PY
          checkpoint_generation="$(CURRENT_MANIFEST=artifacts/full-extraction/current-manifest.json python - <<'PY'
          # CHECKPOINT_GENERATION_RESOLVER
          import json
          import os
          import re
          from pathlib import Path

          manifest = json.loads(
              Path(os.environ["CURRENT_MANIFEST"]).read_text(encoding="utf-8")
          )
          chain_id = os.environ["CHAIN_ID"]
          expected_source_sha = os.environ["WORKFLOW_SOURCE_SHA"].lower()
          if not isinstance(manifest, dict):
              raise SystemExit("checkpoint provenance manifest must be an object")
          if str(manifest.get("chain_id") or "") != chain_id:
              raise SystemExit("checkpoint provenance manifest chain identity does not match")
          if str(manifest.get("workflow_source_sha") or "").lower() != expected_source_sha:
              raise SystemExit("checkpoint provenance manifest source SHA does not match")

          state = manifest.get("chain_state", {})
          if not isinstance(state, dict):
              raise SystemExit("checkpoint provenance chain_state must be an object")
          previous_run_id = str(state.get("latest_checkpoint_run_id") or "").strip()
          previous_artifact_name = str(
              state.get("latest_checkpoint_artifact_name") or ""
          ).strip()
          previous_coverage_hash = str(
              state.get("latest_checkpoint_coverage_hash") or ""
          ).strip().lower()
          raw_previous_generation = state.get("latest_checkpoint_generation", 0)
          if isinstance(raw_previous_generation, bool) or not isinstance(
              raw_previous_generation, int
          ):
              raise SystemExit(
                  "trusted previous checkpoint generation must be a non-negative integer"
              )
          previous_generation = raw_previous_generation
          if previous_generation < 0:
              raise SystemExit(
                  "trusted previous checkpoint generation must be a non-negative integer"
              )

          if previous_generation == 0:
              if previous_run_id or previous_artifact_name or previous_coverage_hash:
                  raise SystemExit(
                      "checkpoint pointer cannot exist without a positive trusted generation"
                  )
          else:
              if re.fullmatch(r"[1-9][0-9]*", previous_run_id) is None:
                  raise SystemExit(
                      "positive trusted checkpoint generation requires a valid source run ID"
                  )
              expected_previous_name = (
                  f"full-extraction-checkpoint-{chain_id}-iter-{previous_generation}"
              )
              if previous_artifact_name != expected_previous_name:
                  raise SystemExit(
                      "trusted previous checkpoint artifact suffix does not match its generation: "
                      f"expected {expected_previous_name}, got "
                      f"{previous_artifact_name or '<missing>'}"
                  )
              if re.fullmatch(r"[0-9a-f]{64}", previous_coverage_hash) is None:
                  raise SystemExit(
                      "positive trusted checkpoint generation requires a coverage SHA-256"
                  )

          print(previous_generation + 1)
          PY
          )"
          CHECKPOINT_GENERATION="$checkpoint_generation"
          CHECKPOINT_ARTIFACT_NAME="full-extraction-checkpoint-${CHAIN_ID}-iter-${CHECKPOINT_GENERATION}"
          export CHECKPOINT_ARTIFACT_NAME CHECKPOINT_GENERATION
          common_resume_args=(
            resume
            --lane-manifest-path artifacts/full-extraction/current-manifest.json
            --metadata-dir lane-metadata
            --completed-artifact-run-id "${{ github.run_id }}"
            --iteration "$ITERATION"
            --max-matrix-lanes "$MATRIX_BATCH_SIZE"
            --allow-missing-attempted-metadata
          )
          if [ "$RETRY_PIPELINE_FAILURES" = "true" ]; then
            common_resume_args+=(--allow-pipeline-failures)
          fi
          uv run python -m nbadb.orchestrate.full_extraction_control \
            "${common_resume_args[@]}" \
            --output-path artifacts/full-extraction/provisional-next-manifest.json \
            > artifacts/full-extraction/provisional-next-manifest.stdout.json

          CHECKPOINT_COVERAGE_HASH="$(PROVISIONAL_MANIFEST=artifacts/full-extraction/provisional-next-manifest.json uv run python - <<'PY'
          # CHECKPOINT_COVERAGE_RESOLVER
          import json
          import os
          import re
          from pathlib import Path

          from nbadb.orchestrate.full_extraction_control import (
              manifest_payload,
              normalize_manifest,
          )

          provisional = normalize_manifest(
              json.loads(
                  Path(os.environ["PROVISIONAL_MANIFEST"]).read_text(encoding="utf-8")
              )
          )
          completed_lanes = [lane for lane in provisional.lanes if lane.resume_only]
          coverage_hash = str(
              manifest_payload(completed_lanes).get("coverage_fingerprint") or ""
          ).lower()
          if re.fullmatch(r"[0-9a-f]{64}", coverage_hash) is None:
              raise SystemExit("provisional checkpoint coverage fingerprint is invalid")
          print(coverage_hash)
          PY
          )"
          export CHECKPOINT_COVERAGE_HASH
          resume_args=(
            "${common_resume_args[@]}"
            --latest-checkpoint-run-id "${{ github.run_id }}"
            --latest-checkpoint-artifact-name "$CHECKPOINT_ARTIFACT_NAME"
            --latest-checkpoint-generation "$CHECKPOINT_GENERATION"
            --latest-checkpoint-coverage-hash "$CHECKPOINT_COVERAGE_HASH"
            --output-path artifacts/full-extraction/next-manifest.json
          )
          uv run python -m nbadb.orchestrate.full_extraction_control "${resume_args[@]}" \
            > artifacts/full-extraction/next-manifest.stdout.json

          uv run python -m nbadb.orchestrate.full_extraction_control audit \
            --metadata-dir lane-metadata \
            --output-path artifacts/full-extraction/extraction-audit.json \
            > artifacts/full-extraction/extraction-audit.stdout.json

          uv run python - <<'PY'
          # LANE_CONTROL_CONTRACT_BLOCKED_POSTPROCESSOR
          import json
          import os
          import re
          from pathlib import Path

          from nbadb.orchestrate.full_extraction_control import (
              _canonical_contract_blocked_audit_row,
              _hash_payload,
              normalize_manifest,
              redispatch_manifest_payload,
          )

          payload = json.loads(
              Path("artifacts/full-extraction/next-manifest.json").read_text(
                  encoding="utf-8"
              )
          )
          current_payload = json.loads(
              Path("artifacts/full-extraction/current-manifest.json").read_text(
                  encoding="utf-8"
              )
          )
          payload["chain_id"] = os.environ["CHAIN_ID"]
          payload["workflow_source_sha"] = os.environ["WORKFLOW_SOURCE_SHA"].lower()
          next_state = payload.get("chain_state", {})
          current_state = current_payload.get("chain_state", {})
          if not isinstance(next_state, dict) or not isinstance(current_state, dict):
              raise SystemExit("checkpoint manifest chain_state must be an object")
          audit = json.loads(
              Path("artifacts/full-extraction/extraction-audit.json").read_text(
                  encoding="utf-8"
              )
          )
          if not isinstance(audit, dict):
              raise SystemExit("extraction audit must be an object")

          def canonical_rows(raw_rows: object, *, label: str) -> list[dict[str, object]]:
              if not isinstance(raw_rows, list):
                  raise SystemExit(f"{label} blocked evidence must be a list")
              rows: list[dict[str, object]] = []
              seen: set[str] = set()
              for raw_row in raw_rows:
                  if not isinstance(raw_row, dict):
                      raise SystemExit(f"{label} blocked evidence rows must be objects")
                  lane_id = str(raw_row.get("lane_id") or "").strip()
                  if not lane_id or lane_id in seen:
                      raise SystemExit(f"{label} blocked lane IDs must be unique")
                  canonical_input = dict(raw_row)
                  canonical_input["lane_kind"] = raw_row.get("kind")
                  try:
                      row = _canonical_contract_blocked_audit_row(
                          lane_id,
                          canonical_input,
                      )
                  except ValueError as exc:
                      raise SystemExit(
                          f"{label} blocked evidence is invalid for {lane_id}: {exc}"
                      ) from exc
                  if _hash_payload(row) != _hash_payload(raw_row):
                      raise SystemExit(
                          f"{label} blocked evidence is not canonical for {lane_id}"
                      )
                  seen.add(lane_id)
                  rows.append(row)
              return sorted(rows, key=lambda row: str(row["lane_id"]))

          previous_blocked_rows = canonical_rows(
              current_state.get("contract_blocked_evidence", []),
              label="current chain-state",
          )
          previous_blocked_digest = str(
              current_state.get("contract_blocked_evidence_sha256") or ""
          )
          if previous_blocked_rows:
              previous_bundle = {
                  "schema_version": 1,
                  "contract_blocked_lanes": previous_blocked_rows,
              }
              if _hash_payload(previous_bundle) != previous_blocked_digest:
                  raise SystemExit("current chain-state blocked evidence digest does not match")
          elif previous_blocked_digest:
              empty_bundle = {"schema_version": 1, "contract_blocked_lanes": []}
              if _hash_payload(empty_bundle) != previous_blocked_digest:
                  raise SystemExit("current chain-state empty blocked evidence digest is invalid")

          pending_blocked_rows = canonical_rows(
              current_state.get("pending_contract_blocked_evidence", []),
              label="current pending chain-state",
          )
          pending_blocked_digest = str(
              current_state.get("pending_contract_blocked_evidence_sha256") or ""
          )
          if pending_blocked_rows:
              pending_bundle = {
                  "schema_version": 1,
                  "contract_blocked_lanes": pending_blocked_rows,
              }
              if _hash_payload(pending_bundle) != pending_blocked_digest:
                  raise SystemExit(
                      "current chain-state pending blocked evidence digest does not match"
                  )
          elif pending_blocked_digest:
              raise SystemExit(
                  "current chain-state pending blocked evidence digest has no rows"
              )

          current_blocked_rows = canonical_rows(
              audit.get("contract_blocked_lanes", []),
              label="current extraction audit",
          )
          blocked_rows_by_id = {
              str(row["lane_id"]): row for row in previous_blocked_rows
          }
          for label, rows in (
              ("pending", pending_blocked_rows),
              ("current", current_blocked_rows),
          ):
              for row in rows:
                  lane_id = str(row["lane_id"])
                  prior = blocked_rows_by_id.get(lane_id)
                  if prior is not None and _hash_payload(prior) != _hash_payload(row):
                      raise SystemExit(f"{label} blocked evidence changed for {lane_id}")
                  blocked_rows_by_id[lane_id] = row
          merged_blocked_rows = [
              blocked_rows_by_id[lane_id] for lane_id in sorted(blocked_rows_by_id)
          ]
          merged_blocked_bundle = {
              "schema_version": 1,
              "contract_blocked_lanes": merged_blocked_rows,
          }
          merged_blocked_digest = _hash_payload(merged_blocked_bundle)
          next_state["previous_contract_blocked_evidence"] = previous_blocked_rows
          next_state["previous_contract_blocked_evidence_sha256"] = (
              previous_blocked_digest
          )
          next_state["contract_blocked_evidence"] = merged_blocked_rows
          next_state["contract_blocked_evidence_sha256"] = merged_blocked_digest
          next_state["pending_contract_blocked_evidence"] = []
          next_state["pending_contract_blocked_evidence_sha256"] = ""
          current_run_ids = current_state.get("artifact_run_ids", [])
          next_run_ids = next_state.get("artifact_run_ids", [])
          if not isinstance(current_run_ids, list) or not isinstance(next_run_ids, list):
              raise SystemExit("checkpoint artifact_run_ids must be lists")
          artifact_run_ids = [
              str(run_id).strip()
              for run_id in [*current_run_ids, *next_run_ids]
              if str(run_id).strip()
          ]
          if any(re.fullmatch(r"[1-9][0-9]*", run_id) is None for run_id in artifact_run_ids):
              raise SystemExit("checkpoint artifact run IDs must be positive integers")
          next_state["artifact_run_ids"] = list(dict.fromkeys(artifact_run_ids))
          Path("artifacts/full-extraction/next-manifest.json").write_text(
              json.dumps(payload, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          manifest = normalize_manifest(payload)
          summary = payload.get("resume_summary", {})
          redispatch_payload = redispatch_manifest_payload(
              list(manifest.lanes),
              chain_state=manifest.chain_state,
          )
          redispatch_json = json.dumps(redispatch_payload, separators=(",", ":"))
          artifact_name = (
              f"full-extraction-next-manifest-{os.environ['CHAIN_ID']}-iter-"
              f"{int(os.environ['ITERATION']) + 1}"
          )
          report = {
              "artifact_name": artifact_name,
              "checkpoint_artifact_name": os.environ["CHECKPOINT_ARTIFACT_NAME"],
              "checkpoint_generation": int(os.environ["CHECKPOINT_GENERATION"]),
              "checkpoint_coverage_hash": os.environ["CHECKPOINT_COVERAGE_HASH"],
              "active_lane_count": int(summary.get("active_lane_count", 0)),
              "resume_only_lane_count": int(summary.get("resume_only_lane_count", 0)),
              "contract_blocked_lane_count": int(summary.get("contract_blocked_lane_count", 0)),
              "split_lane_count": int(summary.get("split_lane_count", 0)),
              "outcome_counts": summary.get("outcome_counts", {}),
              "failure_reason_counts": summary.get("failure_reason_counts", {}),
              "failure_class_counts": summary.get("failure_class_counts", {}),
              "iteration_budget": int(payload.get("iteration_budget", 0)),
              "redispatch_payload_bytes": len(redispatch_json.encode("utf-8")),
              "next_iteration": int(os.environ["ITERATION"]) + 1,
          }
          Path("artifacts/full-extraction/chain-dispatch.json").write_text(
              json.dumps(report, indent=2) + "\n",
              encoding="utf-8",
          )
          Path("artifacts/full-extraction/resume-summary.json").write_text(
              json.dumps(summary, indent=2) + "\n",
              encoding="utf-8",
          )
          Path("artifacts/full-extraction/next-manifest.inspect.txt").write_text(
              "\n".join(
                  [
                      f"active_lane_count={report['active_lane_count']}",
                      f"resume_only_lane_count={report['resume_only_lane_count']}",
                      f"contract_blocked_lane_count={report['contract_blocked_lane_count']}",
                      f"split_lane_count={report['split_lane_count']}",
                      "outcome_counts="
                      + json.dumps(report["outcome_counts"], sort_keys=True),
                      "failure_reason_counts="
                      + json.dumps(report["failure_reason_counts"], sort_keys=True),
                      "failure_class_counts="
                      + json.dumps(report["failure_class_counts"], sort_keys=True),
                      f"iteration_budget={report['iteration_budget']}",
                      f"redispatch_payload_bytes={report['redispatch_payload_bytes']}",
                      f"artifact_name={artifact_name}",
                      f"checkpoint_artifact_name={report['checkpoint_artifact_name']}",
                  ]
              )
              + "\n",
              encoding="utf-8",
          )

          with Path(os.environ["GITHUB_OUTPUT"]).open("a", encoding="utf-8") as handle:
              for key, value in report.items():
                  if isinstance(value, dict):
                      value = json.dumps(value, sort_keys=True)
                  handle.write(f"{key}={value}\n")
          PY

          active_lane_count="$(python - <<'PY'
          import json
          from pathlib import Path
          print(json.loads(Path("artifacts/full-extraction/chain-dispatch.json").read_text())["active_lane_count"])
          PY
          )"
          resume_only_lane_count="$(python - <<'PY'
          import json
          from pathlib import Path
          print(json.loads(Path("artifacts/full-extraction/chain-dispatch.json").read_text())["resume_only_lane_count"])
          PY
          )"
          contract_blocked_lane_count="$(python - <<'PY'
          import json
          from pathlib import Path
          print(json.loads(Path("artifacts/full-extraction/chain-dispatch.json").read_text())["contract_blocked_lane_count"])
          PY
          )"
          split_lane_count="$(python - <<'PY'
          import json
          from pathlib import Path
          print(json.loads(Path("artifacts/full-extraction/chain-dispatch.json").read_text())["split_lane_count"])
          PY
          )"
          artifact_name="$(python - <<'PY'
          import json
          from pathlib import Path
          print(json.loads(Path("artifacts/full-extraction/chain-dispatch.json").read_text())["artifact_name"])
          PY
          )"
          failure_reason_counts="$(python - <<'PY'
          import json
          from pathlib import Path
          print(json.dumps(json.loads(Path("artifacts/full-extraction/chain-dispatch.json").read_text())["failure_reason_counts"], sort_keys=True))
          PY
          )"
          outcome_counts="$(python - <<'PY'
          import json
          from pathlib import Path
          print(json.dumps(json.loads(Path("artifacts/full-extraction/chain-dispatch.json").read_text())["outcome_counts"], sort_keys=True))
          PY
          )"
          rows_persisted="$(python - <<'PY'
          import json
          from pathlib import Path
          audit = json.loads(Path("artifacts/full-extraction/extraction-audit.json").read_text())
          print(audit.get("rows_persisted", 0))
          PY
          )"
          top_endpoint_blockers="$(python - <<'PY'
          import json
          from pathlib import Path
          audit = json.loads(Path("artifacts/full-extraction/extraction-audit.json").read_text())
          endpoint_counts = audit.get("endpoint_status_counts", {})
          blockers = []
          for endpoint, counts in endpoint_counts.items():
              blocked = int(counts.get("contract_blocked", 0))
              failed = int(counts.get("pipeline_failure", 0))
              waiting = int(counts.get("needs_resume", 0))
              total = blocked + failed + waiting
              if total:
                  blockers.append((total, endpoint, counts))
          blockers.sort(reverse=True)
          print(", ".join(f"{endpoint}:{total}" for total, endpoint, _counts in blockers[:5]) or "none")
          PY
          )"

          python - <<'PY'
          import json
          import os
          from pathlib import Path

          manifest = json.loads(
              Path("artifacts/full-extraction/next-manifest.json").read_text(encoding="utf-8")
          )
          quarantine_payload = {
              "chain_id": os.environ["CHAIN_ID"],
              "vpn_quarantined_servers": manifest.get("chain_state", {}).get(
                  "vpn_quarantined_servers", []
              ),
          }
          Path("artifacts/full-extraction/vpn-quarantine.json").write_text(
              json.dumps(quarantine_payload, indent=2) + "\n",
              encoding="utf-8",
          )
          PY

          {
            echo "## Full Extraction Control Plane"
            echo ""
            echo "| Metric | Value |"
            echo "|---|---:|"
            echo "| Control-plane health | OK |"
            echo "| Lane outcomes | \`$outcome_counts\` |"
            echo "| Top endpoint blockers | \`$top_endpoint_blockers\` |"
            echo "| Rows persisted | $rows_persisted |"
            echo "| Active lanes | $active_lane_count |"
            echo "| Resume-only lanes | $resume_only_lane_count |"
            echo "| Contract-blocked lanes | $contract_blocked_lane_count |"
            echo "| Split child lanes | $split_lane_count |"
            if [ "$active_lane_count" -gt 0 ]; then
              echo "| Next action | Redispatch iteration $((ITERATION + 1)) via \`$artifact_name\` |"
            else
              echo "| Next action | Merge terminal checkpoint artifact |"
            fi
            echo ""
            echo "**Unresolved reasons:** \`$failure_reason_counts\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload next manifest artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          overwrite: true
          name: ${{ steps.next_manifest.outputs.artifact_name || format('full-extraction-next-manifest-{0}-iter-{1}', env.ACTIVE_CHAIN_ID, inputs.iteration) }}
          path: |
            artifacts/full-extraction/current-manifest.json
            artifacts/full-extraction/next-manifest.json
            artifacts/full-extraction/next-manifest.stdout.json
            artifacts/full-extraction/next-manifest.inspect.txt
            artifacts/full-extraction/resume-summary.json
            artifacts/full-extraction/extraction-audit.json
            artifacts/full-extraction/extraction-audit.stdout.json
            artifacts/full-extraction/chain-dispatch.json
            artifacts/full-extraction/vpn-quarantine.json
          if-no-files-found: ignore
          retention-days: 30
          compression-level: 6

      - name: Upload VPN quarantine artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          overwrite: true
          name: full-extraction-vpn-quarantine-${{ env.ACTIVE_CHAIN_ID }}
          path: artifacts/full-extraction/vpn-quarantine.json
          if-no-files-found: ignore
          retention-days: 7
          compression-level: 6

  # ─────────────────────────────────────────────────────────────
  #  Checkpoint: aggregate complete lanes into a cumulative database
  # ─────────────────────────────────────────────────────────────
  checkpoint:
    needs: [plan, preflight, discovery_seed, extract, lane_control]
    if: ${{ always() && !cancelled() && needs.lane_control.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      actions: read
      contents: read
    outputs:
      artifact-name: ${{ steps.checkpoint.outputs.artifact_name }}
      checkpoint-generation: ${{ steps.checkpoint.outputs.checkpoint_generation }}
      coverage-fingerprint: ${{ steps.checkpoint.outputs.coverage_fingerprint }}
      terminal-ready: ${{ steps.checkpoint.outputs.terminal_ready }}
      active-lane-count: ${{ steps.checkpoint.outputs.active_lane_count }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ env.WORKFLOW_SOURCE_SHA }}

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          enable-cache: true

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - run: uv sync

      - name: Download lane-control manifest
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: ${{ needs.lane_control.outputs.artifact-name }}
          path: lane-control-artifact/

      - name: Download previous checkpoint
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p previous-checkpoint artifacts/full-extraction
          current_manifest="$(find lane-control-artifact -name current-manifest.json -type f -print -quit)"
          if [ -z "$current_manifest" ]; then
            echo "::error::Lane-control artifact did not contain current-manifest.json"
            find lane-control-artifact -maxdepth 4 -type f -print || true
            exit 1
          fi

          checkpoint_pointer="$(CURRENT_MANIFEST="$current_manifest" python - <<'PY'
          import json
          import os
          from pathlib import Path

          manifest_path = Path(os.environ["CURRENT_MANIFEST"])
          manifest = json.loads(manifest_path.read_text(encoding="utf-8"))
          state = manifest.get("chain_state", {})
          print(
              str(state.get("latest_checkpoint_run_id") or ""),
              str(state.get("latest_checkpoint_artifact_name") or ""),
          )
          PY
          )"
          read -r previous_run_id previous_artifact_name <<< "$checkpoint_pointer"

          if [ -z "$previous_run_id" ] || [ -z "$previous_artifact_name" ]; then
            echo "::notice::No previous checkpoint pointer found"
            exit 0
          fi

          echo "Downloading previous checkpoint $previous_artifact_name from run $previous_run_id"
          if ! gh run download "$previous_run_id" \
            --repo "${{ github.repository }}" \
            --name "$previous_artifact_name" \
            --dir previous-checkpoint; then
            echo "::warning::Previous checkpoint artifact $previous_artifact_name from run $previous_run_id was unavailable"
          fi

      - name: Verify previous checkpoint before inventory use
        env:
          CHAIN_ID: ${{ env.ACTIVE_CHAIN_ID }}
        run: |
          set -euo pipefail
          mkdir -p artifacts/full-extraction
          current_manifest="$(find lane-control-artifact -name current-manifest.json -type f -print -quit)"
          previous_report="$(find previous-checkpoint -name checkpoint-report.json -type f -print -quit || true)"
          previous_database="$(find previous-checkpoint -name nba.duckdb -type f -print -quit || true)"
          if [ -z "$current_manifest" ]; then
            echo "::error::Lane-control artifact did not contain current-manifest.json"
            exit 1
          fi
          if [ -z "$previous_report" ] && [ -z "$previous_database" ]; then
            echo "::notice::No downloaded previous checkpoint requires verification"
            exit 0
          fi
          if [ -z "$previous_report" ] || [ -z "$previous_database" ]; then
            echo "::error::Downloaded previous checkpoint is incomplete"
            find previous-checkpoint -maxdepth 6 -type f -print || true
            exit 1
          fi

          uv run python -m nbadb.orchestrate.full_extraction_control verify-checkpoint \
            --lane-manifest-path "$current_manifest" \
            --checkpoint-dir previous-checkpoint \
            --checkpoint-report-path "$previous_report" \
            --chain-id "$CHAIN_ID" \
            --source-sha "$WORKFLOW_SOURCE_SHA" \
            --pointer-prefix latest \
            > artifacts/full-extraction/verified-previous-checkpoint.json

      - name: Download checkpoint lane inputs
        env:
          ACTIVE_CHAIN_ID: ${{ env.ACTIVE_CHAIN_ID }}
          CURRENT_RUN_ID: ${{ github.run_id }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p artifacts/full-extraction checkpoint-discovery lane-metadata lanes
          current_manifest="$(find lane-control-artifact -name current-manifest.json -type f -print -quit)"
          if [ -z "$current_manifest" ]; then
            echo "::error::Lane-control artifact did not contain current-manifest.json"
            find lane-control-artifact -maxdepth 4 -type f -print || true
            exit 1
          fi

          run_ids_path="$RUNNER_TEMP/checkpoint-artifact-run-ids.txt"
          CURRENT_MANIFEST="$current_manifest" \
            RUN_IDS_PATH="$run_ids_path" \
            python - <<'PY'
          # CHECKPOINT_SOURCE_RUN_RESOLVER
          import json
          import os
          import re
          from pathlib import Path

          manifest = json.loads(
              Path(os.environ["CURRENT_MANIFEST"]).read_text(encoding="utf-8")
          )
          chain_id = os.environ["ACTIVE_CHAIN_ID"]
          expected_source_sha = os.environ["WORKFLOW_SOURCE_SHA"].lower()
          if not isinstance(manifest, dict):
              raise SystemExit("checkpoint current manifest must be an object")
          if str(manifest.get("chain_id") or "") != chain_id:
              raise SystemExit("checkpoint current manifest chain identity does not match")
          if str(manifest.get("workflow_source_sha") or "").lower() != expected_source_sha:
              raise SystemExit("checkpoint current manifest source SHA does not match")

          chain_state = manifest.get("chain_state", {})
          if not isinstance(chain_state, dict):
              raise SystemExit("checkpoint current manifest chain_state must be an object")
          raw_run_ids = chain_state.get("artifact_run_ids", [])
          if not isinstance(raw_run_ids, list):
              raise SystemExit("checkpoint artifact_run_ids must be a list")

          run_ids: list[str] = []
          for raw_run_id in [*raw_run_ids, os.environ["CURRENT_RUN_ID"]]:
              if isinstance(raw_run_id, bool):
                  raise SystemExit("checkpoint artifact run IDs must be positive integers")
              run_id = str(raw_run_id).strip()
              if re.fullmatch(r"[1-9][0-9]*", run_id) is None:
                  raise SystemExit(
                      f"checkpoint artifact run ID is invalid: {run_id or '<empty>'}"
                  )
              if run_id not in run_ids:
                  run_ids.append(run_id)

          Path(os.environ["RUN_IDS_PATH"]).write_text(
              "".join(f"{run_id}\n" for run_id in run_ids),
              encoding="utf-8",
          )
          PY

          inventories_dir="$RUNNER_TEMP/checkpoint-artifact-inventories"
          mkdir -p "$inventories_dir"
          while IFS= read -r run_id; do
            [ -n "$run_id" ] || continue
            gh api \
              --method GET \
              --paginate \
              --slurp \
              -H "Accept: application/vnd.github+json" \
              "/repos/${GITHUB_REPOSITORY}/actions/runs/${run_id}/artifacts?per_page=100" \
              > "$inventories_dir/run-${run_id}.json"
          done < "$run_ids_path"

          verified_previous_checkpoint="$(find artifacts/full-extraction -name verified-previous-checkpoint.json -type f -print -quit || true)"
          download_plan="$RUNNER_TEMP/checkpoint-lane-input-downloads.tsv"
          CURRENT_MANIFEST="$current_manifest" \
            DOWNLOAD_PLAN_PATH="$download_plan" \
            INVENTORIES_DIR="$inventories_dir" \
            VERIFIED_PREVIOUS_CHECKPOINT_PATH="$verified_previous_checkpoint" \
            RUN_IDS_PATH="$run_ids_path" \
            python - <<'PY'
          # CHECKPOINT_LANE_INPUT_RESOLVER
          import json
          import os
          from pathlib import Path

          manifest = json.loads(
              Path(os.environ["CURRENT_MANIFEST"]).read_text(encoding="utf-8")
          )
          chain_id = os.environ["ACTIVE_CHAIN_ID"]
          lanes = manifest.get("lanes", [])
          if not isinstance(lanes, list):
              raise SystemExit("checkpoint manifest lanes must be a list")
          lane_ids: list[str] = []
          for lane in lanes:
              if not isinstance(lane, dict):
                  raise SystemExit("checkpoint manifest lane entries must be objects")
              lane_id = str(lane.get("lane_id") or "").strip()
              if not lane_id or lane_id in lane_ids:
                  raise SystemExit("checkpoint manifest lane IDs must be non-empty and unique")
              lane_ids.append(lane_id)

          previous_lane_ids: set[str] = set()
          verified_previous_checkpoint_path = os.environ.get(
              "VERIFIED_PREVIOUS_CHECKPOINT_PATH", ""
          )
          if verified_previous_checkpoint_path:
              verified_previous_checkpoint = json.loads(
                  Path(verified_previous_checkpoint_path).read_text(encoding="utf-8")
              )
              raw_previous_lane_ids = verified_previous_checkpoint.get("included_lane_ids")
              if not isinstance(raw_previous_lane_ids, list):
                  raise SystemExit(
                      "verified previous checkpoint included_lane_ids must be a list"
                  )
              previous_lane_ids = {
                  str(lane_id).strip()
                  for lane_id in raw_previous_lane_ids
                  if str(lane_id).strip()
              }

          run_ids = [
              line.strip()
              for line in Path(os.environ["RUN_IDS_PATH"])
              .read_text(encoding="utf-8")
              .splitlines()
              if line.strip()
          ]
          run_rank = {run_id: index for index, run_id in enumerate(run_ids)}
          expected_names: dict[str, tuple[str, str]] = {}
          for lane_id in lane_ids:
              if lane_id in previous_lane_ids:
                  continue
              expected_names[f"extraction-lane-metadata-{chain_id}-{lane_id}"] = (
                  "metadata",
                  lane_id,
              )
              expected_names[f"extraction-lane-{chain_id}-{lane_id}"] = (
                  "lane",
                  lane_id,
              )

          candidates: dict[tuple[str, str], list[tuple[str, str]]] = {}
          discovery_name = f"full-extraction-discovery-artifacts-{chain_id}"
          discovery_candidates: list[tuple[str, str]] = []
          inventories_dir = Path(os.environ["INVENTORIES_DIR"])
          for run_id in run_ids:
              inventory_path = inventories_dir / f"run-{run_id}.json"
              pages = json.loads(inventory_path.read_text(encoding="utf-8"))
              if not isinstance(pages, list):
                  raise SystemExit(f"artifact inventory for run {run_id} must be a list")
              seen_names: set[str] = set()
              for page in pages:
                  if not isinstance(page, dict) or not isinstance(page.get("artifacts", []), list):
                      raise SystemExit(f"artifact inventory for run {run_id} is malformed")
                  for artifact in page.get("artifacts", []):
                      if not isinstance(artifact, dict) or artifact.get("expired") is True:
                          continue
                      name = str(artifact.get("name") or "")
                      if name in seen_names:
                          raise SystemExit(
                              f"artifact inventory for run {run_id} contains duplicate {name!r}"
                          )
                      seen_names.add(name)
                      if name == discovery_name:
                          discovery_candidates.append((run_id, name))
                          continue
                      expected = expected_names.get(name)
                      if expected is not None:
                          candidates.setdefault(expected, []).append((run_id, name))

          downloads: list[tuple[str, str, str]] = []
          for lane_id in lane_ids:
              if lane_id in previous_lane_ids:
                  continue
              metadata_candidates = candidates.get(("metadata", lane_id), [])
              lane_candidates = candidates.get(("lane", lane_id), [])
              paired_candidates = [
                  (lane_candidate, metadata_candidate)
                  for lane_candidate in lane_candidates
                  for metadata_candidate in metadata_candidates
                  if lane_candidate[0] == metadata_candidate[0]
              ]
              if lane_candidates and len(paired_candidates) != 1:
                  locations = ", ".join(
                      f"{lane_candidate[0]}:{lane_candidate[1]}+{metadata_candidate[1]}"
                      for lane_candidate, metadata_candidate in paired_candidates
                  ) or "none"
                  raise SystemExit(
                      "checkpoint lane artifact requires exactly one same-run "
                      f"lane/metadata pair for {lane_id}; found "
                      f"{len(paired_candidates)}: {locations}"
                  )
              if paired_candidates:
                  selected_lane, selected_metadata = paired_candidates[0]
                  downloads.append((selected_metadata[0], "metadata", selected_metadata[1]))
                  downloads.append((selected_lane[0], "lane", selected_lane[1]))

          requires_workload = any(
              isinstance(lane, dict)
              and "player_team_season" in lane.get("patterns", [])
              for lane in lanes
          )
          if requires_workload:
              if not discovery_candidates:
                  raise SystemExit(
                      "checkpoint manifest requires an exact discovery workload artifact"
                  )
              selected_discovery = max(
                  discovery_candidates,
                  key=lambda candidate: run_rank[candidate[0]],
              )
              downloads.append(
                  (selected_discovery[0], "discovery", selected_discovery[1])
              )

          downloads.sort(key=lambda row: (run_rank[row[0]], row[1], row[2]))
          Path(os.environ["DOWNLOAD_PLAN_PATH"]).write_text(
              "".join("\t".join(row) + "\n" for row in downloads),
              encoding="utf-8",
          )
          PY

          while IFS=$'\t' read -r run_id artifact_kind artifact_name; do
            [ -n "$run_id" ] || continue
            case "$artifact_kind" in
              metadata) target_root="lane-metadata" ;;
              lane) target_root="lanes" ;;
              discovery) target_root="checkpoint-discovery" ;;
              *) echo "::error::Unknown checkpoint artifact kind: $artifact_kind"; exit 1 ;;
            esac
            target_dir="$target_root/run-${run_id}/${artifact_name}"
            mkdir -p "$target_dir"
            gh run download "$run_id" \
              --repo "${GITHUB_REPOSITORY}" \
              --name "$artifact_name" \
              --dir "$target_dir"
          done < "$download_plan"

      - name: Build checkpoint database
        id: checkpoint
        env:
          CHAIN_ID: ${{ env.ACTIVE_CHAIN_ID }}
          CHECKPOINT_ARTIFACT_NAME: ${{ needs.lane_control.outputs.checkpoint-artifact-name }}
          EXPECTED_CHECKPOINT_GENERATION: ${{ needs.lane_control.outputs.checkpoint-generation }}
          CURRENT_RUN_ID: ${{ github.run_id }}
          LANE_CONTROL_ACTIVE_LANE_COUNT: ${{ needs.lane_control.outputs.active-lane-count }}
          LANE_CONTROL_CONTRACT_BLOCKED_LANE_COUNT: ${{ needs.lane_control.outputs.contract-blocked-lane-count }}
        run: |
          mkdir -p data/nbadb-checkpoint artifacts/full-extraction
          checkpoint_manifest="$(find lane-control-artifact -name next-manifest.json -type f -print -quit)"
          current_manifest="$(find lane-control-artifact -name current-manifest.json -type f -print -quit)"
          if [ -z "$checkpoint_manifest" ]; then
            echo "::error::Lane-control artifact did not contain next-manifest.json"
            find lane-control-artifact -maxdepth 4 -type f -print || true
            exit 1
          fi
          if [ -z "$current_manifest" ]; then
            echo "::error::Lane-control artifact did not contain current-manifest.json"
            find lane-control-artifact -maxdepth 4 -type f -print || true
            exit 1
          fi
          cp "$checkpoint_manifest" artifacts/full-extraction/checkpoint-manifest.json

          requires_workload_contract="$(CHECKPOINT_MANIFEST="$checkpoint_manifest" python - <<'PY'
          import json
          import os
          from pathlib import Path

          manifest = json.loads(Path(os.environ["CHECKPOINT_MANIFEST"]).read_text(encoding="utf-8"))
          requires_workload = any(
              "player_team_season" in lane.get("patterns", [])
              for lane in manifest.get("lanes", [])
              if isinstance(lane, dict)
          )
          print("true" if requires_workload else "false")
          PY
          )"
          workload_args=()
          if [ "$requires_workload_contract" = "true" ]; then
            workload_manifest="$(find checkpoint-discovery -type f -name nba.player-team-season-workload.player-team-season-workload.json -print -quit)"
            if [ -z "$workload_manifest" ]; then
              echo "::error::Player/team/season checkpoint manifest requires the discovery workload manifest"
              exit 1
            fi
            workload_args+=(
              --workload-duckdb-path "$(dirname "$workload_manifest")/nba.duckdb"
            )
          fi

          previous_args=()
          previous_report="$(find previous-checkpoint -name checkpoint-report.json -type f -print -quit || true)"
          if [ -n "$previous_report" ]; then
            previous_args+=(
              --previous-checkpoint-dir previous-checkpoint
              --previous-checkpoint-report-path "$previous_report"
            )
          fi

          uv run python -m nbadb.orchestrate.full_extraction_control checkpoint \
            --lane-manifest-path artifacts/full-extraction/checkpoint-manifest.json \
            --metadata-dir lane-metadata \
            --artifacts-dir lanes \
            "${workload_args[@]}" \
            "${previous_args[@]}" \
            --output-dir data/nbadb-checkpoint \
            --report-path artifacts/full-extraction/checkpoint-report.json \
            --chain-id "$CHAIN_ID" \
            --run-id "$CURRENT_RUN_ID" \
            --source-sha "$WORKFLOW_SOURCE_SHA" \
            > artifacts/full-extraction/checkpoint.stdout.json

          extraction_audit="$(find lane-control-artifact -name extraction-audit.json -type f -print -quit)"
          if [ -z "$extraction_audit" ]; then
            echo "::error::Lane-control artifact did not contain extraction-audit.json"
            exit 1
          fi
          EXTRACTION_AUDIT_PATH="$extraction_audit" \
            CURRENT_MANIFEST_PATH="$current_manifest" \
            NEXT_MANIFEST_PATH="$checkpoint_manifest" \
            PREVIOUS_CHECKPOINT_REPORT_PATH="$previous_report" \
            VERIFIED_PREVIOUS_CHECKPOINT_PATH="$(find artifacts/full-extraction -name verified-previous-checkpoint.json -type f -print -quit || true)" \
            CHECKPOINT_REPORT_PATH=artifacts/full-extraction/checkpoint-report.json \
            LANE_CONTROL_CONTRACT_BLOCKED_LANE_COUNT="$LANE_CONTROL_CONTRACT_BLOCKED_LANE_COUNT" \
            python - <<'PY'
          # CHECKPOINT_CONTRACT_BLOCKED_EVIDENCE_BINDER
          import hashlib
          import json
          import os
          from pathlib import Path

          from nbadb.orchestrate.full_extraction_control import (
              _canonical_contract_blocked_audit_row,
          )

          def canonical_bytes(payload: object) -> bytes:
              return json.dumps(
                  payload,
                  sort_keys=True,
                  separators=(",", ":"),
              ).encode("utf-8")

          def normalized_rows(raw_rows: object, *, label: str) -> list[dict[str, object]]:
              if not isinstance(raw_rows, list):
                  raise SystemExit(f"{label} contract-blocked evidence must be a list")
              rows: list[dict[str, object]] = []
              seen_lane_ids: set[str] = set()
              for raw_row in raw_rows:
                  if not isinstance(raw_row, dict):
                      raise SystemExit(f"{label} contract-blocked evidence rows must be objects")
                  lane_id = str(raw_row.get("lane_id") or "").strip()
                  if not lane_id or lane_id in seen_lane_ids:
                      raise SystemExit(
                          f"{label} contract-blocked lane IDs must be non-empty and unique"
                      )
                  if str(raw_row.get("status") or "") != "contract_blocked":
                      raise SystemExit(
                          f"{label} contract-blocked evidence has invalid status for {lane_id}"
                      )
                  canonical_input = dict(raw_row)
                  canonical_input["lane_kind"] = raw_row.get("kind")
                  try:
                      row = _canonical_contract_blocked_audit_row(
                          lane_id,
                          canonical_input,
                      )
                  except ValueError as exc:
                      raise SystemExit(
                          f"{label} contract-blocked evidence is invalid for {lane_id}: {exc}"
                      ) from exc
                  if canonical_bytes(row) != canonical_bytes(raw_row):
                      raise SystemExit(
                          f"{label} contract-blocked evidence is not canonical for {lane_id}"
                      )
                  seen_lane_ids.add(lane_id)
                  rows.append(row)
              return sorted(rows, key=lambda row: str(row["lane_id"]))

          def evidence_bundle(rows: list[dict[str, object]]) -> dict[str, object]:
              return {
                  "schema_version": 1,
                  "contract_blocked_lanes": rows,
              }

          def verified_previous_rows(report: object) -> list[dict[str, object]]:
              if not isinstance(report, dict):
                  raise SystemExit("previous checkpoint report must be an object")
              raw_count = report.get("contract_blocked_lane_count", 0)
              if isinstance(raw_count, bool) or not isinstance(raw_count, int) or raw_count < 0:
                  raise SystemExit(
                      "previous checkpoint contract-blocked lane count must be non-negative"
                  )
              raw_bundle = report.get("contract_blocked_evidence")
              raw_digest = str(report.get("contract_blocked_evidence_sha256") or "")
              if raw_bundle is None and raw_count == 0 and not raw_digest:
                  return []
              if not isinstance(raw_bundle, dict) or raw_bundle.get("schema_version") != 1:
                  raise SystemExit("previous checkpoint contract-blocked evidence is invalid")
              rows = normalized_rows(
                  raw_bundle.get("contract_blocked_lanes"),
                  label="previous checkpoint",
              )
              bundle = evidence_bundle(rows)
              actual_digest = hashlib.sha256(canonical_bytes(bundle)).hexdigest()
              if raw_digest != actual_digest:
                  raise SystemExit(
                      "previous checkpoint contract-blocked evidence digest does not match"
                  )
              if raw_count != len(rows):
                  raise SystemExit(
                      "previous checkpoint contract-blocked evidence count does not match"
                  )
              return rows

          audit = json.loads(
              Path(os.environ["EXTRACTION_AUDIT_PATH"]).read_text(encoding="utf-8")
          )
          if not isinstance(audit, dict):
              raise SystemExit("lane-control extraction audit must be an object")
          current_rows = normalized_rows(
              audit.get("contract_blocked_lanes"),
              label="lane-control audit",
          )
          expected_current_count = int(
              os.environ["LANE_CONTROL_CONTRACT_BLOCKED_LANE_COUNT"]
          )
          if expected_current_count != len(current_rows):
              raise SystemExit(
                  "lane-control contract-blocked evidence count does not match its output"
              )

          current_manifest = json.loads(
              Path(os.environ["CURRENT_MANIFEST_PATH"]).read_text(encoding="utf-8")
          )
          if not isinstance(current_manifest, dict):
              raise SystemExit("lane-control current manifest must be an object")
          manifest_lanes = current_manifest.get("lanes")
          if not isinstance(manifest_lanes, list):
              raise SystemExit("lane-control current manifest lanes must be a list")
          lanes_by_id: dict[str, dict[str, object]] = {}
          for lane in manifest_lanes:
              if not isinstance(lane, dict):
                  raise SystemExit("lane-control current manifest lane entries must be objects")
              lane_id = str(lane.get("lane_id") or "").strip()
              if not lane_id or lane_id in lanes_by_id:
                  raise SystemExit(
                      "lane-control current manifest lane IDs must be non-empty and unique"
                  )
              lanes_by_id[lane_id] = lane
          scope_fields = (
              ("kind", "lane_kind"),
              ("endpoints", "endpoints"),
              ("patterns", "patterns"),
              ("season_start", "season_start"),
              ("season_end", "season_end"),
              ("season_types", "season_types"),
              ("context_measures", "context_measures"),
              ("coverage_units_hash", "coverage_units_hash"),
          )
          for row in current_rows:
              lane_id = str(row["lane_id"])
              lane = lanes_by_id.get(lane_id)
              if lane is None:
                  raise SystemExit(
                      f"lane-control contract-blocked evidence is outside the current manifest: {lane_id}"
                  )
              for row_field, lane_field in scope_fields:
                  if row.get(row_field) != lane.get(lane_field):
                      raise SystemExit(
                          "lane-control contract-blocked evidence scope does not match "
                          f"the current manifest for {lane_id}: {row_field}"
                      )

          current_state = current_manifest.get("chain_state")
          if not isinstance(current_state, dict):
              raise SystemExit("lane-control current manifest chain_state must be an object")
          committed_previous_rows = normalized_rows(
              current_state.get("contract_blocked_evidence", []),
              label="current chain-state",
          )
          committed_previous_digest = str(
              current_state.get("contract_blocked_evidence_sha256") or ""
          )
          committed_previous_bundle = evidence_bundle(committed_previous_rows)
          actual_committed_previous_digest = hashlib.sha256(
              canonical_bytes(committed_previous_bundle)
          ).hexdigest()
          if committed_previous_rows or committed_previous_digest:
              if committed_previous_digest != actual_committed_previous_digest:
                  raise SystemExit(
                      "current chain-state contract-blocked evidence digest does not match"
                  )

          pending_rows = normalized_rows(
              current_state.get("pending_contract_blocked_evidence", []),
              label="current pending chain-state",
          )
          pending_digest = str(
              current_state.get("pending_contract_blocked_evidence_sha256") or ""
          )
          if pending_rows:
              actual_pending_digest = hashlib.sha256(
                  canonical_bytes(evidence_bundle(pending_rows))
              ).hexdigest()
              if pending_digest != actual_pending_digest:
                  raise SystemExit(
                      "current chain-state pending contract-blocked evidence digest "
                      "does not match"
                  )
          elif pending_digest:
              raise SystemExit(
                  "current chain-state pending contract-blocked evidence digest has no rows"
              )

          previous_rows: list[dict[str, object]] = []
          previous_report_path = os.environ.get("PREVIOUS_CHECKPOINT_REPORT_PATH", "")
          if previous_report_path:
              previous_report = json.loads(
                  Path(previous_report_path).read_text(encoding="utf-8")
              )
              previous_rows = verified_previous_rows(previous_report)
              verified_path = os.environ.get("VERIFIED_PREVIOUS_CHECKPOINT_PATH", "")
              if not verified_path:
                  raise SystemExit(
                      "previous contract-blocked evidence lacks verified checkpoint provenance"
                  )
              verified = json.loads(Path(verified_path).read_text(encoding="utf-8"))
              if not isinstance(verified, dict):
                  raise SystemExit("verified previous checkpoint identity must be an object")
              expected_digest = str(
                  verified.get("contract_blocked_evidence_sha256") or ""
              )
              actual_digest = str(
                  previous_report.get("contract_blocked_evidence_sha256") or ""
              )
              if expected_digest != actual_digest:
                  raise SystemExit(
                      "previous contract-blocked evidence does not match the verified checkpoint"
                  )
              if previous_rows != committed_previous_rows:
                  raise SystemExit(
                      "previous contract-blocked evidence does not match chain-state ancestry"
                  )
              if actual_digest != committed_previous_digest:
                  raise SystemExit(
                      "previous contract-blocked evidence digest does not match chain-state ancestry"
                  )
          elif committed_previous_rows or committed_previous_digest:
              raise SystemExit(
                  "chain-state blocked evidence lacks a previous checkpoint report"
              )

          rows_by_lane_id = {
              str(row["lane_id"]): row for row in previous_rows
          }
          for label, rows in (("pending", pending_rows), ("current", current_rows)):
              for row in rows:
                  lane_id = str(row["lane_id"])
                  previous_row = rows_by_lane_id.get(lane_id)
                  if (
                      previous_row is not None
                      and canonical_bytes(previous_row) != canonical_bytes(row)
                  ):
                      raise SystemExit(
                          f"{label} contract-blocked evidence changed across "
                          f"checkpoints for {lane_id}"
                      )
                  rows_by_lane_id[lane_id] = row

          merged_rows = [rows_by_lane_id[lane_id] for lane_id in sorted(rows_by_lane_id)]
          bundle = evidence_bundle(merged_rows)
          evidence_sha256 = hashlib.sha256(canonical_bytes(bundle)).hexdigest()
          next_manifest = json.loads(
              Path(os.environ["NEXT_MANIFEST_PATH"]).read_text(encoding="utf-8")
          )
          next_state = next_manifest.get("chain_state") if isinstance(next_manifest, dict) else None
          if not isinstance(next_state, dict):
              raise SystemExit("checkpoint next manifest chain_state must be an object")
          if next_state.get("contract_blocked_evidence") != merged_rows:
              raise SystemExit(
                  "checkpoint blocked evidence does not match next-manifest commitment"
              )
          if str(next_state.get("contract_blocked_evidence_sha256") or "") != evidence_sha256:
              raise SystemExit(
                  "checkpoint blocked evidence digest does not match next-manifest commitment"
              )
          if next_state.get("pending_contract_blocked_evidence") not in (None, []):
              raise SystemExit(
                  "checkpoint next-manifest commitment did not clear pending blocked evidence"
              )
          if str(next_state.get("pending_contract_blocked_evidence_sha256") or ""):
              raise SystemExit(
                  "checkpoint next-manifest commitment did not clear pending blocked evidence"
              )
          report_path = Path(os.environ["CHECKPOINT_REPORT_PATH"])
          report = json.loads(report_path.read_text(encoding="utf-8"))
          if not isinstance(report, dict):
              raise SystemExit("checkpoint report must be an object")
          report["contract_blocked_lane_count"] = len(merged_rows)
          report["contract_blocked_evidence"] = bundle
          report["contract_blocked_evidence_sha256"] = evidence_sha256
          report_path.write_text(
              json.dumps(report, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          PY

          CHECKPOINT_MANIFEST_PATH=artifacts/full-extraction/checkpoint-manifest.json \
            CHECKPOINT_REPORT_PATH=artifacts/full-extraction/checkpoint-report.json \
            python - <<'PY'
          # CHECKPOINT_RESULT_VALIDATOR
          import json
          import os
          import re
          from pathlib import Path

          report = json.loads(
              Path(os.environ["CHECKPOINT_REPORT_PATH"]).read_text(encoding="utf-8")
          )
          manifest = json.loads(
              Path(os.environ["CHECKPOINT_MANIFEST_PATH"]).read_text(encoding="utf-8")
          )
          chain_id = os.environ["CHAIN_ID"]
          current_run_id = os.environ["CURRENT_RUN_ID"]
          expected_source_sha = os.environ["WORKFLOW_SOURCE_SHA"].lower()
          expected_generation = int(os.environ["EXPECTED_CHECKPOINT_GENERATION"])
          lane_control_active_lane_count = int(
              os.environ["LANE_CONTROL_ACTIVE_LANE_COUNT"]
          )
          checkpoint_active_lane_count = int(report.get("active_lane_count", -1))
          terminal_ready = report.get("terminal_ready") is True
          complete_lane_count = int(report.get("complete_lane_count", 0))
          checkpoint_output = Path(str(report.get("output_path") or ""))
          contract_blocked_evidence = report.get("contract_blocked_evidence")
          contract_blocked_evidence_sha256 = str(
              report.get("contract_blocked_evidence_sha256") or ""
          )

          failures: list[str] = []
          if expected_generation <= 0:
              failures.append("Expected checkpoint generation must be positive")
          expected_artifact_name = (
              f"full-extraction-checkpoint-{chain_id}-iter-{expected_generation}"
          )
          if os.environ["CHECKPOINT_ARTIFACT_NAME"] != expected_artifact_name:
              failures.append(
                  "Checkpoint artifact suffix/generation disagreement: "
                  f"expected={expected_artifact_name}, "
                  f"actual={os.environ['CHECKPOINT_ARTIFACT_NAME']}"
              )

          reported_generation = report.get("checkpoint_generation")
          if isinstance(reported_generation, bool) or not isinstance(reported_generation, int):
              failures.append("Checkpoint report generation must be an integer")
          elif reported_generation != expected_generation:
              failures.append(
                  "Lane-control/checkpoint generation disagreement: "
                  f"lane_control={expected_generation}, checkpoint={reported_generation}"
              )
          previous_generation = report.get("previous_checkpoint_generation")
          if isinstance(previous_generation, bool) or not isinstance(previous_generation, int):
              failures.append("Checkpoint report previous generation must be an integer")
          elif previous_generation != expected_generation - 1:
              failures.append(
                  "Checkpoint previous-generation disagreement: "
                  f"expected={expected_generation - 1}, actual={previous_generation}"
              )
          if str(report.get("chain_id") or "") != chain_id:
              failures.append("Checkpoint report chain identity does not match")
          if str(report.get("run_id") or "") != current_run_id:
              failures.append("Checkpoint report run identity does not match")
          if str(report.get("artifact_name") or "") != expected_artifact_name:
              failures.append("Checkpoint report artifact name does not match")
          if str(report.get("source_sha") or "").lower() != expected_source_sha:
              failures.append("Checkpoint report source SHA does not match")

          if not isinstance(manifest, dict):
              failures.append("Checkpoint manifest must be an object")
              manifest_payload = {}
              manifest_state = {}
          else:
              manifest_payload = manifest
              manifest_state = manifest.get("chain_state", {})
              if not isinstance(manifest_state, dict):
                  failures.append("Checkpoint manifest chain_state must be an object")
                  manifest_state = {}
          if str(manifest_payload.get("chain_id") or "") != chain_id:
              failures.append("Checkpoint manifest chain identity does not match")
          if (
              str(manifest_payload.get("workflow_source_sha") or "").lower()
              != expected_source_sha
          ):
              failures.append("Checkpoint manifest source SHA does not match")
          if str(manifest_state.get("latest_checkpoint_run_id") or "") != current_run_id:
              failures.append("Checkpoint manifest latest run identity does not match")
          if (
              str(manifest_state.get("latest_checkpoint_artifact_name") or "")
              != expected_artifact_name
          ):
              failures.append("Checkpoint manifest latest artifact name does not match")
          manifest_generation = manifest_state.get("latest_checkpoint_generation")
          if isinstance(manifest_generation, bool) or not isinstance(manifest_generation, int):
              failures.append("Checkpoint manifest latest generation must be an integer")
          elif manifest_generation != expected_generation:
              failures.append(
                  "Checkpoint manifest/report generation disagreement: "
                  f"manifest={manifest_generation}, checkpoint={reported_generation}"
              )
          expected_coverage_hash = str(
              manifest_state.get("latest_checkpoint_coverage_hash") or ""
          ).lower()
          if re.fullmatch(r"[0-9a-f]{64}", expected_coverage_hash) is None:
              failures.append("Checkpoint manifest latest coverage hash must be a SHA-256")
          if str(report.get("coverage_fingerprint") or "").lower() != expected_coverage_hash:
              failures.append("Checkpoint manifest/report coverage fingerprint disagreement")
          if checkpoint_active_lane_count != lane_control_active_lane_count:
              failures.append(
                  "Lane-control/checkpoint remaining-count disagreement: "
                  f"lane_control={lane_control_active_lane_count}, "
                  f"checkpoint={checkpoint_active_lane_count}"
              )
          if lane_control_active_lane_count == 0 and not terminal_ready:
              failures.append(
                  "Lane control reported no remaining lanes but the checkpoint is not terminal-ready"
              )
          if lane_control_active_lane_count > 0 and terminal_ready:
              failures.append(
                  "Lane control reported remaining lanes but the checkpoint is terminal-ready"
              )
          if complete_lane_count > 0 and not checkpoint_output.is_file():
              failures.append(
                  "Checkpoint report includes completed lanes but its database is missing"
              )
          if (
              not isinstance(contract_blocked_evidence, dict)
              or contract_blocked_evidence.get("schema_version") != 1
              or not isinstance(
                  contract_blocked_evidence.get("contract_blocked_lanes"), list
              )
          ):
              failures.append("Checkpoint contract-blocked evidence is invalid")
          else:
              canonical_evidence = json.dumps(
                  contract_blocked_evidence,
                  sort_keys=True,
                  separators=(",", ":"),
              ).encode("utf-8")
              actual_evidence_sha256 = __import__("hashlib").sha256(
                  canonical_evidence
              ).hexdigest()
              if contract_blocked_evidence_sha256 != actual_evidence_sha256:
                  failures.append(
                      "Checkpoint contract-blocked evidence digest does not match"
                  )
              if int(report.get("contract_blocked_lane_count", -1)) != len(
                  contract_blocked_evidence["contract_blocked_lanes"]
              ):
                  failures.append(
                      "Checkpoint contract-blocked evidence count does not match"
                  )
          if failures:
              for failure in failures:
                  print(f"::error::{failure}")
              raise SystemExit(1)

          output_pairs = {
              "artifact_name": os.environ["CHECKPOINT_ARTIFACT_NAME"],
              "checkpoint_generation": reported_generation,
              "coverage_fingerprint": report.get("coverage_fingerprint", ""),
              "terminal_ready": str(terminal_ready).lower(),
              "active_lane_count": checkpoint_active_lane_count,
          }
          with Path(os.environ["GITHUB_OUTPUT"]).open("a", encoding="utf-8") as handle:
              for key, value in output_pairs.items():
                  handle.write(f"{key}={value}\n")
          PY

          {
            echo "## Full Extraction Checkpoint"
            echo ""
            echo "| Metric | Value |"
            echo "|---|---:|"
            echo "| Artifact | \`$CHECKPOINT_ARTIFACT_NAME\` |"
            python - <<'PY'
          import json
          from pathlib import Path

          report = json.loads(Path("artifacts/full-extraction/checkpoint-report.json").read_text())
          rows = {
              "Generation": report.get("checkpoint_generation", 0),
              "Included lanes": report.get("complete_lane_count", 0),
              "Missing active lanes": report.get("active_lane_count", 0),
              "Skipped complete lanes": report.get("skipped_lane_count", 0),
              "Journal rows": report.get("journal_row_count", 0),
              "Terminal ready": report.get("terminal_ready", False),
          }
          for key, value in rows.items():
              print(f"| {key} | {value} |")
          print(f"| Coverage fingerprint | `{report.get('coverage_fingerprint', '')}` |")
          PY
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload checkpoint artifact
        id: canonical_checkpoint
        if: ${{ steps.checkpoint.outcome == 'success' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          overwrite: true
          name: ${{ needs.lane_control.outputs.checkpoint-artifact-name }}
          path: |
            data/nbadb-checkpoint/nba.duckdb
            artifacts/full-extraction/checkpoint-report.json
            artifacts/full-extraction/checkpoint.stdout.json
            artifacts/full-extraction/checkpoint-manifest.json
          if-no-files-found: error
          retention-days: 30
          compression-level: 0

      - name: Upload checkpoint failure diagnostics
        if: ${{ always() && (steps.checkpoint.outcome != 'success' || steps.canonical_checkpoint.outcome != 'success') }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          overwrite: true
          name: full-extraction-checkpoint-diagnostics-${{ env.ACTIVE_CHAIN_ID }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            data/nbadb-checkpoint/
            artifacts/full-extraction/
            lane-control-artifact/
            previous-checkpoint/
          if-no-files-found: warn
          retention-days: 14
          compression-level: 6

  # ─────────────────────────────────────────────────────────────
  #  Redispatch only after the checkpoint for this iteration is durable
  # ─────────────────────────────────────────────────────────────
  dispatch_next:
    needs: [plan, preflight, lane_control, checkpoint]
    if: ${{ always() && !cancelled() && !inputs.targeted_smoke && needs.lane_control.result == 'success' && needs.checkpoint.result == 'success' && needs.lane_control.outputs.active-lane-count != '0' && needs.checkpoint.outputs.active-lane-count == needs.lane_control.outputs.active-lane-count && needs.checkpoint.outputs.terminal-ready == 'false' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    concurrency:
      group: full-extraction-dispatch-${{ inputs.chain_id || github.run_id }}-iteration-${{ inputs.iteration }}
      cancel-in-progress: false
    permissions:
      actions: write
      contents: read
    outputs:
      child-run-id: ${{ steps.dispatch.outputs.child_run_id }}
      child-run-url: ${{ steps.dispatch.outputs.child_run_url }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ env.WORKFLOW_SOURCE_SHA }}

      - name: Verify redispatch workflow definition
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PUBLISH: ${{ inputs.publish }}
          WORKFLOW_REF: ${{ env.WORKFLOW_SOURCE_REF }}
          WORKFLOW_PATH: .github/workflows/full-extraction.yml
        run: |
          set -euo pipefail
          if ! [[ "$WORKFLOW_SOURCE_SHA" =~ ^[0-9a-fA-F]{40}$ ]]; then
            echo "::error::workflow_sha must remain a full 40-character commit SHA before redispatch"
            exit 1
          fi
          if ! git check-ref-format --branch "$WORKFLOW_REF" >/dev/null 2>&1; then
            echo "::error::workflow_ref must remain a valid branch before redispatch"
            exit 1
          fi

          source_commit="$(git rev-parse "${WORKFLOW_SOURCE_SHA}^{commit}")"
          checked_out_commit="$(git rev-parse HEAD)"
          if [ "${WORKFLOW_SOURCE_SHA,,}" != "$source_commit" ] || [ "$checked_out_commit" != "$source_commit" ]; then
            echo "::error::Pinned source checkout mismatch before redispatch: expected $source_commit, got $checked_out_commit"
            exit 1
          fi

          trusted_branch_ref="refs/remotes/origin/trusted-redispatch-source"
          git fetch --no-tags --no-recurse-submodules origin \
            "+refs/heads/${WORKFLOW_REF}:${trusted_branch_ref}"
          trusted_branch_commit="$(git rev-parse "${trusted_branch_ref}^{commit}")"
          if ! git merge-base --is-ancestor "$source_commit" "$trusted_branch_commit"; then
            echo "::error::Pinned workflow_sha $source_commit is no longer an ancestor of workflow_ref '$WORKFLOW_REF' at $trusted_branch_commit"
            exit 1
          fi

          if [ "$PUBLISH" = "true" ]; then
            default_branch_ref="refs/remotes/origin/trusted-redispatch-default"
            git fetch --no-tags --no-recurse-submodules origin \
              "+refs/heads/${DEFAULT_BRANCH}:${default_branch_ref}"
            default_branch_commit="$(git rev-parse "${default_branch_ref}^{commit}")"
            if ! git merge-base --is-ancestor "$source_commit" "$default_branch_commit"; then
              echo "::error::publish=true requires pinned workflow_sha $source_commit to remain an ancestor of default branch '$DEFAULT_BRANCH' at $default_branch_commit"
              exit 1
            fi
          fi

          source_blob="$(git rev-parse "${source_commit}:${WORKFLOW_PATH}")"
          dispatch_blob="$(gh api \
            --method GET \
            -H "Accept: application/vnd.github+json" \
            "/repos/${GITHUB_REPOSITORY}/contents/${WORKFLOW_PATH}" \
            -f "ref=${WORKFLOW_REF}" \
            --jq '.sha')"
          if [ -z "$dispatch_blob" ] || [ "$dispatch_blob" != "$source_blob" ]; then
            echo "::error::Workflow definition drift detected: ${WORKFLOW_PATH} at redispatch ref ${WORKFLOW_REF} does not match workflow_source_sha ${source_commit}"
            exit 1
          fi

      - name: Dispatch next iteration
        id: dispatch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WORKFLOW_REF: ${{ env.WORKFLOW_SOURCE_REF }}
          WORKFLOW_SHA: ${{ env.WORKFLOW_SOURCE_SHA }}
          ITERATION: ${{ inputs.iteration }}
          MAX_ITERATIONS: ${{ inputs.max_iterations }}
          CONCURRENCY: ${{ inputs.concurrency }}
          VPN_PARALLELISM: ${{ inputs.vpn_parallelism }}
          MATRIX_BATCH_SIZE: ${{ inputs.matrix_batch_size }}
          DIRECT_PARALLELISM: ${{ inputs.direct_parallelism }}
          DIRECT_REQUEST_PROFILE: ${{ inputs.direct_request_profile }}
          DIRECT_TIMEOUT_CAP_MINUTES: ${{ inputs.direct_timeout_cap_minutes }}
          RETRY_PIPELINE_FAILURES: ${{ inputs.retry_pipeline_failures }}
          NETWORK_MODE: ${{ inputs.network_mode }}
          CHUNK_PROFILE: ${{ env.FULL_EXTRACTION_CHUNK_PROFILE }}
          BACKFILL_ENDPOINTS: ${{ inputs.backfill_endpoints }}
          BACKFILL_PATTERNS: ${{ inputs.backfill_patterns }}
          PUBLISH: ${{ inputs.publish }}
          CHAIN_ID: ${{ env.ACTIVE_CHAIN_ID }}
          ACTIVE_LANE_COUNT: ${{ needs.lane_control.outputs.active-lane-count }}
          ARTIFACT_NAME: ${{ needs.lane_control.outputs.artifact-name }}
          ITERATION_BUDGET: ${{ needs.lane_control.outputs.iteration-budget }}
          CHILD_POLL_ATTEMPTS: "12"
          CHILD_POLL_INTERVAL_SECONDS: "5"
        run: |
          set -euo pipefail
          if ! [[ "$ITERATION" =~ ^[0-9]+$ ]] || [ "$ITERATION" -lt 1 ]; then
            echo "::error::iteration must be a positive integer, got '$ITERATION'"
            exit 1
          fi
          current="$ITERATION"
          next=$((current + 1))
          next_concurrency="$CONCURRENCY"

          max_input="$MAX_ITERATIONS"
          if [ "$max_input" = "auto" ]; then
            if ! [[ "$ITERATION_BUDGET" =~ ^[0-9]+$ ]] || [ "$ITERATION_BUDGET" -lt 1 ]; then
              echo "::error::Auto iteration budget must be a positive integer, got '$ITERATION_BUDGET'"
              exit 1
            fi
            effective_max="$ITERATION_BUDGET"
          elif [[ "$max_input" =~ ^[0-9]+$ ]] && [ "$max_input" -ge 1 ]; then
            effective_max="$max_input"
          else
            echo "::error::max_iterations must be 'auto' or a positive integer, got '$MAX_ITERATIONS'"
            exit 1
          fi

          if [ "$next" -gt "$effective_max" ]; then
            echo "::error::Reached max iterations ($effective_max) with incomplete extraction; next-manifest and checkpoint artifacts were uploaded for manual resume."
            exit 1
          fi

          next_run_name="Full Extraction chain=${CHAIN_ID} iteration=${next}"
          runs_path="$RUNNER_TEMP/full-extraction-run-pages.json"
          existing_child_run_ids_path="$RUNNER_TEMP/full-extraction-existing-child-run-ids.json"
          gh api \
            --method GET \
            --paginate \
            --slurp \
            -H "Accept: application/vnd.github+json" \
            "/repos/${{ github.repository }}/actions/workflows/full-extraction.yml/runs" \
            -f "event=workflow_dispatch" \
            -f "per_page=100" \
            > "$runs_path"
          duplicate_runs="$(
            RUNS_PATH="$runs_path" \
              EXISTING_CHILD_RUN_IDS_PATH="$existing_child_run_ids_path" \
              EXPECTED_RUN_NAME="$next_run_name" \
              python - <<'PY'
          # CHILD_RUN_PRECHECK
          import json
          import os
          from pathlib import Path

          pages = json.loads(Path(os.environ["RUNS_PATH"]).read_text(encoding="utf-8"))
          expected_run_name = os.environ["EXPECTED_RUN_NAME"]
          matches = sorted(
              (
                  run
                  for page in pages
                  for run in page.get("workflow_runs", [])
                  if str(run.get("display_title") or "") == expected_run_name
              ),
              key=lambda run: int(run.get("id") or 0),
          )
          existing_ids = [str(run.get("id") or "") for run in matches]
          Path(os.environ["EXISTING_CHILD_RUN_IDS_PATH"]).write_text(
              json.dumps(existing_ids, indent=2) + "\n",
              encoding="utf-8",
          )
          blockers = [
              run
              for run in matches
              if str(run.get("status") or "") != "completed"
              or str(run.get("conclusion") or "") == "success"
              or not str(run.get("conclusion") or "")
          ]
          print(
              ", ".join(
                  f"{run.get('id')}:{run.get('status')}:{run.get('conclusion')}:{run.get('html_url')}"
                  for run in blockers
              )
          )
          PY
          )"
          if [ -n "$duplicate_runs" ]; then
            echo "::error::Refusing duplicate redispatch for chain $CHAIN_ID iteration $next; existing run(s): $duplicate_runs"
            exit 1
          fi

          echo "::notice::Some lanes incomplete — triggering iteration $next/$effective_max at $next_concurrency concurrency (chain $CHAIN_ID; max_iterations=$MAX_ITERATIONS)"
          gh workflow run full-extraction.yml \
            --repo "${{ github.repository }}" \
            --ref "$WORKFLOW_REF" \
            -f concurrency="$next_concurrency" \
            -f vpn_parallelism="$VPN_PARALLELISM" \
            -f matrix_batch_size="$MATRIX_BATCH_SIZE" \
            -f direct_parallelism="$DIRECT_PARALLELISM" \
            -f direct_request_profile="$DIRECT_REQUEST_PROFILE" \
            -f direct_timeout_cap_minutes="$DIRECT_TIMEOUT_CAP_MINUTES" \
            -f retry_pipeline_failures="$RETRY_PIPELINE_FAILURES" \
            -f network_mode="$NETWORK_MODE" \
            -f chunk_profile="$CHUNK_PROFILE" \
            -f iteration="$next" \
            -f max_iterations="$MAX_ITERATIONS" \
            -f backfill_endpoints="$BACKFILL_ENDPOINTS" \
            -f backfill_patterns="$BACKFILL_PATTERNS" \
            -f force_reextract=false \
            -f publish="$PUBLISH" \
            -f chain_id="$CHAIN_ID" \
            -f workflow_ref="$WORKFLOW_REF" \
            -f workflow_sha="$WORKFLOW_SHA" \
            -f lane_manifest_run_id="${{ github.run_id }}" \
            -f lane_manifest_artifact_name="$ARTIFACT_NAME"

          child_run_path="$RUNNER_TEMP/full-extraction-child-run.json"
          child_found=false
          for attempt in $(seq 1 "$CHILD_POLL_ATTEMPTS"); do
            gh api \
              --method GET \
              --paginate \
              --slurp \
              -H "Accept: application/vnd.github+json" \
              "/repos/${{ github.repository }}/actions/workflows/full-extraction.yml/runs" \
              -f "event=workflow_dispatch" \
              -f "per_page=100" \
              > "$runs_path"

            set +e
            RUNS_PATH="$runs_path" \
              CHILD_RUN_PATH="$child_run_path" \
              EXISTING_CHILD_RUN_IDS_PATH="$existing_child_run_ids_path" \
              EXPECTED_RUN_NAME="$next_run_name" \
              python - <<'PY'
          # CHILD_RUN_MATCHER
          import json
          import os
          from pathlib import Path

          pages = json.loads(Path(os.environ["RUNS_PATH"]).read_text(encoding="utf-8"))
          expected_run_name = os.environ["EXPECTED_RUN_NAME"]
          expected_child_run_id = os.environ.get("EXPECTED_CHILD_RUN_ID", "").strip()
          existing_ids = set(
              json.loads(
                  Path(os.environ["EXISTING_CHILD_RUN_IDS_PATH"]).read_text(encoding="utf-8")
              )
          )
          matches = sorted(
              (
                  run
                  for page in pages
                  for run in page.get("workflow_runs", [])
                  if str(run.get("display_title") or "") == expected_run_name
                  and str(run.get("id") or "") not in existing_ids
              ),
              key=lambda run: str(run.get("id") or ""),
          )
          if len(matches) > 1:
              details = ", ".join(
                  f"{run.get('id')}:{run.get('status')}:{run.get('html_url')}"
                  for run in matches
              )
              print(
                  f"::error::Self-dispatch created {len(matches)} exact-title child runs "
                  f"for {expected_run_name!r}: {details}"
              )
              raise SystemExit(2)
          if not matches:
              raise SystemExit(1)

          child = matches[0]
          child_run_id = str(child.get("id") or "").strip()
          child_run_url = str(child.get("html_url") or "").strip()
          if not child_run_id.isdigit() or not child_run_url:
              print(
                  "::error::Exact-title child run is missing a valid id or URL: "
                  f"{child!r}"
              )
              raise SystemExit(3)
          if expected_child_run_id and child_run_id != expected_child_run_id:
              print(
                  "::error::Exact-title child run changed during stabilization: "
                  f"expected {expected_child_run_id}, got {child_run_id}"
              )
              raise SystemExit(4)
          Path(os.environ["CHILD_RUN_PATH"]).write_text(
              json.dumps(
                  {
                      "display_title": expected_run_name,
                      "id": child_run_id,
                      "url": child_run_url,
                  },
                  indent=2,
              )
              + "\n",
              encoding="utf-8",
          )
          PY
            poll_status=$?
            set -e

            case "$poll_status" in
              0)
                child_found=true
                break
                ;;
              1)
                echo "::notice::Waiting for exact-title child run $next_run_name (attempt $attempt/$CHILD_POLL_ATTEMPTS)"
                ;;
              2)
                exit 1
                ;;
              *)
                echo "::error::Unable to validate self-dispatched child run (matcher exit $poll_status)"
                exit 1
                ;;
            esac
            if [ "$attempt" -lt "$CHILD_POLL_ATTEMPTS" ]; then
              sleep "$CHILD_POLL_INTERVAL_SECONDS"
            fi
          done

          if [ "$child_found" != "true" ]; then
            echo "::error::Self-dispatch child run was not visible after $CHILD_POLL_ATTEMPTS attempts for exact title: $next_run_name"
            exit 1
          fi

          acknowledged_child_run_id="$(CHILD_RUN_PATH="$child_run_path" python - <<'PY'
          import json
          import os
          from pathlib import Path

          print(json.loads(Path(os.environ["CHILD_RUN_PATH"]).read_text())["id"])
          PY
          )"
          sleep "$CHILD_POLL_INTERVAL_SECONDS"
          gh api \
            --method GET \
            --paginate \
            --slurp \
            -H "Accept: application/vnd.github+json" \
            "/repos/${{ github.repository }}/actions/workflows/full-extraction.yml/runs" \
            -f "event=workflow_dispatch" \
            -f "per_page=100" \
            > "$runs_path"
          set +e
          RUNS_PATH="$runs_path" \
            CHILD_RUN_PATH="$child_run_path" \
            EXISTING_CHILD_RUN_IDS_PATH="$existing_child_run_ids_path" \
            EXPECTED_RUN_NAME="$next_run_name" \
            EXPECTED_CHILD_RUN_ID="$acknowledged_child_run_id" \
            python - <<'PY'
          # CHILD_RUN_MATCHER
          import json
          import os
          from pathlib import Path

          pages = json.loads(Path(os.environ["RUNS_PATH"]).read_text(encoding="utf-8"))
          expected_run_name = os.environ["EXPECTED_RUN_NAME"]
          expected_child_run_id = os.environ.get("EXPECTED_CHILD_RUN_ID", "").strip()
          existing_ids = set(
              json.loads(
                  Path(os.environ["EXISTING_CHILD_RUN_IDS_PATH"]).read_text(encoding="utf-8")
              )
          )
          matches = sorted(
              (
                  run
                  for page in pages
                  for run in page.get("workflow_runs", [])
                  if str(run.get("display_title") or "") == expected_run_name
                  and str(run.get("id") or "") not in existing_ids
              ),
              key=lambda run: str(run.get("id") or ""),
          )
          if len(matches) > 1:
              details = ", ".join(
                  f"{run.get('id')}:{run.get('status')}:{run.get('html_url')}"
                  for run in matches
              )
              print(
                  f"::error::Self-dispatch created {len(matches)} exact-title child runs "
                  f"for {expected_run_name!r}: {details}"
              )
              raise SystemExit(2)
          if not matches:
              raise SystemExit(1)

          child = matches[0]
          child_run_id = str(child.get("id") or "").strip()
          child_run_url = str(child.get("html_url") or "").strip()
          if not child_run_id.isdigit() or not child_run_url:
              print(
                  "::error::Exact-title child run is missing a valid id or URL: "
                  f"{child!r}"
              )
              raise SystemExit(3)
          if expected_child_run_id and child_run_id != expected_child_run_id:
              print(
                  "::error::Exact-title child run changed during stabilization: "
                  f"expected {expected_child_run_id}, got {child_run_id}"
              )
              raise SystemExit(4)
          Path(os.environ["CHILD_RUN_PATH"]).write_text(
              json.dumps(
                  {
                      "display_title": expected_run_name,
                      "id": child_run_id,
                      "url": child_run_url,
                  },
                  indent=2,
              )
              + "\n",
              encoding="utf-8",
          )
          PY
          stabilization_status=$?
          set -e
          if [ "$stabilization_status" -ne 0 ]; then
            echo "::error::Self-dispatch exact-title child inventory did not stabilize (matcher exit $stabilization_status)"
            exit 1
          fi

          child_run_id="$(CHILD_RUN_PATH="$child_run_path" python - <<'PY'
          import json
          import os
          from pathlib import Path

          print(json.loads(Path(os.environ["CHILD_RUN_PATH"]).read_text())["id"])
          PY
          )"
          child_run_url="$(CHILD_RUN_PATH="$child_run_path" python - <<'PY'
          import json
          import os
          from pathlib import Path

          print(json.loads(Path(os.environ["CHILD_RUN_PATH"]).read_text())["url"])
          PY
          )"
          {
            echo "child_run_id=$child_run_id"
            echo "child_run_url=$child_run_url"
          } >> "$GITHUB_OUTPUT"
          {
            echo "## Full Extraction Redispatch"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Child run ID | \`$child_run_id\` |"
            echo "| Child run | [$next_run_name]($child_run_url) |"
            echo "| Publish | \`$PUBLISH\` |"
          } >> "$GITHUB_STEP_SUMMARY"
