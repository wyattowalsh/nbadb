name: Full Extraction

on:
  workflow_dispatch:
    inputs:
      use_proxy:
        description: "Use NordVPN Docker proxy fleet"
        type: boolean
        default: true
      concurrency:
        description: "Max concurrent requests per category"
        type: choice
        default: "moderate"
        options:
          - conservative
          - moderate
          - aggressive
      season_start:
        description: "Start season year (e.g. 1946)"
        type: string
        default: "1946"
      season_end:
        description: "End season year (e.g. 2025)"
        type: string
        default: "2025"
      iteration:
        description: "Iteration number (auto-incremented on self-chain)"
        type: string
        default: "1"
      max_iterations:
        description: "Max self-chain iterations (safety limit)"
        type: string
        default: "8"
      backfill_endpoints:
        description: "Comma-separated endpoints to backfill (empty = full init)"
        type: string
        default: ""
      backfill_patterns:
        description: "Comma-separated patterns to backfill (empty = all)"
        type: string
        default: ""
      force_reextract:
        description: "Force re-extraction of done entries"
        type: boolean
        default: false

env:
  NBADB_DATA_DIR: nbadb
  NBADB_PBP_CHUNK_SIZE: "1000"
  NBADB_PROXY_TIMEOUT: "30"
  # Shared cache key — persists across all iterations
  CACHE_KEY: full-extraction-state

permissions:
  actions: write
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  extract:
    runs-on: ubuntu-latest
    timeout-minutes: 350  # ~5h50m, leaves margin before 6hr hard limit
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78  # v7.6.0
        with:
          enable-cache: true

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - run: uv sync

      # ── Restore state from previous iteration ──
      - name: Restore extraction state
        id: restore
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7  # v5.0.4
        with:
          path: nbadb/
          key: ${{ env.CACHE_KEY }}-${{ inputs.iteration }}
          restore-keys: |
            ${{ env.CACHE_KEY }}-

      - name: Show iteration info
        env:
          ITERATION: ${{ inputs.iteration }}
          MAX_ITERATIONS: ${{ inputs.max_iterations }}
        run: |
          echo "::notice::Iteration $ITERATION of max $MAX_ITERATIONS"
          if [ -f nbadb/nba.sqlite ]; then
            echo "::notice::Resuming from cached state"
            ls -lh nbadb/ 2>/dev/null || true
          else
            echo "::notice::Fresh start — no cached state found"
          fi

      # ── Derive OpenVPN credentials from NordVPN token ──
      - name: Derive NordVPN service credentials
        if: inputs.use_proxy
        env:
          NORDVPN_TOKEN: ${{ secrets.NORDVPN_TOKEN }}
        run: |
          creds=$(curl -sf -u "token:$NORDVPN_TOKEN" \
            https://api.nordvpn.com/v1/users/services/credentials)
          user=$(echo "$creds" | jq -r .username)
          pass=$(echo "$creds" | jq -r .password)
          if [ -z "$user" ] || [ "$user" = "null" ]; then
            echo "::error::Failed to derive OpenVPN credentials from NORDVPN_TOKEN"
            exit 1
          fi
          echo "::add-mask::$user"
          echo "::add-mask::$pass"
          echo "OPENVPN_USER=$user" >> $GITHUB_ENV
          echo "OPENVPN_PASSWORD=$pass" >> $GITHUB_ENV

      # ── Start gluetun proxy fleet (OpenVPN — works on GH Actions) ──
      - name: Start proxy fleet
        if: inputs.use_proxy
        run: |
          docker compose -f docker-compose.proxy.yml up -d
          echo "Waiting for OpenVPN tunnels to establish..."

          # OpenVPN takes 30-60s per container; retry up to 3 min
          for attempt in 1 2 3 4 5 6; do
            sleep 30
            ok=0
            for port in 19001 19002 19003 19004 19005 19006; do
              ip=$(curl -sf http://localhost:$port/v1/publicip/ip 2>/dev/null | jq -r .public_ip 2>/dev/null)
              if [ -n "$ip" ] && [ "$ip" != "null" ]; then
                echo "  ✓ :$port -> $ip"
                ok=$((ok + 1))
              else
                echo "  ✗ :$port not ready"
              fi
            done
            echo "Attempt $attempt: $ok/6 tunnels active"
            if [ "$ok" -ge 3 ]; then
              break
            fi
          done

          if [ "$ok" -eq 0 ]; then
            echo "::error::No gluetun containers healthy after 180s"
            docker compose -f docker-compose.proxy.yml logs --tail 30
            exit 1
          fi
          echo "::notice::$ok/6 VPN tunnels active"

      # ── Configure environment ──
      - name: Configure extraction environment
        env:
          USE_PROXY: ${{ inputs.use_proxy }}
          CONCURRENCY: ${{ inputs.concurrency }}
        run: |
          if [ "$USE_PROXY" = "true" ]; then
            echo 'NBADB_PROXY_ENABLED=true' >> $GITHUB_ENV
            echo 'NBADB_PROXY_BOOTSTRAP=false' >> $GITHUB_ENV
            echo 'NBADB_PROXY_URLS=["http://localhost:18881","http://localhost:18882","http://localhost:18883","http://localhost:18884","http://localhost:18885","http://localhost:18886"]' >> $GITHUB_ENV
          else
            echo 'NBADB_PROXY_ENABLED=false' >> $GITHUB_ENV
          fi

          case "$CONCURRENCY" in
            conservative)
              echo 'NBADB_SEMAPHORE_TIERS={"box_score": 10, "play_by_play": 5, "game_log": 15, "player_info": 10, "default": 10}' >> $GITHUB_ENV
              echo 'NBADB_RATE_LIMIT=10' >> $GITHUB_ENV
              ;;
            moderate)
              echo 'NBADB_SEMAPHORE_TIERS={"box_score": 30, "play_by_play": 15, "game_log": 50, "player_info": 30, "default": 25}' >> $GITHUB_ENV
              echo 'NBADB_RATE_LIMIT=60' >> $GITHUB_ENV
              ;;
            aggressive)
              echo 'NBADB_SEMAPHORE_TIERS={"box_score": 100, "play_by_play": 50, "game_log": 150, "player_info": 100, "default": 75}' >> $GITHUB_ENV
              echo 'NBADB_RATE_LIMIT=120' >> $GITHUB_ENV
              ;;
          esac

          # Scale concurrency for proxy fleet (6 proxies)
          if [ "$USE_PROXY" = "true" ]; then
            echo 'NBADB_PROXY_SEMAPHORE_MULTIPLIER=3' >> $GITHUB_ENV
            echo 'NBADB_THREAD_POOL_SIZE=64' >> $GITHUB_ENV
            echo 'NBADB_PROXY_TIMEOUT=60' >> $GITHUB_ENV
          fi

      # ── Run extraction with timeout guard ──
      - name: Run full extraction
        id: extract
        env:
          SEASON_START: ${{ inputs.season_start }}
          SEASON_END: ${{ inputs.season_end }}
          BACKFILL_ENDPOINTS: ${{ inputs.backfill_endpoints }}
          BACKFILL_PATTERNS: ${{ inputs.backfill_patterns }}
          FORCE_REEXTRACT: ${{ inputs.force_reextract }}
        run: |
          # Kill extraction 10 min before job timeout to allow save/chain
          set +e

          if [ -n "$BACKFILL_ENDPOINTS" ] || [ -n "$BACKFILL_PATTERNS" ]; then
            CMD="uv run nbadb backfill run --seasons ${SEASON_START}:${SEASON_END}"
            [ -n "$BACKFILL_ENDPOINTS" ] && CMD="$CMD --endpoint $BACKFILL_ENDPOINTS"
            [ -n "$BACKFILL_PATTERNS" ] && CMD="$CMD --pattern $BACKFILL_PATTERNS"
            [ "$FORCE_REEXTRACT" = "true" ] && CMD="$CMD --force"
            timeout 20400 $CMD
          else
            timeout 20400 uv run nbadb init \
              --season-start "$SEASON_START" \
              --season-end "$SEASON_END" \
              --verbose
          fi
          exit_code=$?
          set -e

          # timeout returns 124 on timeout, nbadb returns 1 on partial failure
          if [ "$exit_code" -eq 0 ]; then
            echo "status=complete" >> $GITHUB_OUTPUT
          else
            echo "status=incomplete" >> $GITHUB_OUTPUT
          fi
          exit 0

      # ── Save state ──
      - name: Save extraction state
        if: always()
        uses: actions/cache/save@668228422ae6a00e4ad889ee87cd7109ec5666a7  # v5.0.4
        with:
          path: nbadb/
          key: ${{ env.CACHE_KEY }}-${{ inputs.iteration }}

      # ── Upload artifacts every iteration ──
      - name: Upload extraction artifacts
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: nbadb-extraction-iter-${{ inputs.iteration }}
          path: |
            nbadb/*.duckdb
            nbadb/*.sqlite
            nbadb/parquet/
            nbadb/csv/
          retention-days: 30
          compression-level: 6

      # ── Self-chain: trigger next iteration if incomplete ──
      - name: Chain next iteration
        if: steps.extract.outputs.status == 'incomplete'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ITERATION: ${{ inputs.iteration }}
          MAX_ITERATIONS: ${{ inputs.max_iterations }}
          USE_PROXY: ${{ inputs.use_proxy }}
          CONCURRENCY: ${{ inputs.concurrency }}
          SEASON_START: ${{ inputs.season_start }}
          SEASON_END: ${{ inputs.season_end }}
        run: |
          current=$ITERATION
          max=$MAX_ITERATIONS
          next=$((current + 1))

          if [ "$next" -gt "$max" ]; then
            echo "::warning::Reached max iterations ($max). Extraction may be incomplete."
            echo "::warning::Re-trigger manually to continue."
            exit 0
          fi

          echo "::notice::Extraction incomplete — triggering iteration $next/$max"
          gh workflow run full-extraction.yml \
            -f use_proxy="$USE_PROXY" \
            -f concurrency="$CONCURRENCY" \
            -f season_start="$SEASON_START" \
            -f season_end="$SEASON_END" \
            -f iteration="$next" \
            -f max_iterations="$max"

      - name: Extraction complete
        if: steps.extract.outputs.status == 'complete'
        env:
          ITERATION: ${{ inputs.iteration }}
        run: |
          echo "::notice::Full extraction complete on iteration $ITERATION!"
          ls -lh nbadb/ 2>/dev/null || true

      - name: Export all formats
        if: steps.extract.outputs.status == 'complete'
        run: uv run nbadb export

      - name: Upload to Kaggle
        if: steps.extract.outputs.status == 'complete'
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
        run: uv run nbadb upload --data-dir nbadb -m "Full extraction $(date +%Y-%m-%d)"

      # ── Cleanup ──
      - name: Proxy fleet logs
        if: failure() && inputs.use_proxy
        run: docker compose -f docker-compose.proxy.yml logs --tail 50

      - name: Stop proxy fleet
        if: always() && inputs.use_proxy
        run: docker compose -f docker-compose.proxy.yml down
