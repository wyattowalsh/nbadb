name: Full Extraction

on:
  workflow_dispatch:
    inputs:
      concurrency:
        description: "Max concurrent requests per category"
        type: choice
        default: "aggressive"
        options:
          - conservative
          - moderate
          - aggressive
      iteration:
        description: "Iteration number (auto-incremented on self-chain)"
        type: string
        default: "1"
      max_iterations:
        description: "Max self-chain iterations (safety limit)"
        type: string
        default: "8"
      backfill_endpoints:
        description: "Comma-separated endpoints to backfill (empty = all)"
        type: string
        default: ""
      backfill_patterns:
        description: "Comma-separated patterns to override shard defaults (empty = use shard config)"
        type: string
        default: ""
      force_reextract:
        description: "Force re-extraction of done entries"
        type: boolean
        default: false
      chain_id:
        description: "Chain identifier (auto-set on first iteration)"
        type: string
        default: ""

env:
  NBADB_DATA_DIR: data/nbadb
  NBADB_PBP_CHUNK_SIZE: "1000"
  CACHE_KEY: full-extraction-state

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

# ─────────────────────────────────────────────────────────────────
#  4 parallel extraction shards → 1 merge + transform job
# ─────────────────────────────────────────────────────────────────
jobs:
  extract:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    permissions:
      actions: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          # Shards 0-2: season-scoped patterns only (skip player/team/static)
          - shard: 0
            season_start: "1946"
            season_end: "1979"
            name: "early"
            patterns: "season,game,date,player_season,player_team_season,team_season"
          - shard: 1
            season_start: "1980"
            season_end: "1999"
            name: "growth"
            patterns: "season,game,date,player_season,player_team_season,team_season"
          - shard: 2
            season_start: "2000"
            season_end: "2014"
            name: "modern"
            patterns: "season,game,date,player_season,player_team_season,team_season"
          # Shard 3: ALL patterns (season-scoped for 2015-2025 + global player/team/static)
          - shard: 3
            season_start: "2015"
            season_end: "2025"
            name: "recent"
            patterns: ""

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86  # v5.4.2
        with:
          enable-cache: true

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.12"

      - run: uv sync

      # ── Restore state from previous iteration ──
      - name: Restore extraction state
        id: restore
        uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830  # v4.3.0
        with:
          path: data/nbadb/
          key: ${{ env.CACHE_KEY }}-shard-${{ matrix.shard }}-${{ github.run_id }}-${{ inputs.iteration }}
          restore-keys: |
            ${{ env.CACHE_KEY }}-shard-${{ matrix.shard }}-

      - name: Show shard info
        env:
          SHARD: ${{ matrix.shard }}
          NAME: ${{ matrix.name }}
          SEASON_START: ${{ matrix.season_start }}
          SEASON_END: ${{ matrix.season_end }}
          PATTERNS: ${{ matrix.patterns }}
          ITERATION: ${{ inputs.iteration }}
        run: |
          echo "::notice::Shard $SHARD ($NAME) — seasons $SEASON_START–$SEASON_END — iteration $ITERATION"
          [ -n "$PATTERNS" ] && echo "::notice::Patterns: $PATTERNS" || echo "::notice::Patterns: all"
          if [ -f data/nbadb/nba.duckdb ]; then
            echo "::notice::Resuming from cached state"
            ls -lh data/nbadb/ 2>/dev/null || true
          else
            echo "::notice::Fresh start"
          fi

      # ── Connect NordVPN tunnel ──
      - name: Connect NordVPN tunnel
        env:
          NORDVPN_TOKEN: ${{ secrets.NORDVPN_TOKEN }}
          SHARD_INDEX: ${{ matrix.shard }}
        run: |
          # Derive OpenVPN credentials from NordVPN token
          creds=$(curl -sf -u "token:$NORDVPN_TOKEN" \
            https://api.nordvpn.com/v1/users/services/credentials)
          user=$(echo "$creds" | jq -r .username)
          pass=$(echo "$creds" | jq -r .password)
          if [ -z "$user" ] || [ "$user" = "null" ]; then
            echo "::error::Failed to derive NordVPN credentials"
            exit 1
          fi
          echo "::add-mask::$user"
          echo "::add-mask::$pass"

          # Install OpenVPN
          sudo apt-get update -qq && sudo apt-get install -y -qq openvpn > /dev/null

          # Get 4 recommended US OpenVPN servers; each shard picks its own
          server=$(curl -s --globoff 'https://api.nordvpn.com/v1/servers/recommendations?limit=4&filters[country_id]=228&filters[servers_technologies][identifier]=openvpn_udp' \
            | jq -r ".[$SHARD_INDEX].hostname")
          if [ -z "$server" ] || [ "$server" = "null" ]; then
            echo "::error::Failed to get NordVPN server recommendation"
            exit 1
          fi
          echo "::notice::Shard $SHARD_INDEX connecting to $server"

          # Download config and connect
          curl -sf "https://downloads.nordcdn.com/configs/files/ovpn_udp/servers/${server}.udp.ovpn" \
            -o /tmp/nordvpn.ovpn
          printf '%s\n%s' "$user" "$pass" > /tmp/vpn-auth.txt
          chmod 600 /tmp/vpn-auth.txt
          sudo openvpn --config /tmp/nordvpn.ovpn \
            --auth-user-pass /tmp/vpn-auth.txt \
            --daemon --log /tmp/vpn.log

          # Wait for tunnel (up to 60s)
          for i in $(seq 1 30); do
            ip addr show tun0 > /dev/null 2>&1 && break
            sleep 2
          done

          # Verify
          exit_ip=$(curl -sf --max-time 10 https://httpbin.org/ip | jq -r .origin)
          if [ -z "$exit_ip" ]; then
            echo "::error::VPN tunnel failed to establish"
            sudo cat /tmp/vpn.log | tail -20
            exit 1
          fi
          echo "::notice::VPN connected — exit IP: $exit_ip"

          # Cleanup auth file
          rm -f /tmp/vpn-auth.txt

      # ── Configure environment ──
      - name: Configure extraction environment
        env:
          CONCURRENCY: ${{ inputs.concurrency }}
        run: |
          case "$CONCURRENCY" in
            conservative) echo 'NBADB_RATE_LIMIT=2' >> $GITHUB_ENV ;;
            moderate) echo 'NBADB_RATE_LIMIT=5' >> $GITHUB_ENV ;;
            aggressive) echo 'NBADB_RATE_LIMIT=10' >> $GITHUB_ENV ;;
          esac

      # ── Run extraction ──
      - name: Run extraction
        id: extract
        env:
          SEASON_START: ${{ matrix.season_start }}
          SEASON_END: ${{ matrix.season_end }}
          PATTERNS: ${{ inputs.backfill_patterns || matrix.patterns }}
          BACKFILL_ENDPOINTS: ${{ inputs.backfill_endpoints }}
          FORCE_REEXTRACT: ${{ inputs.force_reextract }}
        run: |
          set +e
          CMD="uv run nbadb backfill run --seasons \"${SEASON_START}:${SEASON_END}\" --extract-only"
          [ -n "$PATTERNS" ] && CMD="$CMD --pattern \"$PATTERNS\""
          [ -n "$BACKFILL_ENDPOINTS" ] && CMD="$CMD --endpoint \"$BACKFILL_ENDPOINTS\""
          [ "$FORCE_REEXTRACT" = "true" ] && CMD="$CMD --force"
          CMD="$CMD --verbose"

          echo "::notice::Running: $CMD"
          timeout 20400 bash -c "$CMD"
          exit_code=$?
          set -e

          if [ "$exit_code" -eq 0 ]; then
            echo "status=complete" >> $GITHUB_OUTPUT
          else
            echo "status=incomplete" >> $GITHUB_OUTPUT
          fi
          # Propagate exit code so the chain job can detect incomplete shards.
          # fail-fast: false ensures other shards still complete.
          exit $exit_code

      # ── Progress summary ──
      - name: Shard progress
        if: always()
        env:
          SHARD: ${{ matrix.shard }}
          NAME: ${{ matrix.name }}
          ITERATION: ${{ inputs.iteration }}
          STATUS: ${{ steps.extract.outputs.status }}
        run: |
          echo "## Shard $SHARD ($NAME) — Iteration $ITERATION" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** $STATUS" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          ls -lh data/nbadb/ 2>/dev/null >> $GITHUB_STEP_SUMMARY || echo "No data directory" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      # ── Save state ──
      - name: Save extraction state
        if: always()
        uses: actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830  # v4.3.0
        with:
          path: data/nbadb/
          key: ${{ env.CACHE_KEY }}-shard-${{ matrix.shard }}-${{ github.run_id }}-${{ inputs.iteration }}

      # ── Upload shard artifact ──
      - name: Upload shard artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: extraction-shard-${{ matrix.shard }}
          path: data/nbadb/
          retention-days: 7
          compression-level: 6

      # ── Cleanup ──
      - name: Disconnect VPN
        if: always()
        run: sudo killall openvpn 2>/dev/null || true

  # ─────────────────────────────────────────────────────────────
  #  Merge shards → transform → export → upload
  # ─────────────────────────────────────────────────────────────
  merge:
    needs: extract
    if: ${{ always() && !cancelled() }}
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      actions: write
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86  # v5.4.2
        with:
          enable-cache: true

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.12"

      - run: uv sync

      # Download all shard artifacts
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4.3.0
        with:
          pattern: extraction-shard-*
          path: shards/

      - name: List downloaded shards
        run: |
          echo "Downloaded shards:"
          for d in shards/extraction-shard-*; do
            echo "  $d:"
            ls -lh "$d/" 2>/dev/null || echo "    (empty)"
          done

      # Clean stale caches after all shards complete (avoids race with parallel restores)
      - name: Clean stale caches
        if: inputs.iteration == '1'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Cleaning old extraction caches..."
          gh cache list --key "${{ env.CACHE_KEY }}-" --json id,key --jq '.[].key' | while read key; do
            echo "  Deleting: $key"
            gh cache delete "$key" 2>/dev/null || true
          done

      # Use shard 3 as base (has global player/team/static data)
      - name: Merge shard databases
        run: |
          if [ ! -d shards/extraction-shard-3 ]; then
            echo "::error::Shard 3 artifact missing — cannot merge without global data"
            exit 1
          fi
          cp -r shards/extraction-shard-3/. data/nbadb/

          uv run python -c "
          import duckdb, glob, os

          target = duckdb.connect('data/nbadb/nba.duckdb')
          merged_count = 0

          for shard_dir in sorted(glob.glob('shards/extraction-shard-[0-2]')):
              db_path = os.path.join(shard_dir, 'nba.duckdb')
              if not os.path.exists(db_path):
                  print(f'SKIP: {db_path} not found')
                  continue
              print(f'Merging {db_path}...')
              target.execute(f\"ATTACH '{db_path}' AS src (READ_ONLY)\")
              tables = [r[0] for r in target.execute(
                  \"SELECT table_name FROM duckdb_tables() \"
                  \"WHERE database_name = 'src' AND schema_name = 'main' \"
                  \"AND table_name LIKE 'stg_%'\"
              ).fetchall()]
              for t in tables:
                  try:
                      # Table exists in base — append new rows only (EXCEPT dedup)
                      target.execute(f'INSERT INTO main.\"{t}\" SELECT * FROM src.\"{t}\" EXCEPT SELECT * FROM main.\"{t}\"')
                      rows = target.execute(f'SELECT count(*) FROM src.\"{t}\"').fetchone()[0]
                      print(f'  appended {t}: +{rows} rows')
                  except duckdb.CatalogException:
                      # Table only in this shard — create it
                      target.execute(f'CREATE TABLE main.\"{t}\" AS SELECT * FROM src.\"{t}\"')
                      rows = target.execute(f'SELECT count(*) FROM main.\"{t}\"').fetchone()[0]
                      print(f'  created {t}: {rows} rows')
                  merged_count += 1
              target.execute('DETACH src')

          # Also merge journal entries from shards 0-2
          for shard_dir in sorted(glob.glob('shards/extraction-shard-[0-2]')):
              db_path = os.path.join(shard_dir, 'nba.duckdb')
              if not os.path.exists(db_path):
                  continue
              target.execute(f\"ATTACH '{db_path}' AS src (READ_ONLY)\")
              try:
                  target.execute(
                      'INSERT INTO main._extraction_journal '
                      'SELECT * FROM src._extraction_journal '
                      'WHERE (endpoint, params) NOT IN '
                      '(SELECT endpoint, params FROM main._extraction_journal)'
                  )
                  print(f'  merged journal from {shard_dir}')
              except duckdb.CatalogException as e:
                  print(f'  journal merge skipped for {shard_dir}: {e}')
              target.execute('DETACH src')

          target.close()
          print(f'Merge complete: {merged_count} table operations')
          "

      # Transform from merged staging
      - name: Transform and load
        run: uv run nbadb backfill run --transform-only --verbose

      - name: Merge summary
        if: always()
        run: |
          echo "## Merge — Iteration ${{ inputs.iteration }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          ls -lh data/nbadb/ 2>/dev/null >> $GITHUB_STEP_SUMMARY || echo "No data directory" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      # Scan, export, upload
      - name: Scan data quality
        id: scan
        continue-on-error: true
        uses: ./.github/actions/scan-report
        with:
          report-name: full-extraction-scan-report
          report-dir: artifacts/health/full
          fail-on: error

      - name: Export all formats
        run: uv run nbadb export

      - name: Refresh checked-in metadata
        uses: ./.github/actions/refresh-metadata

      - name: Upload to Kaggle
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
        run: uv run nbadb upload --data-dir data/nbadb -m "Full extraction $(date +%Y-%m-%d)"

      - name: Upload final database
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: nbadb-full-extraction
          path: |
            data/nbadb/*.duckdb
            data/nbadb/*.sqlite
            data/nbadb/parquet/
            data/nbadb/csv/
          retention-days: 30
          compression-level: 6

  # ─────────────────────────────────────────────────────────────
  #  Self-chain: re-trigger if any shard was incomplete
  # ─────────────────────────────────────────────────────────────
  chain:
    needs: [extract, merge]
    if: ${{ always() && !cancelled() && needs.merge.result == 'success' && needs.extract.result != 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      actions: write
    steps:
      - name: Chain next iteration
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WORKFLOW_REF: ${{ github.ref_name }}
          ITERATION: ${{ inputs.iteration }}
          MAX_ITERATIONS: ${{ inputs.max_iterations }}
          CONCURRENCY: ${{ inputs.concurrency }}
          BACKFILL_ENDPOINTS: ${{ inputs.backfill_endpoints }}
          BACKFILL_PATTERNS: ${{ inputs.backfill_patterns }}
          FORCE_REEXTRACT: ${{ inputs.force_reextract }}
          CHAIN_ID: ${{ inputs.chain_id || github.run_id }}
        run: |
          current=$ITERATION
          max=$MAX_ITERATIONS
          next=$((current + 1))

          if [ "$next" -gt "$max" ]; then
            echo "::warning::Reached max iterations ($max). Extraction may be incomplete."
            echo "::warning::Re-trigger manually to continue."
            exit 0
          fi

          echo "::notice::Some shards incomplete — triggering iteration $next/$max (chain $CHAIN_ID)"
          gh workflow run full-extraction.yml \
            --ref "$WORKFLOW_REF" \
            -f concurrency="$CONCURRENCY" \
            -f iteration="$next" \
            -f max_iterations="$max" \
            -f backfill_endpoints="$BACKFILL_ENDPOINTS" \
            -f backfill_patterns="$BACKFILL_PATTERNS" \
            -f force_reextract="$FORCE_REEXTRACT" \
            -f chain_id="$CHAIN_ID"
