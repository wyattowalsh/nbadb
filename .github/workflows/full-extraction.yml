name: Full Extraction

on:
  workflow_dispatch:
    inputs:
      concurrency:
        description: "Max concurrent requests per category"
        type: choice
        default: "aggressive"
        options:
          - conservative
          - moderate
          - aggressive
      iteration:
        description: "Iteration number (auto-incremented on self-chain)"
        type: string
        default: "1"
      max_iterations:
        description: "Max self-chain iterations (safety limit)"
        type: string
        default: "12"
      backfill_endpoints:
        description: "Comma-separated endpoints to backfill (empty = all)"
        type: string
        default: ""
      backfill_patterns:
        description: "Comma-separated patterns to override shard defaults (empty = use shard config)"
        type: string
        default: ""
      force_reextract:
        description: "Force re-extraction of done entries"
        type: boolean
        default: false
      chain_id:
        description: "Chain identifier (auto-set on first iteration)"
        type: string
        default: ""

env:
  NBADB_DATA_DIR: data/nbadb
  CACHE_KEY: full-extraction-state

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

# ─────────────────────────────────────────────────────────────────
#  5 parallel extraction shards → 1 merge + transform job
# ─────────────────────────────────────────────────────────────────
jobs:
  extract:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      actions: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          # Shards 0-3: season-scoped patterns only.
          # Keep player/team/static out of the season shards so the long-tail
          # global workloads can run in parallel instead of serializing inside
          # the most recent season slice.
          - shard: 0
            season_start: "1946"
            season_end: "1974"
            name: "early"
            patterns: "season,game,date,player_season,player_team_season,team_season"
          - shard: 1
            season_start: "1975"
            season_end: "1999"
            name: "growth"
            patterns: "season,game,date,player_season,player_team_season,team_season"
          - shard: 2
            season_start: "2000"
            season_end: "2009"
            name: "modern"
            patterns: "season,game,date,player_season,player_team_season,team_season"
          - shard: 3
            season_start: "2010"
            season_end: "2025"
            name: "recent"
            patterns: "season,game,date,player_season,player_team_season,team_season"
          # Shard 4: global player/team/static endpoints and merge base.
          # The orchestrator now scopes discovery by requested pattern, so this
          # shard skips the expensive game/date discovery work entirely.
          - shard: 4
            season_start: "1946"
            season_end: "2025"
            name: "global"
            patterns: "player,team,static"

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86  # v5.4.2
        with:
          enable-cache: true

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.12"

      - run: uv sync

      # ── Restore state from previous iteration ──
      - name: Restore extraction state
        id: restore
        uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830  # v4.3.0
        with:
          path: |
            data/nbadb/*.duckdb
            data/nbadb/*.duckdb.*
          key: ${{ env.CACHE_KEY }}-shard-${{ matrix.shard }}-${{ github.run_id }}-${{ inputs.iteration }}
          restore-keys: |
            ${{ env.CACHE_KEY }}-shard-${{ matrix.shard }}-

      - name: Show shard info
        env:
          SHARD: ${{ matrix.shard }}
          NAME: ${{ matrix.name }}
          SEASON_START: ${{ matrix.season_start }}
          SEASON_END: ${{ matrix.season_end }}
          PATTERNS: ${{ matrix.patterns }}
          ITERATION: ${{ inputs.iteration }}
        run: |
          echo "::notice::Shard $SHARD ($NAME) — seasons $SEASON_START–$SEASON_END — iteration $ITERATION"
          [ -n "$PATTERNS" ] && echo "::notice::Patterns: $PATTERNS" || echo "::notice::Patterns: all"
          if [ -f data/nbadb/nba.duckdb ]; then
            echo "::notice::Resuming from cached state"
            ls -lh data/nbadb/ 2>/dev/null || true
          else
            echo "::notice::Fresh start"
          fi

      # ── Connect NordVPN tunnel ──
      - name: Connect NordVPN tunnel
        env:
          OPENVPN_USER: ${{ secrets.OPENVPN_USER }}
          OPENVPN_PASSWORD: ${{ secrets.OPENVPN_PASSWORD }}
          NORDVPN_TOKEN: ${{ secrets.NORDVPN_TOKEN }}
          SHARD_INDEX: ${{ matrix.shard }}
          SERVER_LIMIT: "12"
        run: |
          set -euo pipefail

          retry_http_get() {
            local label="$1"
            local output="$2"
            local url="$3"
            shift 3

            local attempt http_code curl_exit sleep_for status_text
            for attempt in 1 2 3 4 5; do
              set +e
              http_code="$(
                curl -sS \
                  --connect-timeout 10 \
                  --max-time 30 \
                  -o "$output" \
                  -w '%{http_code}' \
                  "$@" \
                  "$url"
              )"
              curl_exit=$?
              set -e

              if [ "$curl_exit" -eq 0 ] && [ -n "$http_code" ] && [ "${http_code#2}" != "$http_code" ]; then
                return 0
              fi

              if [ "$curl_exit" -ne 0 ]; then
                status_text="curl exit $curl_exit"
              else
                status_text="HTTP $http_code"
              fi

              if [ "$attempt" -eq 5 ]; then
                echo "::error::$label failed after $attempt attempts ($status_text)"
                return 1
              fi

              sleep_for=$((attempt * 5))
              echo "::warning::$label failed ($status_text); retrying in ${sleep_for}s (${attempt}/5)"
              sleep "$sleep_for"
            done
          }

          cleanup_openvpn() {
            sudo killall openvpn 2>/dev/null || true
            sudo ip link delete tun0 2>/dev/null || true
            sudo rm -f /tmp/vpn.log /tmp/nordvpn.ovpn /tmp/vpn-exit-ip.json
          }

          wait_for_tunnel() {
            local verify_file="$1"
            local attempt

            for attempt in $(seq 1 20); do
              if ip addr show tun0 > /dev/null 2>&1 && \
                 sudo grep -q 'Initialization Sequence Completed' /tmp/vpn.log 2>/dev/null; then
                if retry_http_get \
                  "VPN verification probe" \
                  "$verify_file" \
                  "https://api.ipify.org?format=json" \
                  --max-time 10; then
                  jq -r '.ip // empty' "$verify_file"
                  return 0
                fi
              fi
              if ! pgrep -x openvpn > /dev/null 2>&1; then
                break
              fi
              sleep 2
            done

            return 1
          }

          shard_index="${SHARD_INDEX:-0}"
          server_limit="${SERVER_LIMIT:-1}"

          creds_file=/tmp/nordvpn-creds.json
          # Prefer direct OpenVPN tunnel credentials when configured; fall back to the
          # NordVPN token API so existing secret setups keep working.
          if [ -n "${OPENVPN_USER:-}" ] || [ -n "${OPENVPN_PASSWORD:-}" ]; then
            if [ -z "${OPENVPN_USER:-}" ] || [ -z "${OPENVPN_PASSWORD:-}" ]; then
              echo "::error::Both OPENVPN_USER and OPENVPN_PASSWORD secrets are required"
              exit 1
            fi
            user="$OPENVPN_USER"
            pass="$OPENVPN_PASSWORD"
            echo "::notice::Using configured OpenVPN tunnel credentials"
          elif [ -n "${NORDVPN_TOKEN:-}" ]; then
            retry_http_get \
              "NordVPN credentials request" \
              "$creds_file" \
              "https://api.nordvpn.com/v1/users/services/credentials" \
              -u "token:$NORDVPN_TOKEN"
            user=$(jq -r '.username // empty' "$creds_file")
            pass=$(jq -r '.password // empty' "$creds_file")
          else
            echo "::error::Provide OPENVPN_USER and OPENVPN_PASSWORD secrets or NORDVPN_TOKEN"
            exit 1
          fi
          if [ -z "$user" ] || [ -z "$pass" ]; then
            echo "::error::Failed to derive NordVPN credentials"
            exit 1
          fi
          echo "::add-mask::$user"
          echo "::add-mask::$pass"

          # Install OpenVPN only when the runner image does not already have it.
          if ! command -v openvpn > /dev/null 2>&1; then
            sudo apt-get update -qq && sudo apt-get install -y -qq openvpn > /dev/null
          fi

          # Get a broader set of recommended US OpenVPN servers so each shard can
          # fail over locally instead of burning an entire run on one bad host.
          servers_file=/tmp/nordvpn-servers.json
          retry_http_get \
            "NordVPN server recommendations request" \
            "$servers_file" \
            "https://api.nordvpn.com/v1/servers/recommendations?limit=${server_limit}&filters[country_id]=228&filters[servers_technologies][identifier]=openvpn_udp" \
            --globoff

          mapfile -t servers < <(jq -r '.[].hostname // empty' "$servers_file" | awk 'NF && !seen[$0]++')
          if [ "${#servers[@]}" -eq 0 ]; then
            echo "::error::Failed to get NordVPN server recommendations"
            exit 1
          fi

          printf '%s\n%s' "$user" "$pass" > /tmp/vpn-auth.txt
          chmod 600 /tmp/vpn-auth.txt
          exit_ip=""
          verify_file=/tmp/vpn-exit-ip.json
          total_servers="${#servers[@]}"
          connected_transport=""
          connected_server=""
          for transport in udp tcp; do
            case "$transport" in
              udp)
                config_dir=ovpn_udp
                config_suffix=udp
                ;;
              tcp)
                config_dir=ovpn_tcp
                config_suffix=tcp
                ;;
            esac

            for offset in $(seq 0 $((total_servers - 1))); do
              candidate_index=$(((shard_index + offset) % total_servers))
              server="${servers[$candidate_index]}"
              [ -n "$server" ] || continue

              echo "::notice::Shard $shard_index attempting $server over $transport (${offset}/${total_servers})"
              cleanup_openvpn
              if ! retry_http_get \
                "NordVPN OpenVPN config download for $server ($transport)" \
                /tmp/nordvpn.ovpn \
                "https://downloads.nordcdn.com/configs/files/${config_dir}/servers/${server}.${config_suffix}.ovpn"; then
                echo "::warning::Skipping $server over $transport after config download failure"
                continue
              fi
              sudo openvpn --config /tmp/nordvpn.ovpn \
                --auth-user-pass /tmp/vpn-auth.txt \
                --daemon --log /tmp/vpn.log

              if exit_ip=$(wait_for_tunnel "$verify_file"); then
                connected_transport="$transport"
                connected_server="$server"
                break 2
              fi

              echo "::warning::VPN attempt failed for $server over $transport; trying next candidate"
              sudo tail -20 /tmp/vpn.log || true
            done
          done

          if [ -z "$exit_ip" ]; then
            echo "::error::VPN tunnel failed to establish after trying ${total_servers} servers over UDP and TCP"
            sudo tail -20 /tmp/vpn.log || true
            exit 1
          fi
          echo "::notice::VPN connected via $connected_server over $connected_transport — exit IP: $exit_ip"

          # Cleanup auth file
          rm -f /tmp/vpn-auth.txt "$creds_file" "$servers_file" /tmp/vpn-exit-ip.json

      # ── Configure environment ──
      - name: Configure extraction environment
        env:
          CONCURRENCY: ${{ inputs.concurrency }}
        run: |
          case "$CONCURRENCY" in
            conservative)
              echo 'NBADB_RATE_LIMIT=6'                  >> "$GITHUB_ENV"
              echo 'NBADB_DISCOVERY_CONCURRENCY=4'      >> "$GITHUB_ENV"
              echo 'NBADB_THREAD_POOL_SIZE=48'          >> "$GITHUB_ENV"
              echo 'NBADB_CIRCUIT_BREAKER_MAX_WAIT=180' >> "$GITHUB_ENV"
              echo 'NBADB_DEFAULT_CHUNK_SIZE=750'       >> "$GITHUB_ENV"
              echo 'NBADB_PBP_CHUNK_SIZE=1500'          >> "$GITHUB_ENV"
              ;;
            moderate)
              echo 'NBADB_RATE_LIMIT=10'                 >> "$GITHUB_ENV"
              echo 'NBADB_DISCOVERY_CONCURRENCY=6'      >> "$GITHUB_ENV"
              echo 'NBADB_THREAD_POOL_SIZE=64'          >> "$GITHUB_ENV"
              echo 'NBADB_CIRCUIT_BREAKER_MAX_WAIT=120' >> "$GITHUB_ENV"
              echo 'NBADB_DEFAULT_CHUNK_SIZE=1000'      >> "$GITHUB_ENV"
              echo 'NBADB_PBP_CHUNK_SIZE=2000'          >> "$GITHUB_ENV"
              ;;
            aggressive)
              echo 'NBADB_RATE_LIMIT=14'                >> "$GITHUB_ENV"
              echo 'NBADB_DISCOVERY_CONCURRENCY=8'     >> "$GITHUB_ENV"
              echo 'NBADB_THREAD_POOL_SIZE=96'         >> "$GITHUB_ENV"
              echo 'NBADB_CIRCUIT_BREAKER_MAX_WAIT=90' >> "$GITHUB_ENV"
              echo 'NBADB_DEFAULT_CHUNK_SIZE=1250'     >> "$GITHUB_ENV"
              echo 'NBADB_PBP_CHUNK_SIZE=2500'         >> "$GITHUB_ENV"
              ;;
          esac

      # ── Run extraction ──
      - name: Run extraction
        id: extract
        env:
          SEASON_START: ${{ matrix.season_start }}
          SEASON_END: ${{ matrix.season_end }}
          PATTERNS: ${{ inputs.backfill_patterns || matrix.patterns }}
          BACKFILL_ENDPOINTS: ${{ inputs.backfill_endpoints }}
          FORCE_REEXTRACT: ${{ inputs.force_reextract }}
        run: |
          set +e
          CMD="uv run nbadb backfill run --seasons \"${SEASON_START}:${SEASON_END}\" --extract-only"
          [ -n "$PATTERNS" ] && CMD="$CMD --pattern \"$PATTERNS\""
          [ -n "$BACKFILL_ENDPOINTS" ] && CMD="$CMD --endpoint \"$BACKFILL_ENDPOINTS\""
          [ "$FORCE_REEXTRACT" = "true" ] && CMD="$CMD --force"
          CMD="$CMD --verbose"

          echo "::notice::Running: $CMD"
          timeout --signal=INT --kill-after=60 21300 bash -c "$CMD"
          exit_code=$?
          set -e

          if [ "$exit_code" -eq 0 ]; then
            echo "status=complete" >> "$GITHUB_OUTPUT"
          else
            echo "status=incomplete" >> "$GITHUB_OUTPUT"
          fi
          # Propagate exit code so the chain job can detect incomplete shards.
          # fail-fast: false ensures other shards still complete.
          exit $exit_code

      # ── Progress summary ──
      - name: Shard progress
        if: always()
        env:
          SHARD: ${{ matrix.shard }}
          NAME: ${{ matrix.name }}
          ITERATION: ${{ inputs.iteration }}
          STATUS: ${{ steps.extract.outputs.status }}
        run: |
          {
            echo "## Shard $SHARD ($NAME) — Iteration $ITERATION"
            echo "**Status:** $STATUS"
            echo '```'
            ls -lh data/nbadb/ 2>/dev/null || echo "No data directory"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      # ── Save state ──
      - name: Save extraction state
        if: always()
        uses: actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830  # v4.3.0
        with:
          path: |
            data/nbadb/*.duckdb
            data/nbadb/*.duckdb.*
          key: ${{ env.CACHE_KEY }}-shard-${{ matrix.shard }}-${{ github.run_id }}-${{ inputs.iteration }}

      # ── Upload shard artifact ──
      - name: Upload shard artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: extraction-shard-${{ matrix.shard }}
          path: |
            data/nbadb/*.duckdb
            data/nbadb/*.duckdb.*
          retention-days: 7
          compression-level: 0

      # ── Cleanup ──
      - name: Disconnect VPN
        if: always()
        run: sudo killall openvpn 2>/dev/null || true

  # ─────────────────────────────────────────────────────────────
  #  Merge shards → transform → export → upload
  # ─────────────────────────────────────────────────────────────
  merge:
    needs: extract
    if: ${{ always() && !cancelled() }}
    runs-on: ubuntu-latest
    timeout-minutes: 150
    permissions:
      actions: write
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86  # v5.4.2
        with:
          enable-cache: true

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.12"

      - run: uv sync

      # Download all shard artifacts
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4.3.0
        with:
          pattern: extraction-shard-*
          path: shards/

      - name: List downloaded shards
        run: |
          echo "Downloaded shards:"
          for d in shards/extraction-shard-*; do
            echo "  $d:"
            ls -lh "$d/" 2>/dev/null || echo "    (empty)"
          done

      # Use the global shard as the merge base.
      - name: Merge shard databases
        run: |
          if [ ! -d shards/extraction-shard-4 ]; then
            echo "::error::Global shard artifact missing — cannot merge without player/team/static data"
            exit 1
          fi
          mkdir -p data/nbadb
          cp -r shards/extraction-shard-4/. data/nbadb/

          uv run python -c "
          import duckdb, glob, os

          target = duckdb.connect('data/nbadb/nba.duckdb')
          merged_count = 0

          for shard_dir in sorted(glob.glob('shards/extraction-shard-[0-3]')):
              db_path = os.path.join(shard_dir, 'nba.duckdb')
              if not os.path.exists(db_path):
                  print(f'SKIP: {db_path} not found')
                  continue
              print(f'Merging {db_path}...')
              target.execute(f\"ATTACH '{db_path}' AS src (READ_ONLY)\")
              tables = [r[0] for r in target.execute(
                  \"SELECT table_name FROM duckdb_tables() \"
                  \"WHERE database_name = 'src' AND schema_name = 'main' \"
                  \"AND table_name LIKE 'stg_%'\"
              ).fetchall()]
              for t in tables:
                  try:
                      # Table exists in base — append new rows only (EXCEPT dedup)
                      target.execute(f'INSERT INTO main.\"{t}\" SELECT * FROM src.\"{t}\" EXCEPT SELECT * FROM main.\"{t}\"')
                      rows = target.execute(f'SELECT count(*) FROM src.\"{t}\"').fetchone()[0]
                      print(f'  appended {t}: +{rows} rows')
                  except duckdb.CatalogException:
                      # Table only in this shard — create it
                      target.execute(f'CREATE TABLE main.\"{t}\" AS SELECT * FROM src.\"{t}\"')
                      rows = target.execute(f'SELECT count(*) FROM main.\"{t}\"').fetchone()[0]
                      print(f'  created {t}: {rows} rows')
                  merged_count += 1
              target.execute('DETACH src')

          # Also merge journal entries from the non-base shards.
          for shard_dir in sorted(glob.glob('shards/extraction-shard-[0-3]')):
              db_path = os.path.join(shard_dir, 'nba.duckdb')
              if not os.path.exists(db_path):
                  continue
              target.execute(f\"ATTACH '{db_path}' AS src (READ_ONLY)\")
              try:
                  target.execute(
                      'INSERT INTO main._extraction_journal '
                      'SELECT * FROM src._extraction_journal '
                      'WHERE (endpoint, params) NOT IN '
                      '(SELECT endpoint, params FROM main._extraction_journal)'
                  )
                  print(f'  merged journal from {shard_dir}')
              except duckdb.CatalogException as e:
                  print(f'  journal merge skipped for {shard_dir}: {e}')
              target.execute('DETACH src')

          target.close()
          print(f'Merge complete: {merged_count} table operations')
          "

      # Transform from merged staging (only when all shards completed)
      - name: Transform and load
        if: needs.extract.result == 'success'
        run: uv run nbadb backfill run --transform-only --verbose

      - name: Merge summary
        if: always()
        run: |
          {
            echo "## Merge — Iteration ${{ inputs.iteration }}"
            echo '```'
            ls -lh data/nbadb/ 2>/dev/null || echo "No data directory"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      # Scan, export, upload — only when all shards completed
      - name: Scan data quality
        id: scan
        if: needs.extract.result == 'success'
        continue-on-error: true
        uses: ./.github/actions/scan-report
        with:
          report-name: full-extraction-scan-report
          report-dir: artifacts/health/full
          fail-on: error

      - name: Export all formats
        if: needs.extract.result == 'success'
        run: uv run nbadb export

      - name: Refresh checked-in metadata
        if: needs.extract.result == 'success'
        uses: ./.github/actions/refresh-metadata

      - name: Upload to Kaggle
        if: needs.extract.result == 'success'
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
        run: uv run nbadb upload --data-dir data/nbadb -m "Full extraction $(date +%Y-%m-%d)"

      - name: Upload final database
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: nbadb-full-extraction
          path: |
            data/nbadb/*.duckdb
            data/nbadb/*.sqlite
            data/nbadb/parquet/
            data/nbadb/csv/
          retention-days: 30
          compression-level: 0

  # ─────────────────────────────────────────────────────────────
  #  Self-chain: re-trigger if any shard was incomplete
  # ─────────────────────────────────────────────────────────────
  chain:
    needs: [extract, merge]
    if: ${{ always() && !cancelled() && needs.extract.result != 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      actions: write
    steps:
      - name: Chain next iteration
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WORKFLOW_REF: ${{ github.ref_name }}
          ITERATION: ${{ inputs.iteration }}
          MAX_ITERATIONS: ${{ inputs.max_iterations }}
          CONCURRENCY: ${{ inputs.concurrency }}
          BACKFILL_ENDPOINTS: ${{ inputs.backfill_endpoints }}
          BACKFILL_PATTERNS: ${{ inputs.backfill_patterns }}
          CHAIN_ID: ${{ inputs.chain_id || github.run_id }}
        run: |
          current=$ITERATION
          max=$MAX_ITERATIONS
          next=$((current + 1))
          next_concurrency="$CONCURRENCY"

          if [ "$next" -gt "$max" ]; then
            echo "::error::Reached max iterations ($max) with incomplete extraction."
            echo "::error::Re-trigger manually after fixing the underlying shard failures."
            exit 1
          fi

          echo "::notice::Some shards incomplete — triggering iteration $next/$max at $next_concurrency concurrency (chain $CHAIN_ID)"
          gh workflow run full-extraction.yml \
            --repo "${{ github.repository }}" \
            --ref "$WORKFLOW_REF" \
            -f concurrency="$next_concurrency" \
            -f iteration="$next" \
            -f max_iterations="$max" \
            -f backfill_endpoints="$BACKFILL_ENDPOINTS" \
            -f backfill_patterns="$BACKFILL_PATTERNS" \
            -f force_reextract=false \
            -f chain_id="$CHAIN_ID"
