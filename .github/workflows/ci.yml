name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86  # v5.4.2
        with:
          enable-cache: true
          cache-suffix: lint
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.12"
      - run: uv sync --extra dev
      - run: uv run ruff check src/ tests/
      - run: uv run ruff format --check src/ tests/

  metadata:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86  # v5.4.2
        with:
          enable-cache: true
          cache-suffix: metadata
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.12"
      - run: uv sync --extra dev
      - uses: ./.github/actions/refresh-metadata
        with:
          commit: "false"
      - name: Verify generated metadata is committed
        run: |
          status="$(git status --short --untracked-files=all -- dataset-metadata.json)"
          if [ -n "$status" ]; then
            echo "Generated metadata is out of date:"
            echo "$status"
            exit 1
          fi

  typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86  # v5.4.2
        with:
          enable-cache: true
          cache-suffix: typecheck
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.12"
      - run: uv sync --extra dev
      - run: uv run ty check src/

  docs:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86  # v5.4.2
        with:
          enable-cache: true
          cache-suffix: docs
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.12"
      - uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061  # v4.2.0
        with:
          version: 9
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: docs/pnpm-lock.yaml
      - run: uv sync --extra dev
      - name: Install docs dependencies
        working-directory: docs
        run: pnpm install --frozen-lockfile
      - name: Regenerate docs artifacts
        run: uv run nbadb docs-autogen --docs-root docs/content/docs
      - name: Verify generated docs are committed
        run: |
          status="$(
            git status --short --untracked-files=all -- \
              docs/content/docs \
              docs/lib/generated \
              docs/lib/site-metrics.generated.ts
          )"
          if [ -n "$status" ]; then
            echo "Generated docs artifacts are out of date:"
            echo "$status"
            exit 1
          fi
      - name: Lint docs
        working-directory: docs
        run: pnpm lint
      - name: Test docs
        working-directory: docs
        run: pnpm test
      - name: Typecheck docs
        working-directory: docs
        run: pnpm typecheck
      - name: Build docs
        working-directory: docs
        run: pnpm build

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [lint, metadata, typecheck]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86  # v5.4.2
        with:
          enable-cache: true
          cache-suffix: test
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.12"
      - run: uv sync --extra dev
      - run: uv run pytest tests/unit --cov=src/nbadb --cov-report=term-missing
      - run: uv run pytest tests/integration -x
