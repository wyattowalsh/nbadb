name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  workflow-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Install pinned actionlint
        env:
          ACTIONLINT_VERSION: "1.7.12"
          ACTIONLINT_SHA256: "8aca8db96f1b94770f1b0d72b6dddcb1ebb8123cb3712530b08cc387b349a3d8"
        run: |
          set -euo pipefail
          archive="actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"
          install_dir="$RUNNER_TEMP/actionlint"
          curl \
            --fail \
            --location \
            --retry 3 \
            --retry-all-errors \
            --show-error \
            --silent \
            "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/${archive}" \
            --output "$RUNNER_TEMP/$archive"
          echo "$ACTIONLINT_SHA256  $RUNNER_TEMP/$archive" | sha256sum --check --strict
          mkdir -p "$install_dir"
          tar -xzf "$RUNNER_TEMP/$archive" -C "$install_dir" actionlint
          echo "$install_dir" >> "$GITHUB_PATH"
      - name: Run actionlint on all workflows
        run: actionlint

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          enable-cache: true
          cache-suffix: lint
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
      - run: uv sync --extra dev
      - name: Lint package, tests, and extraction runtime scripts
        run: |
          uv run ruff check \
            src/ \
            tests/ \
            .github/actions/nordvpn-connect/connect.py \
            .github/actions/nordvpn-connect/supervise.py \
            .github/scripts/probe_discovery_transport.py \
            .github/scripts/seed_discovery_artifacts.py \
            .github/scripts/verify_discovery_bundle.py
      - name: Check formatting for package, tests, and extraction runtime scripts
        run: |
          uv run ruff format --check \
            src/ \
            tests/ \
            .github/actions/nordvpn-connect/connect.py \
            .github/actions/nordvpn-connect/supervise.py \
            .github/scripts/probe_discovery_transport.py \
            .github/scripts/seed_discovery_artifacts.py \
            .github/scripts/verify_discovery_bundle.py

  metadata:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          enable-cache: true
          cache-suffix: metadata
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
      - run: uv sync --extra dev
      - uses: ./.github/actions/refresh-metadata
        with:
          commit: "false"
      - name: Verify generated metadata is committed
        run: |
          status="$(git status --short --untracked-files=all -- dataset-metadata.json)"
          if [ -n "$status" ]; then
            echo "Generated metadata is out of date:"
            echo "$status"
            exit 1
          fi

  typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          enable-cache: true
          cache-suffix: typecheck
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
      - run: uv sync --extra dev
      - name: Type-check package and extraction runtime scripts
        run: |
          uv run ty check \
            src/ \
            .github/actions/nordvpn-connect/connect.py \
            .github/actions/nordvpn-connect/supervise.py \
            .github/scripts/probe_discovery_transport.py \
            .github/scripts/seed_discovery_artifacts.py \
            .github/scripts/verify_discovery_bundle.py

  docs:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          enable-cache: true
          cache-suffix: docs
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093  # v6.0.8
        with:
          package_json_file: docs/package.json
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: "26"
          cache: pnpm
          cache-dependency-path: docs/pnpm-lock.yaml
      - run: uv sync --extra dev
      - name: Install docs dependencies
        working-directory: docs
        run: pnpm install --frozen-lockfile
      - name: Regenerate docs artifacts
        run: uv run nbadb docs-autogen --docs-root docs/content/docs
      - name: Format generated docs artifacts
        working-directory: docs
        run: |
          pnpm exec prettier --write \
            content/docs/schema/raw-reference.mdx \
            content/docs/schema/staging-reference.mdx \
            content/docs/schema/star-reference.mdx \
            content/docs/data-dictionary/raw.mdx \
            content/docs/data-dictionary/staging.mdx \
            content/docs/data-dictionary/star.mdx \
            lib/generated/agent-catalog.json \
            lib/generated/lineage.json \
            lib/site-metrics.generated.ts
      - name: Verify generated docs are committed
        run: |
          status="$(
            git status --short --untracked-files=all -- \
              docs/content/docs \
              docs/lib/generated \
              docs/lib/site-metrics.generated.ts
          )"
          if [ -n "$status" ]; then
            echo "Generated docs artifacts are out of date:"
            echo "$status"
            exit 1
          fi
      - name: Lint docs
        working-directory: docs
        run: pnpm lint
      - name: Test docs
        working-directory: docs
        run: pnpm test
      - name: Typecheck docs
        working-directory: docs
        run: pnpm typecheck
      - name: Build docs
        working-directory: docs
        run: pnpm build

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [workflow-lint, lint, metadata, typecheck]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          enable-cache: true
          cache-suffix: test
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
      - run: uv sync --extra dev
      - run: uv run pytest tests/unit --cov=src/nbadb --cov-report=term-missing
      - name: Fetch nba_api endpoint-analysis docs
        run: |
          NBA_API_VERSION="$(uv run python -c 'import importlib.metadata; print(importlib.metadata.version("nba-api"))')"
          NBA_API_REF="v${NBA_API_VERSION}"
          echo "Fetching nba_api docs/tools at ${NBA_API_REF}"
          git clone --depth=1 --filter=blob:none --branch "$NBA_API_REF" \
            https://github.com/swar/nba_api.git "$RUNNER_TEMP/nba_api-upstream"
      - name: Validate endpoint support contract
        run: |
          uv run nbadb extract-completeness \
            --require-full \
            --endpoint-analysis-docs-root "$RUNNER_TEMP/nba_api-upstream" \
            --output-dir "$RUNNER_TEMP/endpoint-coverage"
      - run: uv run pytest tests/integration -x
