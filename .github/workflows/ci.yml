name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57  # v8.0.0
        with:
          enable-cache: true
          cache-suffix: lint
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
      - run: uv sync --extra dev
      - run: uv run ruff check src/ tests/
      - run: uv run ruff format --check src/ tests/

  metadata:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57  # v8.0.0
        with:
          enable-cache: true
          cache-suffix: metadata
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
      - run: uv sync --extra dev
      - uses: ./.github/actions/refresh-metadata
        with:
          commit: "false"
      - name: Verify generated metadata is committed
        run: |
          status="$(git status --short --untracked-files=all -- dataset-metadata.json)"
          if [ -n "$status" ]; then
            echo "Generated metadata is out of date:"
            echo "$status"
            exit 1
          fi

  typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57  # v8.0.0
        with:
          enable-cache: true
          cache-suffix: typecheck
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
      - run: uv sync --extra dev
      - run: uv run ty check src/

  docs:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57  # v8.0.0
        with:
          enable-cache: true
          cache-suffix: docs
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
      - uses: pnpm/action-setup@08c4be7e2e672a47d11bd04269e27e5f3e8529cb  # v6.0.0
        with:
          version: 9
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6.3.0
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: docs/pnpm-lock.yaml
      - run: uv sync --extra dev
      - name: Install docs dependencies
        working-directory: docs
        run: pnpm install --frozen-lockfile
      - name: Regenerate docs artifacts
        run: uv run nbadb docs-autogen --docs-root docs/content/docs
      - name: Verify generated docs are committed
        run: |
          status="$(
            git status --short --untracked-files=all -- \
              docs/content/docs \
              docs/lib/generated \
              docs/lib/site-metrics.generated.ts
          )"
          if [ -n "$status" ]; then
            echo "Generated docs artifacts are out of date:"
            echo "$status"
            exit 1
          fi
      - name: Lint docs
        working-directory: docs
        run: pnpm lint
      - name: Test docs
        working-directory: docs
        run: pnpm test
      - name: Typecheck docs
        working-directory: docs
        run: pnpm typecheck
      - name: Build docs
        working-directory: docs
        run: pnpm build

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [lint, metadata, typecheck]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57  # v8.0.0
        with:
          enable-cache: true
          cache-suffix: test
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
      - run: uv sync --extra dev
      - run: uv run pytest tests/unit --cov=src/nbadb --cov-report=term-missing
      - run: uv run pytest tests/integration -x
