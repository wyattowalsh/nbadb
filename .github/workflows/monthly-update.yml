name: Monthly Update

on:
  schedule:
    - cron: "0 8 1 * *"  # 8 AM UTC on 1st of month
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  monthly:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: astral-sh/setup-uv@6ee6290f1cbc4156c0bdd66691b2c144ef8df19a  # v7.4.0
        with:
          enable-cache: true
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
      - run: uv sync
      - name: Generate monthly health inventory
        run: |
          output_path="${GITHUB_WORKSPACE}/artifacts/health/monthly/dependency-inventory.json"
          uv run python -m nbadb.core.dependency_inventory --project-root "${GITHUB_WORKSPACE}" --output "$output_path"
      - name: Upload monthly health inventory artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: monthly-health-inventory
          path: artifacts/health/monthly/dependency-inventory.json
      - name: Run monthly update
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
        run: |
          uv run nbadb download
          uv run nbadb monthly
          uv run nbadb run-quality --report-path artifacts/health/monthly/data-quality-report.json
          uv run nbadb export
          uv run nbadb upload
      - name: Upload monthly data quality artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: monthly-data-quality-report
          path: artifacts/health/monthly/data-quality-report.json
