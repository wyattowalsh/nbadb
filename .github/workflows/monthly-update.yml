name: Monthly Update

on:
  schedule:
    - cron: "0 8 1 * *"  # 8 AM UTC on 1st of month
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  monthly:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57  # v8.0.0
        with:
          enable-cache: true
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
      - run: uv sync
      - name: Generate monthly health inventory
        run: |
          output_path="${GITHUB_WORKSPACE}/artifacts/health/monthly/dependency-inventory.json"
          uv run python -m nbadb.core.dependency_inventory --project-root "${GITHUB_WORKSPACE}" --output "$output_path"
      - name: Upload monthly health inventory artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: monthly-health-inventory
          path: artifacts/health/monthly/dependency-inventory.json
      - name: Connect NordVPN tunnel
        env:
          NORDVPN_TOKEN: ${{ secrets.NORDVPN_TOKEN }}
        run: |
          # Derive OpenVPN credentials from NordVPN token
          creds=$(curl -sf -u "token:$NORDVPN_TOKEN" \
            https://api.nordvpn.com/v1/users/services/credentials)
          user=$(echo "$creds" | jq -r .username)
          pass=$(echo "$creds" | jq -r .password)
          if [ -z "$user" ] || [ "$user" = "null" ]; then
            echo "::error::Failed to derive NordVPN credentials"
            exit 1
          fi
          echo "::add-mask::$user"
          echo "::add-mask::$pass"

          # Install OpenVPN
          sudo apt-get update -qq && sudo apt-get install -y -qq openvpn > /dev/null

          # Get recommended US server
          server=$(curl -s --globoff 'https://api.nordvpn.com/v1/servers/recommendations?limit=1&filters[country_id]=228&filters[servers_technologies][identifier]=openvpn_udp' \
            | jq -r '.[0].hostname')
          if [ -z "$server" ] || [ "$server" = "null" ]; then
            echo "::error::Failed to get NordVPN server recommendation"
            exit 1
          fi
          echo "::notice::Connecting to $server"

          # Download config and connect
          curl -sf "https://downloads.nordcdn.com/configs/files/ovpn_udp/servers/${server}.udp.ovpn" \
            -o /tmp/nordvpn.ovpn
          printf '%s\n%s' "$user" "$pass" > /tmp/vpn-auth.txt
          chmod 600 /tmp/vpn-auth.txt
          sudo openvpn --config /tmp/nordvpn.ovpn \
            --auth-user-pass /tmp/vpn-auth.txt \
            --daemon --log /tmp/vpn.log

          # Wait for tunnel (up to 60s)
          for i in $(seq 1 30); do
            ip addr show tun0 > /dev/null 2>&1 && break
            sleep 2
          done

          # Verify
          exit_ip=$(curl -sf --max-time 10 https://httpbin.org/ip | jq -r .origin)
          if [ -z "$exit_ip" ]; then
            echo "::error::VPN tunnel failed to establish"
            sudo cat /tmp/vpn.log | tail -20
            exit 1
          fi
          echo "::notice::VPN connected — exit IP: $exit_ip"

          # Cleanup auth file
          rm -f /tmp/vpn-auth.txt

          # Set rate limit for monthly runs
          echo 'NBADB_RATE_LIMIT=2' >> $GITHUB_ENV
      - name: Download latest from Kaggle
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
        run: uv run nbadb download
      - name: Run monthly extraction
        id: monthly
        continue-on-error: true
        run: uv run nbadb monthly
      # Scan is advisory — continue-on-error ensures export/upload proceeds.
      # --fail-on error produces exit 1 for annotations; the step shows yellow on errors.
      - name: Scan data quality
        id: scan
        if: always() && steps.monthly.outcome != 'skipped'
        continue-on-error: true
        uses: ./.github/actions/scan-report
        with:
          report-name: monthly-scan-report
          report-dir: artifacts/health/monthly
          fail-on: error
      - name: Export data
        if: always() && steps.monthly.outcome != 'skipped'
        run: uv run nbadb export
      - name: Refresh checked-in metadata
        if: always() && steps.monthly.outcome != 'skipped'
        uses: ./.github/actions/refresh-metadata
      - name: Upload to Kaggle
        if: always() && steps.monthly.outcome != 'skipped'
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
        run: uv run nbadb upload
      - name: Disconnect VPN
        if: always()
        run: sudo killall openvpn 2>/dev/null || true
