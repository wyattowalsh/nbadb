name: Monthly Update

on:
  schedule:
    - cron: "0 8 1 * *"  # 8 AM UTC on 1st of month
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  monthly:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    concurrency:
      group: nbadb-kaggle-publish
      queue: max
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          enable-cache: true
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
      - run: uv sync
      - name: Require default branch for Kaggle publication
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          if [ "$GITHUB_REF_NAME" != "$DEFAULT_BRANCH" ]; then
            echo "::error::Kaggle publication requires the default branch '$DEFAULT_BRANCH'; got '$GITHUB_REF_NAME'"
            exit 1
          fi
      - name: Restore Kaggle publication reconciliation state
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: logs/kaggle/kaggle-publication-state.json
          key: nbadb-kaggle-publication-state-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            nbadb-kaggle-publication-state-
      - name: Generate monthly health inventory
        run: |
          output_path="${GITHUB_WORKSPACE}/artifacts/health/monthly/dependency-inventory.json"
          uv run python -m nbadb.core.dependency_inventory --project-root "${GITHUB_WORKSPACE}" --output "$output_path"
      - name: Upload monthly health inventory artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: monthly-health-inventory
          path: artifacts/health/monthly/dependency-inventory.json
      - name: Connect NordVPN tunnel
        id: vpn
        uses: ./.github/actions/nordvpn-connect
        with:
          openvpn-user: ${{ secrets.OPENVPN_USER }}
          openvpn-password: ${{ secrets.OPENVPN_PASSWORD }}
          nordvpn-token: ${{ secrets.NORDVPN_TOKEN }}
          lane-index: "0"
          server-limit: "3"
      - name: Set rate limit for monthly runs
        run: echo 'NBADB_RATE_LIMIT=2' >> "$GITHUB_ENV"
      - name: Download latest from Kaggle
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
        run: uv run nbadb download
      - name: Run monthly extraction
        id: monthly
        continue-on-error: true
        run: uv run nbadb monthly
      # Keep scan diagnostics visible, but require green extraction + scan before publishing.
      - name: Scan data quality
        id: scan
        if: always() && steps.monthly.outcome == 'success'
        continue-on-error: true
        uses: ./.github/actions/scan-report
        with:
          report-name: monthly-scan-report
          report-dir: artifacts/health/monthly
          fail-on: error
      - name: Export data
        id: export
        if: always() && steps.monthly.outcome == 'success' && steps.scan.outcome == 'success'
        run: uv run nbadb export
      - name: Refresh checked-in metadata
        id: metadata
        if: always() && steps.monthly.outcome == 'success' && steps.scan.outcome == 'success'
        uses: ./.github/actions/refresh-metadata
        with:
          push-ref: ${{ github.event.repository.default_branch }}
      - name: Upload to Kaggle
        if: always() && steps.monthly.outcome == 'success' && steps.scan.outcome == 'success' && steps.export.outcome == 'success' && steps.metadata.outcome == 'success'
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
        run: uv run nbadb upload --verify-remote --remote-timeout 900 --remote-poll-interval 15
      - name: Detect Kaggle publication reconciliation state
        id: kaggle_publication_state
        if: always()
        run: |
          if [ -f logs/kaggle/kaggle-publication-state.json ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Persist Kaggle publication reconciliation state
        if: ${{ always() && steps.kaggle_publication_state.outputs.exists == 'true' }}
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: logs/kaggle/kaggle-publication-state.json
          key: nbadb-kaggle-publication-state-${{ github.run_id }}-${{ github.run_attempt }}
      - name: Upload Kaggle publication receipt
        if: always() && steps.monthly.outcome == 'success' && steps.scan.outcome == 'success' && steps.export.outcome == 'success' && steps.metadata.outcome == 'success'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          overwrite: true
          name: monthly-kaggle-publication-receipt
          path: |
            logs/kaggle/kaggle-upload-manifest.json
            logs/kaggle/kaggle-publication-state.json
          if-no-files-found: warn
          retention-days: 30
      - name: Assert extraction and scan passed
        if: always()
        env:
          MONTHLY_OUTCOME: ${{ steps.monthly.outcome }}
          SCAN_OUTCOME: ${{ steps.scan.outcome }}
          EXPORT_OUTCOME: ${{ steps.export.outcome }}
          METADATA_OUTCOME: ${{ steps.metadata.outcome }}
        run: |
          if [ "$MONTHLY_OUTCOME" != "success" ]; then
            echo "::error::Monthly extraction did not pass: ${MONTHLY_OUTCOME:-unknown}"
            exit 1
          fi
          if [ "$SCAN_OUTCOME" != "success" ]; then
            echo "::error::Monthly scan did not pass: ${SCAN_OUTCOME:-skipped}"
            exit 1
          fi
          if [ "$EXPORT_OUTCOME" != "success" ]; then
            echo "::error::Monthly export did not pass: ${EXPORT_OUTCOME:-skipped}"
            exit 1
          fi
          if [ "$METADATA_OUTCOME" != "success" ]; then
            echo "::error::Monthly metadata refresh did not pass: ${METADATA_OUTCOME:-skipped}"
            exit 1
          fi
      - name: Disconnect VPN
        if: always()
        uses: ./.github/actions/nordvpn-disconnect
        with:
          pid: ${{ steps.vpn.outputs.pid }}
          pid-file: ${{ steps.vpn.outputs.pid-file }}
          work-dir: ${{ steps.vpn.outputs.work-dir }}
      - name: Upload VPN diagnostics
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: monthly-vpn-diagnostics
          path: ${{ runner.temp }}/nordvpn/
          if-no-files-found: ignore
          retention-days: 7
          compression-level: 6
