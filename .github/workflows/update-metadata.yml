name: Update Kaggle Metadata

on:
  push:
    branches: [main]
    paths:
      - "src/nbadb/cli/commands/metadata.py"
      - "src/nbadb/kaggle/metadata.py"
      - "src/nbadb/load/parquet_loader.py"
      - "src/nbadb/transform/**"
      - "src/nbadb/schemas/**"

permissions:
  contents: write

concurrency:
  group: update-metadata
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          enable-cache: true
          cache-suffix: metadata

      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97  # v7.0.0
        with:
          python-version: "3.12"

      - run: uv sync

      - uses: ./.github/actions/refresh-metadata
