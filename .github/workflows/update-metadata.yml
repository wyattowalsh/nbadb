name: Update Kaggle Metadata

on:
  push:
    branches: [main]
    paths:
      - "src/nbadb/cli/commands/metadata.py"
      - "src/nbadb/kaggle/metadata.py"
      - "src/nbadb/load/parquet_loader.py"
      - "src/nbadb/transform/**"
      - "src/nbadb/schemas/**"

permissions:
  contents: write

concurrency:
  group: update-metadata
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          enable-cache: true
          cache-suffix: metadata

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - run: uv sync

      - uses: ./.github/actions/refresh-metadata
