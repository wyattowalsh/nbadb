name: Update Kaggle Metadata

on:
  push:
    branches: [main]
    paths:
      - "src/nbadb/cli/commands/metadata.py"
      - "src/nbadb/kaggle/metadata.py"
      - "src/nbadb/load/parquet_loader.py"
      - "src/nbadb/transform/**"
      - "src/nbadb/schemas/**"

permissions:
  contents: write

concurrency:
  group: update-metadata
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          enable-cache: true
          cache-suffix: metadata

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - run: uv sync

      - uses: ./.github/actions/refresh-metadata
