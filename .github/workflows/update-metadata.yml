name: Update Kaggle Metadata

on:
  push:
    branches: [main]
    paths:
      - "src/nbadb/cli/commands/metadata.py"
      - "src/nbadb/kaggle/metadata.py"
      - "src/nbadb/load/parquet_loader.py"
      - "src/nbadb/transform/**"
      - "src/nbadb/schemas/**"

permissions:
  contents: write

concurrency:
  group: update-metadata
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86  # v5.4.2
        with:
          enable-cache: true
          cache-suffix: metadata

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.12"

      - run: uv sync

      - uses: ./.github/actions/refresh-metadata
