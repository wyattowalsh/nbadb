# Type labels
- name: "bug"
  color: "d73a4a"
  description: "Something isn't working"
- name: "enhancement"
  color: "a2eeef"
  description: "New feature or improvement"
- name: "endpoint-request"
  color: "0075ca"
  description: "Request for new nba_api endpoint coverage"
- name: "question"
  color: "d876e3"
  description: "Question about usage or behavior"
- name: "documentation"
  color: "0075ca"
  description: "Documentation improvements"

# Priority labels
- name: "priority: critical"
  color: "b60205"
  description: "Data loss, corruption, or security issue"
- name: "priority: high"
  color: "d93f0b"
  description: "Feature broken, no workaround"
- name: "priority: medium"
  color: "fbca04"
  description: "Feature broken, workaround exists"
- name: "priority: low"
  color: "0e8a16"
  description: "Cosmetic or minor issue"

# Component labels
- name: "component: extract"
  color: "c5def5"
  description: "nba_api extractors"
- name: "component: transform"
  color: "c5def5"
  description: "Dimension, fact, aggregate, or analytics transforms"
- name: "component: schemas"
  color: "c5def5"
  description: "Pandera schema validation"
- name: "component: load"
  color: "c5def5"
  description: "SQLite / DuckDB / Parquet / CSV export"
- name: "component: cli"
  color: "c5def5"
  description: "CLI commands and TUI"
- name: "component: pipeline"
  color: "c5def5"
  description: "Orchestration and pipeline execution"
- name: "component: agent"
  color: "c5def5"
  description: "Natural-language query agent"
- name: "component: kaggle"
  color: "c5def5"
  description: "Kaggle dataset integration"
- name: "component: docs"
  color: "c5def5"
  description: "Documentation site"
- name: "component: ci"
  color: "c5def5"
  description: "GitHub Actions and CI/CD"

# Status labels
- name: "status: needs-triage"
  color: "ededed"
  description: "Needs maintainer review"
- name: "status: in-progress"
  color: "ededed"
  description: "Actively being worked on"
- name: "status: blocked"
  color: "ededed"
  description: "Blocked by dependency or external factor"
- name: "status: wontfix"
  color: "ededed"
  description: "Will not be addressed"

# Workflow labels
- name: "dependencies"
  color: "0366d6"
  description: "Dependency updates"
- name: "github-actions"
  color: "0366d6"
  description: "CI/CD workflow changes"
- name: "good first issue"
  color: "7057ff"
  description: "Good for newcomers"
- name: "help wanted"
  color: "008672"
  description: "Looking for contributors"
- name: "skip-changelog"
  color: "ededed"
  description: "Exclude from auto-generated release notes"
