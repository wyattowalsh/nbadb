name: Connect NordVPN
description: Establish a route, IP, and NBA-verified NordVPN tunnel with deterministic fallback.

inputs:
  openvpn-user:
    description: NordVPN OpenVPN service username.
    required: false
    default: ""
  openvpn-password:
    description: NordVPN OpenVPN service password.
    required: false
    default: ""
  nordvpn-token:
    description: NordVPN access token used to fetch OpenVPN credentials.
    required: false
    default: ""
  require-token-auth:
    description: Require token-derived service credentials and fail closed if derivation fails.
    required: false
    default: "false"
  configured-auth-prevalidated:
    description: Whether an upstream gate already proved the configured service credentials.
    required: false
    default: "false"
  lane-index:
    description: Zero-based lane index used to deterministically choose the first recommended server.
    required: false
    default: ""
  shard-index:
    description: Legacy alias for lane-index.
    required: false
    default: "0"
  server-limit:
    description: Hard maximum connection attempts per distinct protocol across all recovery rounds.
    required: false
    default: "4"
  server-pool-size:
    description: Initial Nord-recommended country pool per protocol; the cache expands only when later exclusions underfill the remaining bounded attempts.
    required: false
    default: "48"
  auth-rejection-limit:
    description: Maximum authentication rejections before pausing a server sweep.
    required: false
    default: "3"
  auth-recovery-rejection-limit:
    description: Maximum authentication rejections in each post-cooldown recovery sweep.
    required: false
    default: "3"
  auth-recovery-rounds:
    description: Bounded cooldown rounds after transient authentication-capacity failures.
    required: false
    default: "2"
  auth-recovery-base-delay-seconds:
    description: Base cooldown multiplied by the authentication recovery round.
    required: false
    default: "10"
  require-auth-recovery-budget:
    description: Require the initial authentication probe to reserve both attempts, diagnostics permissions, cleanup, outputs, and the first cooldown.
    required: false
    default: "false"
  quarantined-servers-json:
    description: JSON array of NordVPN server hostnames to avoid for this chain.
    required: false
    default: "[]"
  preferred-servers-json:
    description: Deduplicated JSON array of previously NBA-verified hosts; item N is reserved only for logical lane index N and all items are excluded from fresh recommendations.
    required: false
    default: "[]"
  preferred-server-slot-count:
    description: Maximum number of initial logical lane indexes eligible for one-to-one preferred-host assignment; assignments never wrap and later lanes use fresh recommendations.
    required: false
    default: "1"
  country-id:
    description: NordVPN country identifier.
    required: false
    default: "228"
  technology:
    description: Preferred NordVPN technology identifier.
    required: false
    default: "openvpn_udp"
  fallback-technology:
    description: Optional fallback NordVPN technology identifier when the preferred one fails.
    required: false
    default: "openvpn_tcp"
  verify-url:
    description: URL that returns the public exit IP as JSON.
    required: false
    default: "https://api.ipify.org?format=json"
  control-plane-probe-enabled:
    description: Whether to require GitHub reachability through the tunnel before accepting a server.
    required: false
    default: "true"
  control-plane-probe-url:
    description: Small public GitHub resource used to prove the Actions control plane remains reachable.
    required: false
    default: "https://github.com/robots.txt"
  control-plane-probe-timeout-seconds:
    description: Maximum time for each bounded GitHub reachability request.
    required: false
    default: "5"
  nba-probe-enabled:
    description: Whether to require a successful NBA Stats API probe after exit-IP verification.
    required: false
    default: "true"
  nba-probe-url:
    description: NBA Stats API URL used to validate that the selected VPN server can reach NBA data.
    required: false
    default: "https://stats.nba.com/stats/commonteamyears?LeagueID=00"
  nba-probe-timeout-seconds:
    description: Maximum time for the single NBA Stats API probe on each server.
    required: false
    default: "10"
  nba-stack-probe-enabled:
    description: Whether to require discovery canaries through the installed nbadb and nba_api stack.
    required: false
    default: "true"
  nba-stack-probe-timeout-seconds:
    description: Maximum total time for the installed-stack discovery canaries on each server.
    required: false
    default: "18"
  nba-stack-probe-season:
    description: Stable historical season used by the installed-stack discovery canaries.
    required: false
    default: "2024-25"
  connect-timeout-seconds:
    description: Maximum time to wait for an individual OpenVPN connection attempt.
    required: false
    default: "90"
  overall-timeout-seconds:
    description: Maximum total time to spend establishing a verified VPN tunnel.
    required: false
    default: "300"
  require-full-tunnel:
    description: Whether to require the default route to move onto the VPN tunnel.
    required: false
    default: "true"

outputs:
  baseline-ip:
    description: Public IP before connecting.
    value: ${{ steps.connect.outputs.baseline-ip }}
  exit-ip:
    description: Public IP after connecting.
    value: ${{ steps.connect.outputs.exit-ip }}
  interface:
    description: Tunnel interface used by OpenVPN.
    value: ${{ steps.connect.outputs.interface }}
  log-file:
    description: OpenVPN log path.
    value: ${{ steps.connect.outputs.log-file }}
  pid:
    description: OpenVPN process ID.
    value: ${{ steps.connect.outputs.pid }}
  pid-file:
    description: OpenVPN PID file path.
    value: ${{ steps.connect.outputs.pid-file }}
  server:
    description: Selected NordVPN server hostname.
    value: ${{ steps.connect.outputs.server }}
  status:
    description: Connection result code.
    value: ${{ steps.connect.outputs.status }}
  auth-source:
    description: Non-secret credential source that established the accepted tunnel.
    value: ${{ steps.connect.outputs.auth-source }}
  nba-probe-status:
    description: Final NBA Stats API probe result code.
    value: ${{ steps.connect.outputs.nba-probe-status }}
  nba-probe-diagnostic:
    description: Bounded non-secret diagnostic for the final NBA Stats API probe result.
    value: ${{ steps.connect.outputs.nba-probe-diagnostic }}
  attempted-servers-json:
    description: JSON array of server hostnames attempted during this invocation.
    value: ${{ steps.connect.outputs.attempted-servers-json }}
  failed-servers-json:
    description: JSON array of attempted server hostnames that failed verification.
    value: ${{ steps.connect.outputs.failed-servers-json }}
  work-dir:
    description: Directory containing VPN diagnostics.
    value: ${{ steps.connect.outputs.work-dir }}

runs:
  using: composite
  steps:
    - id: connect
      shell: bash
      env:
        OPENVPN_USER: ${{ inputs.openvpn-user }}
        OPENVPN_PASSWORD: ${{ inputs.openvpn-password }}
        NORDVPN_TOKEN: ${{ inputs.nordvpn-token }}
        REQUIRE_TOKEN_AUTH: ${{ inputs.require-token-auth }}
        CONFIGURED_AUTH_PREVALIDATED: ${{ inputs.configured-auth-prevalidated }}
        LANE_INDEX: ${{ inputs.lane-index }}
        SHARD_INDEX: ${{ inputs.shard-index }}
        SERVER_LIMIT: ${{ inputs.server-limit }}
        SERVER_POOL_SIZE: ${{ inputs.server-pool-size }}
        AUTH_REJECTION_LIMIT: ${{ inputs.auth-rejection-limit }}
        AUTH_RECOVERY_REJECTION_LIMIT: ${{ inputs.auth-recovery-rejection-limit }}
        AUTH_RECOVERY_ROUNDS: ${{ inputs.auth-recovery-rounds }}
        AUTH_RECOVERY_BASE_DELAY_SECONDS: ${{ inputs.auth-recovery-base-delay-seconds }}
        REQUIRE_AUTH_RECOVERY_BUDGET: ${{ inputs.require-auth-recovery-budget }}
        QUARANTINED_SERVERS_JSON: ${{ inputs.quarantined-servers-json }}
        PREFERRED_SERVERS_JSON: ${{ inputs.preferred-servers-json }}
        PREFERRED_SERVER_SLOT_COUNT: ${{ inputs.preferred-server-slot-count }}
        COUNTRY_ID: ${{ inputs.country-id }}
        TECHNOLOGY: ${{ inputs.technology }}
        FALLBACK_TECHNOLOGY: ${{ inputs.fallback-technology }}
        VERIFY_URL: ${{ inputs.verify-url }}
        CONTROL_PLANE_PROBE_ENABLED: ${{ inputs.control-plane-probe-enabled }}
        CONTROL_PLANE_PROBE_URL: ${{ inputs.control-plane-probe-url }}
        CONTROL_PLANE_PROBE_TIMEOUT_SECONDS: ${{ inputs.control-plane-probe-timeout-seconds }}
        NBA_PROBE_ENABLED: ${{ inputs.nba-probe-enabled }}
        NBA_PROBE_URL: ${{ inputs.nba-probe-url }}
        NBA_PROBE_TIMEOUT_SECONDS: ${{ inputs.nba-probe-timeout-seconds }}
        NBA_STACK_PROBE_ENABLED: ${{ inputs.nba-stack-probe-enabled }}
        NBA_STACK_PROBE_TIMEOUT_SECONDS: ${{ inputs.nba-stack-probe-timeout-seconds }}
        NBA_STACK_PROBE_SEASON: ${{ inputs.nba-stack-probe-season }}
        CONNECT_TIMEOUT_SECONDS: ${{ inputs.connect-timeout-seconds }}
        OVERALL_TIMEOUT_SECONDS: ${{ inputs.overall-timeout-seconds }}
        REQUIRE_FULL_TUNNEL: ${{ inputs.require-full-tunnel }}
      run: |
        exec python3 "$GITHUB_ACTION_PATH/supervise.py"
