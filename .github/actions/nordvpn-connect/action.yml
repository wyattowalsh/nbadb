name: Connect NordVPN
description: Establish a verified NordVPN OpenVPN tunnel with deterministic server selection and fallback.

inputs:
  openvpn-user:
    description: NordVPN OpenVPN service username.
    required: false
    default: ""
  openvpn-password:
    description: NordVPN OpenVPN service password.
    required: false
    default: ""
  nordvpn-token:
    description: NordVPN access token used to fetch OpenVPN credentials.
    required: false
    default: ""
  lane-index:
    description: Zero-based lane index used to deterministically choose the first recommended server.
    required: false
    default: ""
  shard-index:
    description: Legacy alias for lane-index.
    required: false
    default: "0"
  server-limit:
    description: Number of recommended servers to fetch for selection and fallback.
    required: false
    default: "4"
  quarantined-servers-json:
    description: JSON array of NordVPN server hostnames to avoid for this chain.
    required: false
    default: "[]"
  country-id:
    description: NordVPN country identifier.
    required: false
    default: "228"
  technology:
    description: Preferred NordVPN technology identifier.
    required: false
    default: "openvpn_udp"
  fallback-technology:
    description: Optional fallback NordVPN technology identifier when the preferred one fails.
    required: false
    default: "openvpn_tcp"
  verify-url:
    description: URL that returns the public exit IP as JSON.
    required: false
    default: "https://api.ipify.org?format=json"
  connect-timeout-seconds:
    description: Maximum time to wait for an individual OpenVPN connection attempt.
    required: false
    default: "90"
  overall-timeout-seconds:
    description: Maximum total time to spend establishing a verified VPN tunnel.
    required: false
    default: "300"
  require-full-tunnel:
    description: Whether to require the default route to move onto the VPN tunnel.
    required: false
    default: "true"

outputs:
  baseline-ip:
    description: Public IP before connecting.
    value: ${{ steps.connect.outputs.baseline-ip }}
  exit-ip:
    description: Public IP after connecting.
    value: ${{ steps.connect.outputs.exit-ip }}
  interface:
    description: Tunnel interface used by OpenVPN.
    value: ${{ steps.connect.outputs.interface }}
  log-file:
    description: OpenVPN log path.
    value: ${{ steps.connect.outputs.log-file }}
  pid:
    description: OpenVPN process ID.
    value: ${{ steps.connect.outputs.pid }}
  pid-file:
    description: OpenVPN PID file path.
    value: ${{ steps.connect.outputs.pid-file }}
  server:
    description: Selected NordVPN server hostname.
    value: ${{ steps.connect.outputs.server }}
  status:
    description: Connection result code.
    value: ${{ steps.connect.outputs.status }}
  attempted-servers-json:
    description: JSON array of server hostnames attempted during this invocation.
    value: ${{ steps.connect.outputs.attempted-servers-json }}
  failed-servers-json:
    description: JSON array of attempted server hostnames that failed verification.
    value: ${{ steps.connect.outputs.failed-servers-json }}
  work-dir:
    description: Directory containing VPN diagnostics.
    value: ${{ steps.connect.outputs.work-dir }}

runs:
  using: composite
  steps:
    - id: connect
      shell: bash
      env:
        OPENVPN_USER: ${{ inputs.openvpn-user }}
        OPENVPN_PASSWORD: ${{ inputs.openvpn-password }}
        NORDVPN_TOKEN: ${{ inputs.nordvpn-token }}
        LANE_INDEX: ${{ inputs.lane-index }}
        SHARD_INDEX: ${{ inputs.shard-index }}
        SERVER_LIMIT: ${{ inputs.server-limit }}
        QUARANTINED_SERVERS_JSON: ${{ inputs.quarantined-servers-json }}
        COUNTRY_ID: ${{ inputs.country-id }}
        TECHNOLOGY: ${{ inputs.technology }}
        FALLBACK_TECHNOLOGY: ${{ inputs.fallback-technology }}
        VERIFY_URL: ${{ inputs.verify-url }}
        CONNECT_TIMEOUT_SECONDS: ${{ inputs.connect-timeout-seconds }}
        OVERALL_TIMEOUT_SECONDS: ${{ inputs.overall-timeout-seconds }}
        REQUIRE_FULL_TUNNEL: ${{ inputs.require-full-tunnel }}
      run: |
        outer_work_dir="${RUNNER_TEMP}/nordvpn"
        outer_log_file="${outer_work_dir}/openvpn.log"
        outer_pid_file="${outer_work_dir}/openvpn.pid"
        outer_script_file="$(mktemp "${RUNNER_TEMP}/nordvpn-connect-inner.XXXXXX.sh")"
        outer_guard_flag="${RUNNER_TEMP}/nordvpn-outer-guard-fired"
        outer_overall_timeout="${OVERALL_TIMEOUT_SECONDS:-300}"
        if ! [[ "$outer_overall_timeout" =~ ^[0-9]+$ ]] || [ "$outer_overall_timeout" -lt 30 ]; then
          outer_overall_timeout=300
        fi
        outer_shell_timeout=$((outer_overall_timeout + 60))

        set -euo pipefail
        set +e
        cat > "$outer_script_file" <<'NBADB_NORDVPN_ACTION'
        set -euo pipefail

        self_pid="${BASHPID:-$$}"
        watchdog_pid=""

        cleanup_watchdog() {
          if [ -n "${watchdog_pid:-}" ]; then
            kill "$watchdog_pid" 2>/dev/null || true
            wait "$watchdog_pid" 2>/dev/null || true
            watchdog_pid=""
          fi
        }

        retry_http_get() {
          local label="$1"
          local output="$2"
          local url="$3"
          shift 3

          local attempt http_code curl_exit sleep_for status_text
          local max_attempts=3
          local remaining connect_limit request_limit
          for attempt in $(seq 1 "$max_attempts"); do
            if [ -n "${action_deadline:-}" ]; then
              remaining=$((action_deadline - SECONDS))
              if [ "$remaining" -le 5 ]; then
                echo "::error::$label skipped because the VPN connection budget is exhausted"
                return 1
              fi
            else
              remaining=30
            fi

            connect_limit=10
            request_limit=30
            if [ "$remaining" -lt "$connect_limit" ]; then
              connect_limit="$remaining"
            fi
            if [ "$remaining" -lt "$request_limit" ]; then
              request_limit="$remaining"
            fi

            set +e
            http_code="$(
              curl -sS \
                --connect-timeout "$connect_limit" \
                --max-time "$request_limit" \
                -o "$output" \
                -w '%{http_code}' \
                "$@" \
                "$url"
            )"
            curl_exit=$?
            set -e

            if [ "$curl_exit" -eq 0 ] && [ -n "$http_code" ] && [ "${http_code#2}" != "$http_code" ]; then
              return 0
            fi

            if [ "$curl_exit" -ne 0 ]; then
              status_text="curl exit $curl_exit"
            else
              status_text="HTTP $http_code"
            fi

            if [ "$attempt" -eq "$max_attempts" ]; then
              echo "::error::$label failed after $attempt attempts ($status_text)"
              return 1
            fi

            sleep_for=$((attempt * 5))
            if [ "$((SECONDS + sleep_for))" -ge "${action_deadline:-$((SECONDS + sleep_for + 1))}" ]; then
              echo "::error::$label failed ($status_text) and retrying would exceed the VPN connection budget"
              return 1
            fi
            echo "::warning::$label failed ($status_text); retrying in ${sleep_for}s (${attempt}/${max_attempts})"
            sleep "$sleep_for"
          done
        }

        remaining_budget_seconds() {
          if [ -z "${action_deadline:-}" ]; then
            echo 0
            return 0
          fi
          echo $((action_deadline - SECONDS))
        }

        run_with_budget() {
          local label="$1"
          shift

          local remaining rc
          remaining="$(remaining_budget_seconds)"
          if [ "$remaining" -le 5 ]; then
            echo "::error::$label skipped because the VPN connection budget is exhausted"
            return 124
          fi

          set +e
          timeout --foreground "$remaining" "$@"
          rc=$?
          set -e

          if [ "$rc" -eq 0 ]; then
            return 0
          fi
          if [ "$rc" -eq 124 ]; then
            echo "::error::$label exceeded the VPN connection budget"
          else
            echo "::error::$label failed with exit code $rc"
          fi
          return "$rc"
        }

        work_dir="${RUNNER_TEMP}/nordvpn"
        log_file="${work_dir}/openvpn.log"
        pid_file="${work_dir}/openvpn.pid"
        creds_file="${work_dir}/nordvpn-creds.json"
        servers_file="${work_dir}/nordvpn-servers.json"
        verify_file="${work_dir}/vpn-exit-ip.json"
        baseline_file="${work_dir}/baseline-ip.json"
        auth_file="${work_dir}/vpn-auth.txt"
        status="vpn_network_error"
        attempted_network=0
        attempted_servers=()
        failed_servers=()

        selector_index="${LANE_INDEX:-}"
        if [ -z "$selector_index" ]; then
          selector_index="${SHARD_INDEX:-0}"
        fi
        server_limit="${SERVER_LIMIT:-4}"
        connect_timeout="${CONNECT_TIMEOUT_SECONDS:-90}"
        overall_timeout="${OVERALL_TIMEOUT_SECONDS:-300}"
        require_full_tunnel="${REQUIRE_FULL_TUNNEL:-true}"

        if ! [[ "$selector_index" =~ ^[0-9]+$ ]] || ! [[ "$server_limit" =~ ^[0-9]+$ ]] || ! [[ "$connect_timeout" =~ ^[0-9]+$ ]] || ! [[ "$overall_timeout" =~ ^[0-9]+$ ]]; then
          echo "::error::lane-index, shard-index, server-limit, connect-timeout-seconds, and overall-timeout-seconds inputs must be integers"
          exit 1
        fi
        if [ "$server_limit" -lt 1 ]; then
          echo "::error::server-limit must be >= 1"
          exit 1
        fi
        if [ "$connect_timeout" -lt 30 ]; then
          echo "::error::connect-timeout-seconds must be >= 30"
          exit 1
        fi
        if [ "$overall_timeout" -lt "$connect_timeout" ]; then
          echo "::error::overall-timeout-seconds must be >= connect-timeout-seconds"
          exit 1
        fi
        action_deadline=$((SECONDS + overall_timeout))
        (
          sleep "$overall_timeout"
          echo "::error::NordVPN action exceeded the internal ${overall_timeout}s watchdog budget"
          kill -TERM "$self_pid" 2>/dev/null || true
          sleep 5
          kill -KILL "$self_pid" 2>/dev/null || true
        ) &
        watchdog_pid=$!

        quarantine_list_file="${work_dir}/quarantined-servers.txt"

        rm -rf "$work_dir"
        mkdir -p "$work_dir"
        chmod 700 "$work_dir"

        if ! python3 -c '
        import json
        import os
        import sys

        raw = os.environ.get("QUARANTINED_SERVERS_JSON", "[]")
        try:
            payload = json.loads(raw)
        except json.JSONDecodeError as exc:
            print(f"invalid quarantined-servers-json input: {exc}", file=sys.stderr)
            sys.exit(1)

        if not isinstance(payload, list):
            print("quarantined-servers-json must decode to a JSON array", file=sys.stderr)
            sys.exit(1)

        seen = set()
        for value in payload:
            hostname = str(value).strip()
            if not hostname or hostname in seen:
                continue
            seen.add(hostname)
            print(hostname)
        ' > "$quarantine_list_file"
        then
          status="vpn_network_error"
          echo "::error::Failed to parse quarantined-servers-json"
          exit 1
        fi
        mapfile -t quarantined_servers < "$quarantine_list_file"
        declare -A quarantined_server_set=()
        for quarantined_server in "${quarantined_servers[@]}"; do
          quarantined_server_set["$quarantined_server"]=1
        done

        cleanup_sensitive() {
          rm -f "$auth_file" "$creds_file" "$servers_file" "$verify_file" "$baseline_file"
        }

        make_workdir_readable() {
          if [ -d "$work_dir" ]; then
            sudo chmod -R a+rX "$work_dir" 2>/dev/null || true
          fi
        }

        array_to_json() {
          python3 -c 'import json, sys; print(json.dumps(sys.argv[1:]))' "$@"
        }

        on_exit() {
          cleanup_watchdog
          attempted_servers_json="$(array_to_json "${attempted_servers[@]}")"
          failed_servers_json="$(array_to_json "${failed_servers[@]}")"
          cleanup_sensitive
          printf 'status=%s\n' "$status" >> "$GITHUB_OUTPUT"
          printf 'attempted-servers-json=%s\n' "$attempted_servers_json" >> "$GITHUB_OUTPUT"
          printf 'failed-servers-json=%s\n' "$failed_servers_json" >> "$GITHUB_OUTPUT"
        }
        trap on_exit EXIT

        append_unique() {
          local -n target="$1"
          local value="$2"
          local existing
          [ -n "$value" ] || return 0
          for existing in "${target[@]}"; do
            if [ "$existing" = "$value" ]; then
              return 0
            fi
          done
          target+=("$value")
        }

        record_failed_server() {
          local server="$1"
          append_unique failed_servers "$server"
        }

        cleanup_openvpn() {
          local pid=""
          if [ -f "$pid_file" ]; then
            pid="$(cat "$pid_file" 2>/dev/null || true)"
          fi
          if [ -n "$pid" ] && sudo kill -0 "$pid" 2>/dev/null; then
            sudo kill "$pid" || true
            sleep 2
            if sudo kill -0 "$pid" 2>/dev/null; then
              sudo kill -9 "$pid" || true
            fi
          fi
          rm -f "$pid_file"
        }

        fail_action() {
          local next_status="$1"
          local message="$2"
          status="$next_status"
          echo "::error::$message"
          make_workdir_readable
          if [ -f "$log_file" ]; then
            sudo tail -50 "$log_file" || true
          fi
          cleanup_openvpn
          exit 1
        }

        auth_failed_in_log() {
          [ -f "$log_file" ] && sudo grep -Eq 'AUTH_FAILED|auth-failure' "$log_file" 2>/dev/null
        }

        if ! run_with_budget "apt-get update" sudo apt-get update -qq; then
          fail_action "vpn_connect_timeout" "Failed while preparing OpenVPN dependencies (apt-get update)"
        fi
        if ! run_with_budget "apt-get install" sudo apt-get install -y -qq jq openvpn; then
          fail_action "vpn_connect_timeout" "Failed while preparing OpenVPN dependencies (apt-get install)"
        fi

        baseline_ip=""
        if retry_http_get \
          "Baseline exit IP probe" \
          "$baseline_file" \
          "$VERIFY_URL" \
          --max-time 10; then
          baseline_ip=$(jq -r '.ip // empty' "$baseline_file" 2>/dev/null || true)
        else
          baseline_rc=1
        fi

        if [ -n "$baseline_ip" ]; then
          echo "::notice::Baseline exit IP: $baseline_ip"
        else
          echo "::warning::Could not determine baseline exit IP before connecting"
        fi

        echo "work-dir=$work_dir" >> "$GITHUB_OUTPUT"
        echo "log-file=$log_file" >> "$GITHUB_OUTPUT"
        echo "pid-file=$pid_file" >> "$GITHUB_OUTPUT"
        echo "baseline-ip=$baseline_ip" >> "$GITHUB_OUTPUT"

        if [ -n "${OPENVPN_USER:-}" ] || [ -n "${OPENVPN_PASSWORD:-}" ]; then
          if [ -z "${OPENVPN_USER:-}" ] || [ -z "${OPENVPN_PASSWORD:-}" ]; then
            status="vpn_auth_failure"
            echo "::error::Both OPENVPN_USER and OPENVPN_PASSWORD secrets are required"
            exit 1
          fi
          user="$OPENVPN_USER"
          pass="$OPENVPN_PASSWORD"
          echo "::notice::Using configured OpenVPN tunnel credentials"
        elif [ -n "${NORDVPN_TOKEN:-}" ]; then
          if ! retry_http_get \
            "NordVPN credentials request" \
            "$creds_file" \
            "https://api.nordvpn.com/v1/users/services/credentials" \
            -u "token:$NORDVPN_TOKEN"; then
            fail_action "vpn_auth_failure" "Failed to fetch NordVPN OpenVPN credentials"
          fi
          user=$(jq -r '.username // empty' "$creds_file")
          pass=$(jq -r '.password // empty' "$creds_file")
        else
          status="vpn_auth_failure"
          echo "::error::Provide OPENVPN_USER and OPENVPN_PASSWORD secrets or NORDVPN_TOKEN"
          exit 1
        fi

        if [ -z "$user" ] || [ -z "$pass" ]; then
          status="vpn_auth_failure"
          echo "::error::Failed to derive NordVPN credentials"
          exit 1
        fi

        echo "::add-mask::$user"
        echo "::add-mask::$pass"
        printf '%s\n%s\n' "$user" "$pass" > "$auth_file"
        chmod 600 "$auth_file"
        if [ "$(grep -cve '^[[:space:]]*$' "$auth_file" || true)" -lt 2 ]; then
          status="vpn_auth_failure"
          echo "::error::Malformed NordVPN OpenVPN credential payload"
          exit 1
        fi

        selected_server=""
        selected_technology=""
        exit_ip=""
        interface=""
        pid=""
        route_ok=0
        saw_auth_failure=0

        route_uses_interface() {
          local route_expr="$1"
          local route_output=""
          route_output="$(ip route show "$route_expr" 2>/dev/null || true)"
          [[ "$route_output" == *" dev ${interface}"* ]]
        }

        for technology in "${TECHNOLOGY}" "${FALLBACK_TECHNOLOGY:-}"; do
          [ -n "$technology" ] || continue
          if [ "$SECONDS" -ge "$action_deadline" ]; then
            fail_action "vpn_connect_timeout" "VPN connection budget expired before a verified tunnel was established"
          fi

          recommendation_limit=$((server_limit + ${#quarantined_servers[@]}))
          if [ "$recommendation_limit" -lt "$server_limit" ]; then
            recommendation_limit="$server_limit"
          fi

          if ! retry_http_get \
            "NordVPN server recommendations request ($technology)" \
            "$servers_file" \
            "https://api.nordvpn.com/v1/servers/recommendations?limit=${recommendation_limit}&filters[country_id]=${COUNTRY_ID}&filters[servers_technologies][identifier]=${technology}" \
            --globoff; then
            attempted_network=1
            continue
          fi

          mapfile -t servers < <(jq -r 'map(.hostname // empty) | unique | .[] | select(length > 0)' "$servers_file")
          if [ "${#servers[@]}" -eq 0 ]; then
            attempted_network=1
            echo "::warning::No NordVPN server recommendations available for $technology"
            continue
          fi

          filtered_servers=()
          for server in "${servers[@]}"; do
            if [ -n "${quarantined_server_set[$server]:-}" ]; then
              continue
            fi
            filtered_servers+=("$server")
          done
          if [ "${#filtered_servers[@]}" -eq 0 ]; then
            attempted_network=1
            echo "::warning::All recommended NordVPN servers are quarantined for $technology"
            continue
          fi

          start_index=$((selector_index % ${#filtered_servers[@]}))
          ordered_servers=()
          for offset in $(seq 0 $((${#filtered_servers[@]} - 1))); do
            ordered_servers+=("${filtered_servers[$(((start_index + offset) % ${#filtered_servers[@]}))]}")
          done

          for server in "${ordered_servers[@]}"; do
            if [ "$SECONDS" -ge "$action_deadline" ]; then
              fail_action "vpn_connect_timeout" "VPN connection budget expired before a verified tunnel was established"
            fi
            echo "::notice::Attempting NordVPN server $server over $technology"
            rm -f "$pid_file" "$verify_file" "$log_file" "${work_dir}/${server}.ovpn"
            append_unique attempted_servers "$server"

            case "$technology" in
              openvpn_udp)
                config_path="https://downloads.nordcdn.com/configs/files/ovpn_udp/servers/${server}.udp.ovpn"
                ;;
              openvpn_tcp)
                config_path="https://downloads.nordcdn.com/configs/files/ovpn_tcp/servers/${server}.tcp.ovpn"
                ;;
              *)
                echo "::warning::Unsupported NordVPN technology identifier: $technology"
                break
                ;;
            esac

            if ! retry_http_get \
              "NordVPN OpenVPN config download for $server ($technology)" \
              "${work_dir}/${server}.ovpn" \
              "$config_path"; then
              attempted_network=1
              record_failed_server "$server"
              echo "::warning::Skipping server $server because the configuration download failed"
              continue
            fi

            if ! run_with_budget \
              "OpenVPN launch for $server ($technology)" \
              sudo openvpn --config "${work_dir}/${server}.ovpn" \
                --auth-user-pass "$auth_file" \
                --auth-nocache \
                --writepid "$pid_file" \
                --daemon \
                --log "$log_file"; then
              record_failed_server "$server"
              fail_action \
                "vpn_connect_timeout" \
                "OpenVPN launch exceeded the remaining VPN connection budget for $server over $technology"
            fi
            make_workdir_readable

            selected_server="$server"
            selected_technology="$technology"
            pid=""
            interface=""
            exit_ip=""
            tunnel_ready=0
            auth_failed=0
            attempt_deadline=$((SECONDS + connect_timeout))
            if [ "$attempt_deadline" -gt "$action_deadline" ]; then
              attempt_deadline="$action_deadline"
            fi

            while [ "$SECONDS" -lt "$attempt_deadline" ]; do
              if auth_failed_in_log; then
                auth_failed=1
                saw_auth_failure=1
                echo "::warning::NordVPN rejected the OpenVPN credentials for $server over $technology; trying the next recommended server"
                break
              fi
              if [ -f "$pid_file" ]; then
                pid="$(cat "$pid_file" 2>/dev/null || true)"
              fi
              if [ -n "$pid" ] && sudo kill -0 "$pid" 2>/dev/null; then
                if sudo grep -q "Initialization Sequence Completed" "$log_file" 2>/dev/null; then
                  interface="$(ip -o link show | awk -F': ' '/: tun[0-9]+:/{print $2; exit}')"
                  if [ -n "$interface" ]; then
                    tunnel_ready=1
                    break
                  fi
                fi
              fi
              remaining_attempt_budget=$((attempt_deadline - SECONDS))
              if [ "$remaining_attempt_budget" -le 0 ]; then
                break
              fi
              if [ "$remaining_attempt_budget" -lt 2 ]; then
                sleep "$remaining_attempt_budget"
              else
                sleep 2
              fi
            done

            if [ "$auth_failed" -ne 1 ] && [ "$tunnel_ready" -ne 1 ] && [ "$SECONDS" -ge "$action_deadline" ]; then
              record_failed_server "$server"
              fail_action \
                "vpn_connect_timeout" \
                "VPN connection budget expired while waiting for $server over $technology to establish a verified tunnel"
            fi

            if [ "$auth_failed" -eq 1 ]; then
              attempted_network=1
              record_failed_server "$server"
              cleanup_openvpn
              if [ "$SECONDS" -lt "$action_deadline" ]; then
                sleep 2
              fi
              continue
            fi

            if [ "$tunnel_ready" -eq 1 ]; then
              route_ok=1
              if [ "$require_full_tunnel" = "true" ]; then
                route_ok=0
                if route_uses_interface default || {
                  route_uses_interface 0.0.0.0/1 && route_uses_interface 128.0.0.0/1;
                }; then
                  route_ok=1
                fi
              fi

              if [ "$route_ok" -eq 1 ] && retry_http_get \
                "VPN verification probe" \
                "$verify_file" \
                "$VERIFY_URL" \
                --max-time 10; then
                exit_ip=$(jq -r '.ip // empty' "$verify_file")
              fi

              if [ -n "$exit_ip" ] && { [ -z "$baseline_ip" ] || [ "$exit_ip" != "$baseline_ip" ]; }; then
                echo "::notice::VPN connected — server: $server, technology: $technology, interface: $interface, exit IP: $exit_ip"
                status="connected"
                echo "server=$server" >> "$GITHUB_OUTPUT"
                echo "exit-ip=$exit_ip" >> "$GITHUB_OUTPUT"
                echo "interface=$interface" >> "$GITHUB_OUTPUT"
                echo "pid=$pid" >> "$GITHUB_OUTPUT"
                exit 0
              fi
            fi

            attempted_network=1
            record_failed_server "$server"
            echo "::warning::VPN verification failed for $server over $technology; trying the next recommended server"
            make_workdir_readable
            sudo tail -20 "$log_file" || true
            cleanup_openvpn
          done
        done

        make_workdir_readable
        if [ "$SECONDS" -ge "$action_deadline" ]; then
          status="vpn_connect_timeout"
          echo "::error::VPN tunnel timed out before a verified connection was established"
        elif [ "$saw_auth_failure" -eq 1 ]; then
          status="vpn_auth_failure"
          echo "::error::NordVPN rejected the OpenVPN credentials on every attempted recommended server"
        else
          status="vpn_network_error"
          if [ "$attempted_network" -eq 0 ]; then
            echo "::error::VPN tunnel failed before any server attempt could be made"
          else
            echo "::error::VPN tunnel failed to establish with the recommended servers"
          fi
        fi
        if [ -f "$log_file" ]; then
          sudo tail -50 "$log_file" || true
        fi
        exit 1
        NBADB_NORDVPN_ACTION
        chmod 700 "$outer_script_file"

        outer_guard_pid=""
        outer_runner_pid=""
        outer_runner_pgid=""

        start_outer_guard() {
          (
            sleep "$outer_shell_timeout"
            : > "$outer_guard_flag"
            echo "::error::NordVPN connection action exceeded the outer guard timeout"
            if [ -n "${outer_runner_pgid:-}" ]; then
              kill -TERM -- "-${outer_runner_pgid}" 2>/dev/null || true
              sleep 15
              kill -KILL -- "-${outer_runner_pgid}" 2>/dev/null || true
            fi
          ) &
          outer_guard_pid=$!
        }

        stop_outer_guard() {
          if [ -n "${outer_guard_pid:-}" ]; then
            kill "$outer_guard_pid" 2>/dev/null || true
            wait "$outer_guard_pid" 2>/dev/null || true
            outer_guard_pid=""
          fi
        }

        set +e
        rm -f "$outer_guard_flag"
        setsid bash "$outer_script_file" &
        outer_runner_pid=$!
        outer_runner_pgid="$(ps -o pgid= "$outer_runner_pid" 2>/dev/null | tr -d '[:space:]')"
        if [ -z "$outer_runner_pgid" ]; then
          echo "::error::Failed to determine NordVPN outer runner process group"
          rm -f "$outer_script_file"
          exit 1
        fi
        start_outer_guard
        wait "$outer_runner_pid"
        action_rc=$?
        stop_outer_guard
        rm -f "$outer_script_file"
        if [ -f "$outer_guard_flag" ]; then
          action_rc=124
          rm -f "$outer_guard_flag"
        fi
        set -e

        if [ "$action_rc" -eq 0 ]; then
          exit 0
        fi

        if [ -f "$outer_pid_file" ]; then
          outer_pid="$(cat "$outer_pid_file" 2>/dev/null || true)"
          if [ -n "$outer_pid" ] && sudo kill -0 "$outer_pid" 2>/dev/null; then
            sudo kill "$outer_pid" || true
            sleep 2
            sudo kill -9 "$outer_pid" 2>/dev/null || true
          fi
          rm -f "$outer_pid_file"
        fi

        if [ "$action_rc" -eq 124 ]; then
          echo "work-dir=$outer_work_dir" >> "$GITHUB_OUTPUT"
          echo "log-file=$outer_log_file" >> "$GITHUB_OUTPUT"
          echo "pid-file=$outer_pid_file" >> "$GITHUB_OUTPUT"
          echo "status=vpn_connect_timeout" >> "$GITHUB_OUTPUT"
          echo "attempted-servers-json=[]" >> "$GITHUB_OUTPUT"
          echo "failed-servers-json=[]" >> "$GITHUB_OUTPUT"
          if [ -d "$outer_work_dir" ]; then
            sudo chmod -R a+rX "$outer_work_dir" 2>/dev/null || true
          fi
          if [ -f "$outer_log_file" ]; then
            sudo tail -50 "$outer_log_file" || true
          fi
          echo "::error::NordVPN connection action exceeded the outer guard timeout"
          exit 1
        fi

        exit "$action_rc"
