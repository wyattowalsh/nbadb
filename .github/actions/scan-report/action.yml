name: "Scan Data Quality"
description: "Run nbadb scan and upload report artifact"

inputs:
  data-dir:
    description: "Path to nbadb data directory"
    required: false
    default: ""
  report-name:
    description: "Artifact name for the scan report"
    required: true
  report-dir:
    description: "Directory for report artifacts"
    required: true
    default: "artifacts/health"
  fail-on:
    description: "Severity threshold for exit code (error|warning|info)"
    required: false
    default: "error"
  categories:
    description: "Comma-separated scan categories (empty = all)"
    required: false
    default: ""
  full-publication:
    description: "Require nonempty full-dataset publication anchors"
    required: false
    default: "false"
  checkpoint-report:
    description: "Terminal checkpoint report required for full-publication assurance"
    required: false
    default: ""
  checkpoint-manifest:
    description: "Lane manifest binding the terminal checkpoint"
    required: false
    default: ""
  checkpoint-dir:
    description: "Directory containing the terminal checkpoint database"
    required: false
    default: ""
  checkpoint-chain-id:
    description: "Extraction chain ID bound to the terminal checkpoint"
    required: false
    default: ""
  checkpoint-source-sha:
    description: "Source commit bound to the terminal checkpoint"
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Run data scan
      shell: bash
      env:
        REPORT_DIR: ${{ inputs.report-dir }}
        FAIL_ON: ${{ inputs.fail-on }}
        DATA_DIR: ${{ inputs.data-dir }}
        CATEGORIES: ${{ inputs.categories }}
        FULL_PUBLICATION: ${{ inputs.full-publication }}
        CHECKPOINT_REPORT: ${{ inputs.checkpoint-report }}
        CHECKPOINT_MANIFEST: ${{ inputs.checkpoint-manifest }}
        CHECKPOINT_DIR: ${{ inputs.checkpoint-dir }}
        CHECKPOINT_CHAIN_ID: ${{ inputs.checkpoint-chain-id }}
        CHECKPOINT_SOURCE_SHA: ${{ inputs.checkpoint-source-sha }}
      run: |
        mkdir -p "$REPORT_DIR"
        args=(
          --output-format json
          --report-path "$REPORT_DIR/scan-report.json"
          --ci
        )
        if [ -n "$FAIL_ON" ]; then
          args+=(--fail-on "$FAIL_ON")
        fi
        if [ -n "$DATA_DIR" ]; then
          args+=(--data-dir "$DATA_DIR")
        fi
        if [ -n "$CATEGORIES" ]; then
          args+=(--category "$CATEGORIES")
        fi
        if [ "$FULL_PUBLICATION" = "true" ]; then
          if [ -z "$CHECKPOINT_REPORT" ] || [ -z "$CHECKPOINT_MANIFEST" ] || \
             [ -z "$CHECKPOINT_DIR" ] || [ -z "$CHECKPOINT_CHAIN_ID" ] || \
             [ -z "$CHECKPOINT_SOURCE_SHA" ]; then
            echo "::error::full-publication scan requires all canonical checkpoint inputs"
            exit 1
          fi
          args+=(
            --full-publication
            --checkpoint-report "$CHECKPOINT_REPORT"
            --checkpoint-manifest "$CHECKPOINT_MANIFEST"
            --checkpoint-dir "$CHECKPOINT_DIR"
            --checkpoint-chain-id "$CHECKPOINT_CHAIN_ID"
            --checkpoint-source-sha "$CHECKPOINT_SOURCE_SHA"
          )
        fi
        uv run nbadb scan "${args[@]}"

    - name: Upload scan report
      if: always()
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
      with:
        name: ${{ inputs.report-name }}
        path: ${{ inputs.report-dir }}/scan-report.json
