name: "Scan Data Quality"
description: "Run nbadb scan and upload report artifact"

inputs:
  data-dir:
    description: "Path to nbadb data directory"
    required: false
    default: ""
  report-name:
    description: "Artifact name for the scan report"
    required: true
  report-dir:
    description: "Directory for report artifacts"
    required: true
    default: "artifacts/health"
  fail-on:
    description: "Severity threshold for exit code (error|warning|info)"
    required: false
    default: "error"
  categories:
    description: "Comma-separated scan categories (empty = all)"
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Run data scan
      shell: bash
      env:
        REPORT_DIR: ${{ inputs.report-dir }}
        FAIL_ON: ${{ inputs.fail-on }}
        DATA_DIR: ${{ inputs.data-dir }}
        CATEGORIES: ${{ inputs.categories }}
      run: |
        mkdir -p "$REPORT_DIR"
        ARGS="--output-format json"
        ARGS="$ARGS --report-path $REPORT_DIR/scan-report.json"
        ARGS="$ARGS --ci"
        if [ -n "$FAIL_ON" ]; then
          ARGS="$ARGS --fail-on $FAIL_ON"
        fi
        if [ -n "$DATA_DIR" ]; then
          ARGS="$ARGS --data-dir $DATA_DIR"
        fi
        if [ -n "$CATEGORIES" ]; then
          ARGS="$ARGS --category $CATEGORIES"
        fi
        uv run nbadb scan $ARGS

    - name: Upload scan report
      if: always()
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
      with:
        name: ${{ inputs.report-name }}
        path: ${{ inputs.report-dir }}/scan-report.json
