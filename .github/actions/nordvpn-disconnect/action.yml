name: Disconnect NordVPN
description: Disconnect a previously established NordVPN OpenVPN process using its PID.

inputs:
  pid:
    description: OpenVPN PID.
    required: false
    default: ""
  pid-file:
    description: OpenVPN PID file.
    required: false
    default: ""
  work-dir:
    description: Directory containing VPN artifacts to scrub.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - shell: bash
      env:
        VPN_PID: ${{ inputs.pid }}
        VPN_PID_FILE: ${{ inputs.pid-file }}
        VPN_WORK_DIR: ${{ inputs.work-dir }}
      run: |
        set -euo pipefail

        pid="${VPN_PID:-}"
        if [ -z "$pid" ] && [ -n "${VPN_PID_FILE:-}" ] && [ -f "$VPN_PID_FILE" ]; then
          pid="$(cat "$VPN_PID_FILE" 2>/dev/null || true)"
        fi

        if [ -n "$pid" ] && sudo kill -0 "$pid" 2>/dev/null; then
          sudo kill "$pid" || true
          for _ in $(seq 1 10); do
            if ! sudo kill -0 "$pid" 2>/dev/null; then
              break
            fi
            sleep 1
          done
          if sudo kill -0 "$pid" 2>/dev/null; then
            sudo kill -9 "$pid" || true
          fi
        fi

        if [ -n "${VPN_WORK_DIR:-}" ] && [ -d "$VPN_WORK_DIR" ]; then
          rm -f \
            "$VPN_WORK_DIR"/vpn-auth.txt \
            "$VPN_WORK_DIR"/nordvpn-creds.json \
            "$VPN_WORK_DIR"/nordvpn-servers.json \
            "$VPN_WORK_DIR"/vpn-exit-ip.json \
            "$VPN_WORK_DIR"/baseline-ip.json \
            "$VPN_WORK_DIR"/*.ovpn \
            "$VPN_WORK_DIR"/openvpn.pid
        fi
