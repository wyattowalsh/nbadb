title: "[Q&A] "
labels: ["question"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for asking! Before posting, please check these resources:
        - [Documentation](https://nbadb.w4w.dev) — guides, schema reference, and architecture docs
        - [Data dictionary](https://nbadb.w4w.dev/docs/data-dictionary) — table and column definitions
        - [Existing discussions](https://github.com/wyattowalsh/nba-db/discussions) — your question may already be answered
  - type: checkboxes
    id: pre-check
    attributes:
      label: Pre-check
      options:
        - label: I searched existing discussions and the documentation
          required: true
  - type: textarea
    id: question
    attributes:
      label: Question
      description: What do you need help with?
      placeholder: "How do I..."
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: What have you tried? Include commands, errors, or screenshots.
    validations:
      required: false
  - type: dropdown
    id: topic
    attributes:
      label: Topic
      options:
        - Running the pipeline
        - Querying the data
        - Setting up the project
        - Understanding the schema
        - Kaggle dataset
        - Other
    validations:
      required: true
